<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(25px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- UI Elements --- */
        header { padding: 25px 5% 10px 5%; position: sticky; top: 0; z-index: 1000; background: var(--bg); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
        
        .search-row { margin: 15px 0; }
        .search-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; backdrop-filter: var(--blur); }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        /* --- Category Scroll --- */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cat-item { padding: 8px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .cat-item.active { background: var(--primary); color: black; border-color: var(--primary); }

        /* --- Grid & Cards --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; cursor: pointer; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 12px; }

        /* --- Overlays --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 420px; background: rgba(20,20,20,0.8); border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
        
        .input-glass, select, textarea { width: 100%; padding: 14px; background: var(--glass); border: 1px solid var(--glass-border); color: white; border-radius: 12px; margin-bottom: 12px; outline: none; display: block; }
        select option { background: #111; color: white; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: black; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }
        
        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(10,10,10,0.95); border-left: 1px solid var(--glass-border); z-index: 4000; transition: 0.4s; padding: 40px 20px; }
        #sideMenu.active { right: 0; }
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; font-weight: 600; border-radius: 12px; cursor: pointer; }
        .menu-link:hover { background: var(--glass); color: var(--primary); }

        .exit { float: right; cursor: pointer; font-size: 20px; color: #777; }
    </style>
</head>
<body>

    <div id="authOverlay" class="overlay" style="display: flex;">
        <div class="glass-panel" style="text-align: center;">
            <h1 style="color:var(--primary); margin-bottom:30px; letter-spacing: 3px;">AUREUM</h1>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-main" onclick="login()">SIGN IN</button>
            <p id="authMsg" style="color: red; margin-top: 10px; font-size: 12px;"></p>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo">AUREUM</div>
            <i class="fas fa-bars-staggered fa-lg" onclick="toggleMenu(true)" style="cursor:pointer;"></i>
        </div>
        <div class="search-row">
            <div class="search-bar">
                <i class="fas fa-search" style="color:#555;"></i>
                <input type="text" id="searchInput" placeholder="Search products..." oninput="renderGrid()">
            </div>
        </div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <div class="grid" id="marketGrid"></div>

    <div id="sideMenu">
        <i class="fas fa-times exit" onclick="toggleMenu(false)"></i>
        <div style="margin-top:40px;">
            <div class="menu-link" style="background:var(--glass); margin-bottom:20px;"><i class="fas fa-user"></i> <span id="uDisp">User</span></div>
            <div class="menu-link" onclick="openPostModal()"><i class="fas fa-plus-circle"></i> Publish Ad</div>
            <div class="menu-link" onclick="toggleOverlay('myPostsOverlay', true)"><i class="fas fa-box"></i> My Ads</div>
            <div class="menu-link" onclick="showSupport()"><i class="fas fa-headset"></i> Support</div>
            <div id="admBtn" style="display:none;" class="menu-link" onclick="toggleOverlay('adminSettings', true)"><i class="fas fa-tools"></i> Admin</div>
            <div class="menu-link" onclick="logout()" style="color:#ff4d4d;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <div id="sellModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times exit" onclick="closeOverlay('sellModal')"></i>
            <h3 style="margin-bottom:15px; color:var(--primary);">New Listing</h3>
            <input type="file" id="fileIn" class="input-glass">
            <input type="text" id="pName" class="input-glass" placeholder="Title">
            <input type="number" id="pPrice" class="input-glass" placeholder="Price (Rs.)">
            <select id="pCat" class="input-glass"></select>
            <textarea id="pDesc" class="input-glass" placeholder="Brief description..." rows="3"></textarea>
            <input type="text" id="pWA" class="input-glass" placeholder="WhatsApp: 07xxxxxxxx">
            <button class="btn-main" id="pubBtn" onclick="publish()">PUBLISH NOW</button>
        </div>
    </div>

    <div id="supportModal" class="overlay">
        <div class="glass-panel" style="text-align:center;">
            <i class="fas fa-times exit" onclick="closeOverlay('supportModal')"></i>
            <h2 style="margin-bottom:15px;">Support</h2>
            <div id="supportDetails" style="margin-bottom:20px;"></div>
            <button class="btn-main" id="supportWA">Chat on WhatsApp</button>
        </div>
    </div>

    <div id="adminSettings" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times exit" onclick="closeOverlay('adminSettings')"></i>
            <h3 style="margin-bottom:15px;">Admin Panel</h3>
            <input type="text" id="newCat" class="input-glass" placeholder="Category Name">
            <button class="btn-main" onclick="addCat()">Add Category</button>
            <div id="admCatList" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let allItems = [];
        let currentCat = 'All';

        window.onload = () => { if(user) startApp(); loadCats(); loadItems(); };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('uDisp').innerText = user;
            if(user === 'aureum') document.getElementById('admBtn').style.display = 'flex';
        }

        function login() {
            let u = document.getElementById('lUser').value;
            let p = document.getElementById('lPass').value;
            if(u === 'aureum' && p === '1234') { localStorage.setItem('user', u); location.reload(); return; }
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val() === p) { localStorage.setItem('user', u); location.reload(); }
                else document.getElementById('authMsg').innerText = "Access Denied";
            });
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => (currentCat==='All' || i.cat===currentCat) && i.name.toLowerCase().includes(term));
            filtered.sort((a,b) => b.time - a.time);
            
            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="card">
                    <img src="${i.img}">
                    <div class="card-info">
                        <div style="font-weight:600; font-size:13px; color:#ddd;">${i.name}</div>
                        <div style="color:var(--primary); font-weight:800; font-size:15px; margin-top:5px;">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All']; let admH = '';
                if(s.exists()) s.forEach(c => { 
                    cats.push(c.val()); 
                    admH += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222;">${c.val()} <i class="fas fa-trash" onclick="db.ref('categories/${c.key}').remove()" style="color:red; cursor:pointer;"></i></div>`;
                });
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-item ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('admCatList').innerHTML = admH;
            });
        }

        async function publish() {
            let file = document.getElementById('fileIn').files[0];
            let title = document.getElementById('pName').value;
            let price = document.getElementById('pPrice').value;
            let category = document.getElementById('pCat').value;
            let btn = document.getElementById('pubBtn');

            if(!file || !title || !price || !category) return alert("Please fill all fields and select an image!");

            btn.disabled = true; btn.innerText = "Uploading...";

            try {
                let fd = new FormData(); fd.append("image", file);
                let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, { method: "POST", body: fd });
                let d = await res.json();
                
                if (d.success) {
                    let postData = {
                        name: title,
                        price: price,
                        cat: category,
                        desc: document.getElementById('pDesc').value,
                        wa: document.getElementById('pWA').value,
                        img: d.data.url,
                        seller: user,
                        time: Date.now()
                    };
                    await db.ref('items').push(postData);
                    alert("Published successfully!");
                    closeOverlay('sellModal');
                } else { alert("Image upload failed!"); }
            } catch (e) { alert("Error: " + e.message); }
            finally { btn.disabled = false; btn.innerText = "PUBLISH NOW"; }
        }

        function showSupport() {
            db.ref('support').once('value', s => {
                let d = s.val() || {name: "Support Staff", num: "0771234567"};
                document.getElementById('supportDetails').innerHTML = `<b>${d.name}</b><br>${d.num}`;
                document.getElementById('supportWA').onclick = () => window.open('https://wa.me/'+d.num);
                toggleOverlay('supportModal', true);
            });
        }

        function setCat(c) { currentCat = c; renderGrid(); loadCats(); }
        function addCat() { let v = document.getElementById('newCat').value; if(v) db.ref('categories').push(v); document.getElementById('newCat').value=""; }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; toggleMenu(false); }
        function openPostModal() { toggleOverlay('sellModal', true); }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
