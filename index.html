<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; }

        header { padding: 25px 5% 10px 5%; position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
        
        .search-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin: 15px 0; backdrop-filter: var(--blur); }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cat-item { padding: 8px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-item.active { background: var(--primary); color: black; border-color: var(--primary); }

        /* --- Grid & Floated Glass Card --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        
        .card { position: relative; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; backdrop-filter: var(--blur); transition: 0.4s ease; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(223, 188, 116, 0.15); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 12px; }

        /* Floating Action Icons */
        .card-actions { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 8px; opacity: 0; transition: 0.3s; z-index: 10; }
        .card:hover .card-actions { opacity: 1; }
        .action-btn { width: 35px; height: 35px; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; backdrop-filter: blur(5px); transition: 0.2s; }
        .action-btn:hover { background: var(--primary); color: black; }
        .btn-bin { color: #ff4d4d; } .btn-bin:hover { background: #ff4d4d; color: white; }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 420px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .input-glass { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 12px; margin-bottom: 12px; outline: none; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: black; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }

        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(10,10,10,0.98); z-index: 4000; transition: 0.4s; padding: 40px 20px; border-left: 1px solid var(--glass-border); }
        #sideMenu.active { right: 0; }
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; font-weight: 600; border-radius: 12px; cursor: pointer; margin-bottom: 5px; }
        .menu-link:hover { background: var(--glass); color: var(--primary); }
        
        .my-post-item { background: var(--glass); padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border: 1px solid var(--glass-border); }
        .my-post-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .post-btns { margin-left: auto; display: flex; gap: 8px; }
    </style>
</head>
<body>

    <div id="authOverlay" class="overlay" style="display: flex;">
        <div class="glass-panel" style="text-align: center;">
            <h1 style="color:var(--primary); margin-bottom:30px;">AUREUM</h1>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-main" onclick="login()">SIGN IN</button>
            <p id="authMsg" style="color:red; margin-top:10px; font-size:12px;"></p>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo">AUREUM</div>
            <i class="fas fa-bars-staggered fa-lg" onclick="toggleMenu(true)" style="cursor:pointer;"></i>
        </div>
        <div class="search-bar">
            <i class="fas fa-search" style="color:#555;"></i>
            <input type="text" id="searchInput" placeholder="Search..." oninput="renderGrid()">
        </div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <div class="grid" id="marketGrid"></div>

    <div id="sideMenu">
        <div style="text-align:right;"><i class="fas fa-times" onclick="toggleMenu(false)"></i></div>
        <div class="menu-link" style="background:var(--glass); margin:20px 0;"><i class="fas fa-user"></i> <span id="uDisp">User</span></div>
        <div class="menu-link" onclick="toggleOverlay('sellModal', true)"><i class="fas fa-plus"></i> Publish Ad</div>
        <div class="menu-link" onclick="loadMyPosts()"><i class="fas fa-box"></i> My Posts</div>
        <div class="menu-link" onclick="logout()" style="color:#ff4d4d;"><i class="fas fa-power-off"></i> Logout</div>
    </div>

    <div id="myPostsOverlay" class="overlay">
        <div class="glass-panel">
            <div style="text-align:right;"><i class="fas fa-times" onclick="toggleOverlay('myPostsOverlay', false)"></i></div>
            <h3 style="margin-bottom:20px;">My Uploaded Posts</h3>
            <div id="myPostsList"></div>
        </div>
    </div>

    <div id="sellModal" class="overlay">
        <div class="glass-panel">
            <div style="text-align:right;"><i class="fas fa-times" onclick="toggleOverlay('sellModal', false)"></i></div>
            <h3>New Listing</h3><br>
            <input type="file" id="fileIn" class="input-glass">
            <input type="text" id="pName" class="input-glass" placeholder="Title">
            <input type="number" id="pPrice" class="input-glass" placeholder="Price">
            <select id="pCat" class="input-glass"></select>
            <button class="btn-main" id="pubBtn" onclick="publish()">PUBLISH</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let allItems = [];
        let currentCat = 'All';

        window.onload = () => { if(user) startApp(); loadCats(); loadItems(); };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('uDisp').innerText = user;
        }

        function login() {
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            if(u === 'aureum' && p === '1234') { localStorage.setItem('user', u); location.reload(); return; }
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val() === p) { localStorage.setItem('user', u); location.reload(); }
                else document.getElementById('authMsg').innerText = "Access Denied";
            });
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => (currentCat==='All' || i.cat===currentCat) && i.name.toLowerCase().includes(term));
            
            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="card">
                    <img src="${i.img}">
                    <div class="card-actions">
                        <div class="action-btn"><i class="far fa-heart"></i></div>
                        <div class="action-btn"><i class="fas fa-shopping-cart"></i></div>
                        ${user === 'aureum' ? `<div class="action-btn" title="Pin Post"><i class="fas fa-thumbtack"></i></div>` : ''}
                        ${user === 'aureum' ? `<div class="action-btn btn-bin" onclick="deletePost('${i.id}')"><i class="fas fa-trash"></i></div>` : ''}
                    </div>
                    <div class="card-info">
                        <div style="font-weight:600;">${i.name}</div>
                        <div style="color:var(--primary); font-weight:800; margin-top:4px;">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function loadMyPosts() {
            let myPosts = allItems.filter(i => i.seller === user);
            document.getElementById('myPostsList').innerHTML = myPosts.map(i => `
                <div class="my-post-item">
                    <img src="${i.img}">
                    <div>
                        <div style="font-size:14px; font-weight:600;">${i.name}</div>
                        <div style="font-size:12px; color:var(--primary);">Rs. ${i.price}</div>
                    </div>
                    <div class="post-btns">
                        <i class="fas fa-edit" style="color:var(--primary); cursor:pointer;" onclick="editPost('${i.id}')"></i>
                        <i class="fas fa-trash" style="color:#ff4d4d; cursor:pointer;" onclick="deletePost('${i.id}')"></i>
                    </div>
                </div>
            `).join('');
            toggleOverlay('myPostsOverlay', true);
        }

        async function publish() {
            let file = document.getElementById('fileIn').files[0], btn = document.getElementById('pubBtn');
            if(!file) return alert("Select Image");
            btn.disabled = true; btn.innerText = "UPLOADING...";
            let fd = new FormData(); fd.append("image", file);
            let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, { method: "POST", body: fd });
            let d = await res.json();
            if(d.success) {
                await db.ref('items').push({
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    cat: document.getElementById('pCat').value,
                    img: d.data.url,
                    seller: user,
                    time: Date.now()
                });
                location.reload();
            }
        }

        function deletePost(id) { if(confirm("Delete this post?")) db.ref('items/'+id).remove(); }
        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All']; s.forEach(c => cats.push(c.val()));
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-item ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option value="${c}">${c}</option>`).join('');
            });
        }
        function setCat(c) { currentCat = c; renderGrid(); loadCats(); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; toggleMenu(false); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
