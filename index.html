<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg-dark: #0a0a0c;
            --glass: rgba(15, 15, 18, 0.85); --blur: blur(25px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Frosted Glass Nav */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--glass); backdrop-filter: var(--blur); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo { font-weight: 700; color: var(--primary); font-size: 22px; letter-spacing: 1px; }
        .search-bar { background: rgba(255,255,255,0.07); border-radius: 12px; padding: 8px 15px; width: 45%; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; font-size: 13px; }

        /* Filter Section */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 5%; scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-chip { padding: 8px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-chip.active { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 700; }

        /* The Grid Fix: No Overlapping */
        .market-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            grid-auto-rows: 10px;
            gap: 0 15px;
            padding: 10px 5%;
        }
        @media (min-width: 768px) { .market-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }

        .card { 
            grid-row-end: span 28; /* Default span */
            background: rgba(255,255,255,0.03); border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden; margin-bottom: 15px;
            position: relative; cursor: pointer; transition: 0.3s;
        }
        .card img { width: 100%; height: auto; display: block; }
        .card-info { padding: 12px; }
        .card-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-price { color: var(--primary); font-weight: 700; font-size: 12px; }
        .pin-tag { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; padding: 3px 7px; border-radius: 6px; font-size: 9px; font-weight: 800; z-index: 5; }

        /* Overlays */
        .overlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 93vh; background: var(--bg-dark); z-index: 2500; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); padding: 25px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 25px 25px 0 0; }
        .overlay.active { bottom: 0; }
        .close-btn { float: right; font-size: 24px; cursor: pointer; opacity: 0.6; }

        /* Side Menu */
        #sideMenu { position: fixed; top: 0; right: -300px; width: 280px; height: 100vh; background: var(--glass); backdrop-filter: var(--blur); z-index: 3000; transition: 0.4s; padding: 40px 20px; border-left: 1px solid rgba(255,255,255,0.1); }
        #sideMenu.active { right: 0; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; color: white; font-weight: 600; margin-bottom: 5px; cursor: pointer; }
        .menu-item i { width: 20px; color: var(--primary); }

        /* Form Elements */
        .input-box { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #222; color: white; padding: 14px; border-radius: 12px; margin-bottom: 12px; outline: none; }
        .btn-gold { width: 100%; background: var(--primary); color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        #authScreen { position: fixed; inset: 0; z-index: 5000; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div style="width: 100%; max-width: 350px; text-align: center; position: relative;">
            <i class="fas fa-shield-alt" id="admIcon" onclick="toggleAdm()" style="position:absolute; top:-40px; right:0; cursor:pointer; color:#111;"></i>
            <h1 style="color:var(--primary); margin-bottom:30px;">AUREUM</h1>
            <div id="logIn">
                <input type="text" id="lU" class="input-box" placeholder="Username">
                <input type="password" id="lP" class="input-box" placeholder="Password">
                <button class="btn-gold" onclick="doLogin()">Sign In</button>
                <p id="regTrigger" onclick="toggleAuth('reg')" style="margin-top:20px; color:gray; cursor:pointer; font-size:13px;">Create Account</p>
            </div>
            <div id="regIn" style="display:none;">
                <input type="text" id="rU" class="input-box" placeholder="New Username">
                <input type="password" id="rP" class="input-box" placeholder="Password">
                <button class="btn-gold" onclick="doRegister()">Register</button>
                <p onclick="toggleAuth('log')" style="margin-top:20px; color:gray; cursor:pointer; font-size:13px;">Back to Login</p>
            </div>
        </div>
    </div>

    <nav>
        <div class="logo">AUREUM</div>
        <div class="search-bar">
            <i class="fas fa-search" style="color:#444;"></i>
            <input type="text" id="sInp" placeholder="Search..." oninput="renderApp()">
        </div>
        <div onclick="toggleMenu(true)"><i class="fas fa-bars fa-lg"></i></div>
    </nav>

    <div class="cat-bar" id="cBar"></div>
    <div class="market-grid" id="mGrid"></div>

    <div id="sideMenu">
        <i class="fas fa-times close-btn" onclick="toggleMenu(false)"></i>
        <div style="margin-top:50px;">
            <div class="menu-item"><i class="fas fa-user-circle"></i> <span id="uDisp"></span></div>
            <div class="menu-item" onclick="openSell()"><i class="fas fa-plus-circle"></i> Sell Item</div>
            <div class="menu-item" onclick="toggleOverlay('myOverlay', true)"><i class="fas fa-list"></i> My Posts</div>
            <div class="menu-item" onclick="toggleOverlay('supOverlay', true)"><i class="fas fa-headset"></i> Support</div>
            <div id="admLink" class="menu-item" style="display:none; color:var(--primary);" onclick="toggleOverlay('admOverlay', true)"><i class="fas fa-tools"></i> Admin Panel</div>
            <div class="menu-item" onclick="logout()" style="margin-top:30px; color:#ff4d4d;"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div id="detOverlay" class="overlay">
        <i class="fas fa-times close-btn" onclick="toggleOverlay('detOverlay', false)"></i>
        <div id="detBody" style="margin-top:20px;"></div>
    </div>

    <div id="myOverlay" class="overlay">
        <i class="fas fa-times close-btn" onclick="toggleOverlay('myOverlay', false)"></i>
        <h2>My Listings</h2><br>
        <div id="myGrid" class="market-grid"></div>
    </div>

    <div id="supOverlay" class="overlay">
        <i class="fas fa-times close-btn" onclick="toggleOverlay('supOverlay', false)"></i>
        <div style="text-align:center; margin-top:60px;">
            <i class="fas fa-headset" style="font-size:60px; color:var(--primary);"></i>
            <h2 id="supNameDisp" style="margin-top:20px;">Support</h2>
            <p style="color:gray; margin:10px 0;">Contact us for help.</p>
            <h1 id="supNumDisp" style="color:var(--primary);"></h1>
            <button class="btn-gold" style="margin-top:20px; background:#25D366; color:white;" id="supWA">WhatsApp Us</button>
        </div>
    </div>

    <div id="admOverlay" class="overlay">
        <i class="fas fa-times close-btn" onclick="toggleOverlay('admOverlay', false)"></i>
        <h2>Admin Settings</h2><br>
        <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:15px; margin-bottom:20px;">
            <h4>Update Support Info</h4><br>
            <input type="text" id="admSupName" class="input-box" placeholder="Support Name (e.g. Alex Support)">
            <input type="text" id="admSupNum" class="input-box" placeholder="WhatsApp (e.g. 712345678)">
            <button class="btn-gold" onclick="updateSup()">Save Support Info</button>
        </div>
        <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:15px;">
            <h4>Categories</h4><br>
            <div style="display:flex; gap:10px;">
                <input type="text" id="nC" class="input-box" placeholder="New Category" style="margin:0;">
                <button class="btn-gold" style="width:80px;" onclick="addC()">Add</button>
            </div>
            <div id="admCList" style="margin-top:15px;"></div>
        </div>
    </div>

    <div id="sellModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:4000; align-items:center; justify-content:center; padding:20px;">
        <div style="width:100%; max-width:400px; background:#0c0c0e; padding:25px; border-radius:20px;">
            <i class="fas fa-times close-btn" onclick="document.getElementById('sellModal').style.display='none'"></i>
            <h3 style="margin-bottom:20px; color:var(--primary);">Post Ad</h3>
            <input type="file" id="fi" class="input-box">
            <input type="text" id="ti" class="input-box" placeholder="Item Name">
            <input type="number" id="pr" class="input-box" placeholder="Price">
            <select id="ca" class="input-box"></select>
            <textarea id="de" class="input-box" placeholder="Description"></textarea>
            <input type="text" id="wa" class="input-box" placeholder="WhatsApp Number">
            <button class="btn-gold" id="pub" onclick="doPublish()">Publish</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IB = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user'), isAdm = false, items = [], curC = "All";

        window.onload = () => { if(user) start(); loadC(); loadI(); loadS(); };

        function start() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('uDisp').innerText = user;
            if(user === 'aureum') document.getElementById('admLink').style.display = 'flex';
        }

        function toggleAdm() { isAdm = !isAdm; document.getElementById('admIcon').style.color = isAdm ? '#dfbc74' : '#111'; }
        function doLogin() {
            let u = document.getElementById('lU').value, p = document.getElementById('lP').value;
            if(isAdm) {
                if(u==='aureum' && p==='1234') { localStorage.setItem('user',u); location.reload(); }
                else alert("Admin Error");
            } else {
                db.ref('users/'+u).once('value', s => { if(s.val()===p){ localStorage.setItem('user',u); location.reload(); } else alert("Failed"); });
            }
        }
        function toggleAuth(m) {
            document.getElementById('logIn').style.display = m==='log'?'block':'none';
            document.getElementById('regIn').style.display = m==='reg'?'block':'none';
        }
        function doRegister() { db.ref('users/'+document.getElementById('rU').value).set(document.getElementById('rP').value).then(()=>toggleAuth('log')); }
        function logout() { localStorage.clear(); location.reload(); }

        // --- Core Functions ---
        function loadI() {
            db.ref('items').on('value', s => {
                items = [];
                s.forEach(c => items.push({id: c.key, ...c.val()}));
                renderApp();
            });
        }

        function renderApp() {
            let s = document.getElementById('sInp').value.toLowerCase();
            let fil = items.filter(i => (curC === "All" || i.cat === curC) && i.title.toLowerCase().includes(s));
            fil.sort((a,b) => (b.pin - a.pin) || (b.time - a.time));

            document.getElementById('mGrid').innerHTML = fil.map(i => `
                <div class="card" onclick="view('${i.id}')">
                    ${i.pin ? '<div class="pin-tag">PINNED</div>' : ''}
                    <img src="${i.img}">
                    <div class="card-info">
                        <div class="card-title">${i.title}</div>
                        <div class="card-price">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');

            let mine = items.filter(i => i.owner === user);
            document.getElementById('myGrid').innerHTML = mine.map(i => `
                <div class="card">
                    <img src="${i.img}">
                    <div class="card-info">
                        <div class="card-title">${i.title}</div>
                        <button onclick="delPost('${i.id}')" style="width:100%; padding:5px; background:red; color:white; border:none; border-radius:5px; font-size:10px;">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function view(id) {
            let i = items.find(x => x.id === id);
            document.getElementById('detBody').innerHTML = `
                <img src="${i.img}" style="width:100%; border-radius:15px; margin-bottom:20px;">
                <h2>${i.title}</h2>
                <h3 style="color:var(--primary); margin:10px 0;">Rs. ${parseInt(i.price).toLocaleString()}</h3>
                <p style="color:gray; line-height:1.6;">${i.desc}</p><br>
                <button class="btn-gold" style="background:#25D366; color:white;" onclick="window.open('https://wa.me/94${i.wa}')">WhatsApp Seller</button>
                ${user === 'aureum' ? `<button class="btn-gold" style="margin-top:10px;" onclick="pinPost('${id}')">Pin Ad</button>` : ''}
            `;
            toggleOverlay('detOverlay', true);
        }

        async function doPublish() {
            let f = document.getElementById('fi').files[0]; if(!f) return;
            let b = document.getElementById('pub'); b.innerText = "..."; b.disabled = true;
            let fd = new FormData(); fd.append("image", f);
            let res = await fetch("https://api.imgbb.com/1/upload?key="+IB, { method: "POST", body: fd });
            let d = await res.json();
            if(d.success) {
                db.ref('items').push({
                    title: document.getElementById('ti').value,
                    price: document.getElementById('pr').value,
                    cat: document.getElementById('ca').value,
                    desc: document.getElementById('de').value,
                    wa: document.getElementById('wa').value,
                    img: d.data.url, owner: user, time: Date.now(), pin: false
                }).then(() => location.reload());
            }
        }

        // --- Support & Admin ---
        function loadS() {
            db.ref('sup').on('value', s => {
                let data = s.val() || { name: "Aureum Support", num: "000000000" };
                document.getElementById('supNameDisp').innerText = data.name;
                document.getElementById('supNumDisp').innerText = "+94 " + data.num;
                document.getElementById('supWA').onclick = () => window.open('https://wa.me/94' + data.num);
                // Admin fields
                document.getElementById('admSupName').value = data.name;
                document.getElementById('admSupNum').value = data.num;
            });
        }
        function updateSup() {
            let n = document.getElementById('admSupName').value;
            let m = document.getElementById('admSupNum').value;
            db.ref('sup').set({ name: n, num: m }).then(()=>alert("Support Updated"));
        }

        function loadC() {
            db.ref('cats').on('value', s => {
                let l = ["All"]; if(s.exists()) s.forEach(c => l.push(c.val()));
                document.getElementById('cBar').innerHTML = l.map(c => `<div class="cat-chip ${curC===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('ca').innerHTML = l.filter(x=>x!=="All").map(c => `<option>${c}</option>`).join('');
                if(user === 'aureum') {
                    let h = ''; s.forEach(c => h += `<div style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.05); border-radius:10px; margin-bottom:5px;">${c.val()} <i class="fas fa-trash" onclick="db.ref('cats/${c.key}').remove()"></i></div>`);
                    document.getElementById('admCList').innerHTML = h;
                }
            });
        }
        function setCat(c) { curC = c; loadC(); renderApp(); }
        function addC() { let v = document.getElementById('nC').value; if(v) db.ref('cats').push(v); document.getElementById('nC').value=""; }
        
        function delPost(id) { if(confirm("Delete?")) db.ref('items/'+id).remove(); }
        function pinPost(id) { let i = items.find(x=>x.id===id); db.ref('items/'+id).update({pin: !i.pin}); toggleOverlay('detOverlay', false); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).classList.toggle('active', s); toggleMenu(false); }
        function openSell() { document.getElementById('sellModal').style.display='flex'; toggleMenu(false); }
    </script>
</body>
</html>
