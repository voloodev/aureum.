<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(25px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        header { padding: 20px 5%; position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 3px; }
        
        .search-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin-top: 15px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-item { padding: 8px 18px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-item.active { background: var(--primary); color: black; font-weight: 700; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; cursor: pointer; position: relative; transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 12px; }
        .pin-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); color: black; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: var(--blur); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 450px; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; scrollbar-width: none; }

        .input-glass, select, textarea { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 15px; margin-bottom: 12px; outline: none; }
        .btn-gold { width: 100%; padding: 16px; background: var(--primary); color: black; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }

        /* Floating Action Icons on View */
        .post-actions { position: absolute; right: 15px; top: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .action-icon { width: 40px; height: 40px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--glass-border); color: white; transition: 0.3s; }
        .action-icon:hover { background: var(--primary); color: black; }

        .slider-box { width: 100%; aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; position: relative; background: #000; margin-bottom: 20px; }
        .slider-box img { width: 100%; height: 100%; object-fit: cover; }

        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); z-index: 4000; transition: 0.4s; padding: 40px 20px; }
        #sideMenu.active { right: 0; }
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; border-radius: 12px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; }
        .menu-link:hover { background: var(--primary); color: black; }

        .pre-img-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .pre-img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="authOverlay" class="overlay" style="display: flex;">
        <div class="glass-panel" style="text-align: center;">
            <i class="fas fa-shield-alt" style="position:absolute; top:20px; right:20px; opacity:0.2; cursor:pointer;" onclick="shieldLogin()"></i>
            <h1 style="color:var(--primary); margin-bottom:30px; letter-spacing: 4px;">AUREUM</h1>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-gold" onclick="login()">SIGN IN</button>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo">AUREUM</div>
            <i class="fas fa-bars-staggered fa-lg" onclick="toggleMenu(true)" style="cursor:pointer;"></i>
        </div>
        <div class="search-bar">
            <i class="fas fa-search" style="color:#555;"></i>
            <input type="text" id="searchInput" placeholder="Search products..." oninput="renderGrid()">
        </div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <div class="grid" id="marketGrid"></div>

    <div id="viewLayer" class="overlay">
        <div class="glass-panel" style="max-width: 500px; padding-top: 0; padding-left: 0; padding-right: 0; overflow: hidden;">
            <div class="post-actions">
                <div class="action-icon" onclick="wishPost()"><i class="fas fa-heart" style="color:#ff4d4d;"></i></div>
                <div class="action-icon" onclick="addToCart()"><i class="fas fa-shopping-cart"></i></div>
                <div class="action-icon admin-only" onclick="pinPost()"><i class="fas fa-thumbtack"></i></div>
                <div class="action-icon admin-only" onclick="deletePost()" style="color:#ff4d4d;"><i class="fas fa-trash"></i></div>
                <div class="action-icon" onclick="toggleOverlay('viewLayer', false)"><i class="fas fa-times"></i></div>
            </div>
            <div class="slider-box" style="border-radius: 0 0 30px 30px;">
                <img id="vImg" src="">
            </div>
            <div style="padding: 0 25px 25px 25px;">
                <h2 id="vTitle" style="margin-bottom: 5px;"></h2>
                <h3 id="vPrice" style="color:var(--primary); margin-bottom: 15px;"></h3>
                <p id="vDesc" style="color:#aaa; font-size:14px; margin-bottom:20px; line-height:1.6;"></p>
                <button class="btn-gold" id="vWA">Contact Seller</button>
            </div>
        </div>
    </div>

    <div id="sellModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('sellModal', false)"></i>
            <h3 style="color:var(--primary); margin-bottom:20px;">New Listing</h3>
            
            <button class="btn-gold" style="background:#333; color:white; margin-bottom:15px;" onclick="document.getElementById('fileIn').click()">
                <i class="fas fa-images"></i> ADD IMAGES
            </button>
            <input type="file" id="fileIn" multiple hidden onchange="previewImages()">
            <div class="pre-img-grid" id="imgPre"></div>

            <input type="text" id="pName" class="input-glass" placeholder="Product Title">
            <input type="number" id="pPrice" class="input-glass" placeholder="Price (Rs.)">
            <select id="pCat" class="input-glass"></select>
            <textarea id="pDescIn" class="input-glass" placeholder="Description..." rows="3"></textarea>
            <input type="text" id="pWAIn" class="input-glass" placeholder="WhatsApp (07xxxxxxxx)">
            
            <button class="btn-gold" id="pubBtn" onclick="publish()">PUBLISH NOW</button>
        </div>
    </div>

    <div id="sideMenu">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleMenu(false)"></i>
        <div style="margin-top:40px;">
            <div class="menu-link" style="background:var(--glass);"><i class="fas fa-user"></i> <span id="uDisp">User</span></div>
            <div class="menu-link" onclick="openModal('sellModal')"><i class="fas fa-plus-circle"></i> Publish Ad</div>
            <div class="menu-link" onclick="openCart()"><i class="fas fa-shopping-basket"></i> My Cart</div>
            <div class="menu-link admin-only" onclick="openAdminSettings()"><i class="fas fa-cog"></i> Admin Settings</div>
            <div class="menu-link" onclick="logout()" style="color:#ff4d4d; margin-top:20px;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let isAdmin = localStorage.getItem('isAdmin') === 'true';
        let allItems = [], curId = '';
        let currentCat = 'All';

        window.onload = () => {
            if(user) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('uDisp').innerText = user;
                if(isAdmin) document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'flex');
            }
            loadCats(); loadItems();
        };

        function shieldLogin() {
            let key = prompt("Enter Shield Key:");
            if(key === '0000') { // Your shield key
                localStorage.setItem('user', 'admin');
                localStorage.setItem('isAdmin', 'true');
                location.reload();
            }
        }

        function login() {
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val() === p) {
                    localStorage.setItem('user', u);
                    localStorage.setItem('isAdmin', u === 'admin');
                    location.reload();
                }
            });
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid();
            });
        }

        function renderGrid() {
            let filtered = allItems.filter(i => (currentCat==='All' || i.cat===currentCat));
            filtered.sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.time - a.time);
            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="card" onclick="viewPost('${i.id}')">
                    ${i.pinned ? '<div class="pin-tag">PINNED</div>' : ''}
                    <img src="${i.imgs ? i.imgs[0] : i.img}">
                    <div class="card-info">
                        <div style="font-size:13px; font-weight:600;">${i.name}</div>
                        <div style="color:var(--primary); font-weight:800; margin-top:5px;">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function viewPost(id) {
            let i = allItems.find(x => x.id === id); curId = id;
            document.getElementById('vTitle').innerText = i.name;
            document.getElementById('vPrice').innerText = "Rs. " + parseInt(i.price).toLocaleString();
            document.getElementById('vDesc').innerText = i.desc;
            document.getElementById('vImg').src = i.imgs ? i.imgs[0] : i.img;
            document.getElementById('vWA').onclick = () => window.open('https://wa.me/'+i.wa);
            toggleOverlay('viewLayer', true);
        }

        function deletePost() { if(confirm("Delete this?")) { db.ref('items/'+curId).remove(); toggleOverlay('viewLayer', false); } }
        function pinPost() { let i = allItems.find(x => x.id === curId); db.ref('items/'+curId).update({pinned: !i.pinned}); toggleOverlay('viewLayer', false); }
        function wishPost() { alert("Added to Wishlist!"); }

        function previewImages() {
            let files = document.getElementById('fileIn').files;
            let pre = document.getElementById('imgPre'); pre.innerHTML = '';
            for(let f of files) {
                let r = new FileReader(); r.onload = (e) => pre.innerHTML += `<img src="${e.target.result}" class="pre-img">`;
                r.readAsDataURL(f);
            }
        }

        async function publish() {
            let files = document.getElementById('fileIn').files;
            if(!files.length) return alert("Add images");
            let btn = document.getElementById('pubBtn'); btn.innerText = "Publishing...";
            let urls = [];
            for(let f of files) {
                let fd = new FormData(); fd.append("image", f);
                let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
                let d = await res.json(); if(d.success) urls.push(d.data.url);
            }
            db.ref('items').push({
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDescIn').value,
                wa: document.getElementById('pWAIn').value,
                imgs: urls, time: Date.now(), pinned: false
            });
            location.reload();
        }

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All']; s.forEach(c => cats.push(c.val()));
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-item ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option value="${c}">${c}</option>`).join('');
            });
        }
        function setCat(c) { currentCat = c; renderGrid(); loadCats(); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function openModal(id) { toggleOverlay(id, true); toggleMenu(false); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
