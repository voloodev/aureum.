<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- Header --- */
        header { padding: 20px 5%; position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.85); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 3px; cursor: pointer; }
        
        .search-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin-top: 15px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-item { padding: 8px 18px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-item.active { background: var(--primary); color: black; font-weight: 700; }

        /* --- Grid --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; cursor: pointer; position: relative; transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 12px; }
        .pin-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); color: black; padding: 3px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; }
        .wish-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 10px; font-size: 11px; color: #ff4d4d; border: 1px solid rgba(255,255,255,0.1); }

        /* --- Glass Overlays --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 450px; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px; position: relative; max-height: 85vh; overflow-y: auto; scrollbar-width: none; }
        .glass-panel::-webkit-scrollbar { display: none; }

        .input-glass, select, textarea { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 12px; margin-bottom: 12px; outline: none; }
        .btn-gold { width: 100%; padding: 16px; background: var(--primary); color: black; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* --- Slider UI --- */
        .slider-container { width: 100%; aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; position: relative; background: #000; margin-bottom: 15px; }
        .slider-container img { width: 100%; height: 100%; object-fit: cover; }
        .slide-ctrl { position: absolute; top: 50%; transform: translateY(-50%); width: 35px; height: 35px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* Floating Action Buttons for Admin */
        .fab-admin { position: absolute; right: 15px; display: flex; flex-direction: column; gap: 10px; top: 15px; z-index: 10; }
        .fab-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .fab-btn:hover { background: var(--primary); color: black; }

        /* --- Side Menu --- */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(10,10,10,0.95); backdrop-filter: blur(25px); border-left: 1px solid var(--glass-border); z-index: 4000; transition: 0.4s; padding: 40px 20px; }
        #sideMenu.active { right: 0; }
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; border-radius: 12px; cursor: pointer; margin-bottom: 5px; transition: 0.3s; }
        .menu-link:hover, .menu-link.active { background: var(--primary); color: black; font-weight: 700; }

        .image-preview-area { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .pre-img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <div id="authOverlay" class="overlay" style="display: flex;">
        <div class="glass-panel" style="text-align: center;">
            <i class="fas fa-shield-alt" style="position:absolute; top:20px; right:20px; opacity:0.2; cursor:pointer;" onclick="adminLoginPrompt()"></i>
            <h1 style="color:var(--primary); margin-bottom:30px; letter-spacing: 4px;">AUREUM</h1>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-gold" onclick="login()">SIGN IN</button>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo" onclick="location.reload()">AUREUM</div>
            <i class="fas fa-bars-staggered fa-lg" onclick="toggleMenu(true)" style="cursor:pointer;"></i>
        </div>
        <div class="search-bar">
            <i class="fas fa-search" style="color:#555;"></i>
            <input type="text" id="searchInput" placeholder="Search premium items..." oninput="renderGrid()">
        </div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <div class="grid" id="marketGrid"></div>

    <div id="viewLayer" class="overlay">
        <div class="glass-panel">
            <div class="fab-admin">
                <div class="fab-btn" onclick="toggleWish()"><i class="fas fa-heart" id="vHeart" style="color:#ff4d4d;"></i></div>
                <div class="fab-btn admin-only" onclick="togglePin()"><i class="fas fa-thumbtack" id="vPin"></i></div>
                <div class="fab-btn admin-only" onclick="deletePost()" style="color:#ff4d4d;"><i class="fas fa-trash"></i></div>
                <div class="fab-btn" onclick="toggleOverlay('viewLayer', false)"><i class="fas fa-times"></i></div>
            </div>

            <div class="slider-container">
                <img id="vImg" src="">
                <div class="slide-ctrl" style="left:10px;" onclick="changeSlide(-1)"><i class="fas fa-chevron-left"></i></div>
                <div class="slide-ctrl" style="right:10px;" onclick="changeSlide(1)"><i class="fas fa-chevron-right"></i></div>
            </div>

            <h2 id="vTitle" style="color:var(--primary);"></h2>
            <h3 id="vPrice" style="margin:10px 0;"></h3>
            <p id="vDesc" style="color:#aaa; font-size:14px; line-height:1.6; margin-bottom:20px;"></p>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-gold" onclick="addToCart()"><i class="fas fa-shopping-cart"></i> ADD TO CART</button>
                <button class="btn-gold" style="background:#25D366; color:white;" id="vWA"><i class="fab fa-whatsapp"></i> WHATSAPP</button>
            </div>
        </div>
    </div>

    <div id="sellModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('sellModal', false)"></i>
            <h3 style="color:var(--primary); margin-bottom:20px;">New Listing</h3>
            
            <button class="btn-gold" style="background:#222; color:white; margin-bottom:15px;" onclick="document.getElementById('fileIn').click()">
                <i class="fas fa-images"></i> ADD IMAGES
            </button>
            <input type="file" id="fileIn" multiple hidden onchange="previewImages()">
            <div class="image-preview-area" id="imgPre"></div>

            <input type="text" id="pName" class="input-glass" placeholder="Title">
            <input type="number" id="pPrice" class="input-glass" placeholder="Price (Rs.)">
            <select id="pCat" class="input-glass"></select>
            <textarea id="pDescIn" class="input-glass" placeholder="Description..." rows="3"></textarea>
            <input type="text" id="pWAIn" class="input-glass" placeholder="WhatsApp Number">
            <button class="btn-gold" id="pubBtn" onclick="publish()">PUBLISH NOW</button>
        </div>
    </div>

    <div id="adminModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('adminModal', false)"></i>
            <h3 style="color:var(--primary); margin-bottom:20px;">Admin Console</h3>
            
            <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:15px;">
                <h4 style="font-size:12px; margin-bottom:10px; color:#777;">SUPPORT DETAILS</h4>
                <input type="text" id="supName" class="input-glass" placeholder="Support Name">
                <input type="text" id="supNum" class="input-glass" placeholder="Support Number">
                <button class="btn-gold" style="padding:10px; font-size:12px;" onclick="updateSupport()">Update Support</button>
            </div>

            <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px;">
                <h4 style="font-size:12px; margin-bottom:10px; color:#777;">MANAGE CATEGORIES</h4>
                <div id="catManageList" style="margin-bottom:10px;"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="newCatIn" class="input-glass" style="margin:0;" placeholder="New Category">
                    <button class="btn-gold" style="width:50px;" onclick="addCat()"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="sideMenu">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleMenu(false)"></i>
        <div style="margin-top:40px;">
            <div class="menu-link" style="background:var(--glass); pointer-events:none;"><i class="fas fa-user-circle"></i> <span id="uDisp">User</span></div>
            <div class="menu-link" onclick="openModal('sellModal')"><i class="fas fa-plus-circle"></i> Publish Ad</div>
            <div class="menu-link" onclick="openCart()"><i class="fas fa-shopping-basket"></i> My Cart</div>
            <div class="menu-link" onclick="openMyPosts()"><i class="fas fa-box"></i> My Posts</div>
            <div class="menu-link admin-only" onclick="openModal('adminModal')"><i class="fas fa-cog"></i> Admin Settings</div>
            <div class="menu-link" onclick="showSupport()"><i class="fas fa-headset"></i> Customer Support</div>
            <div class="menu-link" onclick="logout()" style="color:#ff4d4d; margin-top:20px;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <div id="cartModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('cartModal', false)"></i>
            <h3>My Cart</h3><br>
            <div id="cartList"></div>
        </div>
    </div>

    <script>
        // --- Firebase & Init ---
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let isAdmin = localStorage.getItem('isAdmin') === 'true';
        let allItems = [], curId = '', curImgs = [], curIdx = 0;
        let currentCat = 'All';

        window.onload = () => {
            if(user) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('uDisp').innerText = user;
                if(isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
                else document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            }
            loadCats(); loadItems(); loadSupport();
        };

        // --- Core Functions ---
        function login() {
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val() === p) {
                    localStorage.setItem('user', u);
                    localStorage.setItem('isAdmin', u === 'admin');
                    location.reload();
                }
            });
        }

        function adminLoginPrompt() {
            let k = prompt("Enter Shield Key:");
            if(k === '0000') { localStorage.setItem('user', 'admin'); localStorage.setItem('isAdmin', 'true'); location.reload(); }
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => (currentCat==='All' || i.cat===currentCat) && i.name.toLowerCase().includes(term));
            
            // Sort: Pinned first, then time
            filtered.sort((a,b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || b.time - a.time);

            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="card" onclick="viewPost('${i.id}')">
                    ${i.pinned ? '<div class="pin-tag"><i class="fas fa-thumbtack"></i> PINNED</div>' : ''}
                    <div class="wish-tag"><i class="fas fa-heart"></i> ${i.wishes || 0}</div>
                    <img src="${i.imgs ? i.imgs[0] : i.img}">
                    <div class="card-info">
                        <div style="font-size:13px; font-weight:600; color:#eee;">${i.name}</div>
                        <div style="color:var(--primary); font-weight:800; margin-top:5px;">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function viewPost(id) {
            let i = allItems.find(x => x.id === id);
            curId = id; curImgs = i.imgs || [i.img]; curIdx = 0;
            
            document.getElementById('vTitle').innerText = i.name;
            document.getElementById('vPrice').innerText = "Rs. " + parseInt(i.price).toLocaleString();
            document.getElementById('vDesc').innerText = i.desc || "No description provided.";
            document.getElementById('vImg').src = curImgs[0];
            document.getElementById('vPin').style.color = i.pinned ? '#dfbc74' : 'white';
            document.getElementById('vWA').onclick = () => window.open('https://wa.me/'+i.wa);
            
            toggleOverlay('viewLayer', true);
        }

        function changeSlide(dir) {
            curIdx = (curIdx + dir + curImgs.length) % curImgs.length;
            document.getElementById('vImg').src = curImgs[curIdx];
        }

        // --- Admin Actions ---
        function togglePin() {
            let i = allItems.find(x => x.id === curId);
            db.ref('items/'+curId).update({ pinned: !i.pinned });
            toggleOverlay('viewLayer', false);
        }

        function toggleWish() {
            let i = allItems.find(x => x.id === curId);
            db.ref('items/'+curId).update({ wishes: (i.wishes || 0) + 1 });
            alert("Added to Wishlist!");
        }

        function deletePost() {
            if(confirm("Delete this post forever?")) {
                db.ref('items/'+curId).remove();
                toggleOverlay('viewLayer', false);
            }
        }

        // --- Settings & Support ---
        function loadSupport() {
            db.ref('settings/support').on('value', s => {
                if(s.exists()) {
                    let d = s.val();
                    document.getElementById('supName').value = d.name;
                    document.getElementById('supNum').value = d.num;
                }
            });
        }

        function updateSupport() {
            db.ref('settings/support').set({
                name: document.getElementById('supName').value,
                num: document.getElementById('supNum').value
            });
            alert("Support details updated!");
        }

        function addCat() {
            let c = document.getElementById('newCatIn').value;
            if(c) db.ref('categories').push(c).then(() => document.getElementById('newCatIn').value = '');
        }

        function removeCat(id) {
            db.ref('categories/'+id).remove();
        }

        // --- UI & Helpers ---
        function previewImages() {
            let files = document.getElementById('fileIn').files;
            let pre = document.getElementById('imgPre');
            pre.innerHTML = '';
            for(let f of files) {
                let reader = new FileReader();
                reader.onload = (e) => pre.innerHTML += `<img src="${e.target.result}" class="pre-img">`;
                reader.readAsDataURL(f);
            }
        }

        async function publish() {
            let files = document.getElementById('fileIn').files;
            if(!files.length) return alert("Select images!");
            let btn = document.getElementById('pubBtn');
            btn.innerText = "Uploading..."; btn.disabled = true;

            let urls = [];
            for(let f of files) {
                let fd = new FormData(); fd.append("image", f);
                let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
                let d = await res.json();
                if(d.success) urls.push(d.data.url);
            }

            db.ref('items').push({
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDescIn').value,
                wa: document.getElementById('pWAIn').value,
                imgs: urls, seller: user, time: Date.now(), wishes: 0, pinned: false
            });
            location.reload();
        }

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = [{id:'all', val:'All'}];
                let manageHtml = '';
                s.forEach(c => { 
                    cats.push({id:c.key, val:c.val()}); 
                    manageHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:13px;"><span>${c.val()}</span><i class="fas fa-times" onclick="removeCat('${c.key}')" style="color:#ff4d4d; cursor:pointer;"></i></div>`;
                });
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-item ${currentCat===c.val?'active':''}" onclick="setCat('${c.val}')">${c.val}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c.val!=='All').map(c => `<option value="${c.val}">${c.val}</option>`).join('');
                document.getElementById('catManageList').innerHTML = manageHtml;
            });
        }

        function setCat(c) { currentCat = c; renderGrid(); loadCats(); }
        function openModal(id) { toggleOverlay(id, true); toggleMenu(false); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
        function showSupport() {
            db.ref('settings/support').once('value', s => {
                let d = s.val();
                alert(`Customer Support\nName: ${d.name}\nWhatsApp: ${d.num}`);
            });
        }

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if(!cart.includes(curId)) { cart.push(curId); localStorage.setItem('cart', JSON.stringify(cart)); alert("Added to Cart!"); }
        }

        function openCart() {
            let cartIds = JSON.parse(localStorage.getItem('cart') || '[]');
            let items = allItems.filter(i => cartIds.includes(i.id));
            document.getElementById('cartList').innerHTML = items.map(i => `
                <div style="display:flex; gap:15px; background:var(--glass); padding:10px; border-radius:15px; margin-bottom:10px; align-items:center;">
                    <img src="${i.imgs?i.imgs[0]:i.img}" style="width:50px; height:50px; border-radius:10px; object-fit:cover;">
                    <div style="flex:1;"><div style="font-size:13px;">${i.name}</div><div style="color:var(--primary); font-size:12px;">Rs. ${i.price}</div></div>
                    <i class="fas fa-trash" onclick="removeFromCart('${i.id}')" style="color:#ff4d4d; cursor:pointer;"></i>
                </div>
            `).join('');
            openModal('cartModal');
        }

        function removeFromCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            localStorage.setItem('cart', JSON.stringify(cart.filter(x => x !== id)));
            openCart();
        }
    </script>
</body>
</html>
