<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #dfbc74; 
            --bg-dark: #18181a;
            --surface: #242426;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --glass: rgba(36, 36, 38, 0.85);
            --blur: blur(25px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- Header & Navigation --- */
        nav { display: none; justify-content: space-between; align-items: center; padding: 10px 5%; background: var(--glass); backdrop-filter: var(--blur); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000; height: 70px; }
        .logo { font-weight: 700; color: var(--primary); letter-spacing: 1px; font-size: 20px; cursor: pointer; }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .admin-trigger { color: var(--text-muted); cursor: pointer; font-size: 18px; }

        .hamburger { cursor: pointer; background: none; border: none; padding: 5px; display: flex; flex-direction: column; gap: 5px; }
        .hamburger span { display: block; width: 22px; height: 2px; background: white; border-radius: 2px; }

        /* --- Category Scroll Bar --- */
        .cat-scroll-container { 
            padding: 15px 5%; 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            white-space: nowrap; 
            scrollbar-width: none; 
        }
        .cat-scroll-container::-webkit-scrollbar { display: none; }
        
        .cat-pill { 
            padding: 8px 18px; 
            border: 1px solid var(--primary); 
            border-radius: 20px; 
            color: var(--text-main); 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .cat-pill.active { background: var(--primary); color: #000; }

        /* --- Masonry Pinterest Grid --- */
        .wrapper { max-width: 1400px; margin: 0 auto; padding: 0 15px; }
        .masonry-grid { 
            column-count: 2; 
            column-gap: 15px; 
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }

        .pin-card { 
            break-inside: avoid; 
            margin-bottom: 15px; 
            background: var(--surface); 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid #333; 
            cursor: pointer; 
            position: relative; 
        }
        .pin-card img { width: 100%; display: block; border-radius: 16px 16px 0 0; }
        .pin-title { padding: 12px; font-size: 13px; font-weight: 600; }

        /* --- Side Menu & Overlays --- */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 280px; height: 100vh; background: var(--glass); backdrop-filter: var(--blur); z-index: 2000; transition: right 0.4s ease; padding: 20px; display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.05); }
        #sideMenu.active { right: 0; }
        
        .menu-items { flex-grow: 1; margin-top: 20px; }
        .logout-box { margin-bottom: 40px; padding: 15px; background: rgba(255, 59, 48, 0.15); border-radius: 12px; text-align: center; color: #ff3b30; cursor: pointer; font-weight: 700; }

        .slide-overlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 90vh; background: #1c1c1e; border-radius: 30px 30px 0 0; z-index: 3000; transition: bottom 0.4s ease; padding: 25px; overflow-y: auto; }
        .slide-overlay.active { bottom: 0; }
        
        .exit-btn { font-size: 24px; color: var(--text-muted); cursor: pointer; float: right; }

        /* Auth */
        #authOverlay { position: fixed; inset: 0; z-index: 5000; background: #0a0a0c; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { width: 100%; max-width: 360px; background: var(--surface); border-radius: 24px; padding: 40px; text-align: center; }
        .auth-input { width: 100%; background: #1c1c1e; border: 1px solid #333; color: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; outline: none; }
        .btn-gold { width: 100%; background: var(--primary); color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box" id="loginBox">
            <h1 style="color:var(--primary); margin-bottom:30px;">AUREUM</h1>
            <input type="text" id="logUser" class="auth-input" placeholder="Username">
            <input type="password" id="logPass" class="auth-input" placeholder="Password">
            <button class="btn-gold" onclick="login()">Login</button>
            <p onclick="toggleAuth('create')" style="margin-top:20px; font-size:12px; color:var(--text-muted); cursor:pointer;">New User? Create Account</p>
        </div>
        <div class="auth-box" id="createBox" style="display:none;">
            <i class="fas fa-times exit-btn" onclick="toggleAuth('login')" style="margin-bottom: 20px;"></i>
            <h2>Join Us</h2>
            <input type="text" id="regUser" class="auth-input" placeholder="Username">
            <input type="password" id="regPass" class="auth-input" placeholder="Password">
            <button class="btn-gold" onclick="register()">Register</button>
        </div>
    </div>

    <nav id="mainNav">
        <div class="logo" onclick="location.reload()">AUREUM</div>
        <div class="nav-right">
            <i class="fas fa-shield-alt admin-trigger" onclick="adminPrompt()"></i>
            <button class="hamburger" onclick="toggleMenu(true)"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div id="sideMenu">
        <i class="fas fa-times exit-btn" onclick="toggleMenu(false)"></i>
        <div class="menu-items">
            <p style="color:var(--primary); margin-bottom:20px; font-weight:700;">Hello, <span id="profName"></span></p>
            <div class="menu-item" style="cursor:pointer; padding:12px 0;" onclick="openModal('sellModal'); toggleMenu(false)">Sell Item</div>
            <div class="menu-item" style="cursor:pointer; padding:12px 0;" onclick="toggleOverlay('cartOverlay', true); toggleMenu(false)">My Cart</div>
            <div class="menu-item" style="cursor:pointer; padding:12px 0;" onclick="toggleOverlay('wishOverlay', true); toggleMenu(false)">Wishlist</div>
            <div class="menu-item" style="cursor:pointer; padding:12px 0;" onclick="toggleOverlay('myPostsOverlay', true); toggleMenu(false)">My Posts</div>
            <div class="menu-item" style="cursor:pointer; padding:12px 0;" onclick="toggleOverlay('contactOverlay', true); toggleMenu(false)">Contact Admin</div>
            <div id="adminLink" style="display:none; color:var(--primary); cursor:pointer; padding:12px 0;" onclick="toggleOverlay('adminOverlay', true); toggleMenu(false)">Admin Settings</div>
        </div>
        <div class="logout-box" onclick="logout()">Logout</div>
    </div>

    <div class="cat-scroll-container" id="catBar"></div>

    <div class="wrapper">
        <div class="masonry-grid" id="marketGrid"></div>
    </div>

    <div id="postOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('postOverlay', false)"></i>
        <div id="postContent" style="margin-top:40px;">
            <img id="detImg" style="width:100%; border-radius:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                <h1 id="detTitle"></h1>
                <i id="detWish" class="fas fa-heart" style="font-size:24px; cursor:pointer;"></i>
            </div>
            <p id="detPrice" style="color:var(--primary); font-size:22px; font-weight:700; margin:10px 0;"></p>
            <p id="detDesc" style="color:var(--text-muted); line-height:1.6;"></p>
            <br>
            <a id="detWA" href="#" class="btn-gold" style="display:block; text-align:center; text-decoration:none; background:#25D366; color:white;">WhatsApp Seller</a>
            <button id="addCartBtn" class="btn-gold" style="margin-top:10px; background:none; border:1px solid var(--primary); color:var(--primary);">Add to Cart</button>
            <button id="admDelBtn" class="btn-gold" style="display:none; margin-top:10px; background:#ff3b30; color:white; border:none;">Delete Post (Admin)</button>
        </div>
    </div>

    <div id="adminOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('adminOverlay', false)"></i>
        <h2>Admin Management</h2>
        <div style="margin-top:30px;">
            <h4>Categories</h4>
            <div style="display:flex; gap:10px; margin:10px 0;">
                <input type="text" id="newCatIn" class="auth-input" style="margin:0;">
                <button class="btn-gold" style="width:80px;" onclick="addCategory()">Add</button>
            </div>
            <div id="admCatList"></div>
        </div>
    </div>

    <div id="contactOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('contactOverlay', false)"></i>
        <div style="text-align:center; margin-top:100px;">
            <h2 id="admDispName">Admin</h2>
            <p id="admDispWA" style="font-size:20px; color:var(--primary); margin-top:10px;"></p>
        </div>
    </div>

    <div id="myPostsOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('myPostsOverlay', false)"></i>
        <h2>My Items</h2>
        <div id="myPostsList" style="margin-top:20px;"></div>
    </div>
    
    <div id="cartOverlay" class="slide-overlay"><i class="fas fa-times exit-btn" onclick="toggleOverlay('cartOverlay', false)"></i><h2>Cart</h2><div id="cartList"></div></div>
    <div id="wishOverlay" class="slide-overlay"><i class="fas fa-times exit-btn" onclick="toggleOverlay('wishOverlay', false)"></i><h2>Wishlist</h2><div id="wishList"></div></div>

    <div id="sellModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:4000; align-items:center; justify-content:center; padding:20px;">
        <div class="auth-box">
            <i class="fas fa-times exit-btn" onclick="closeModal('sellModal')" style="margin-bottom:20px;"></i>
            <h3>Post New Item</h3>
            <input type="file" id="fileIn" style="margin:15px 0; font-size:12px;">
            <input type="text" id="pName" class="auth-input" placeholder="Item Name">
            <input type="text" id="pPrice" class="auth-input" placeholder="Price">
            <select id="pCat" class="auth-input"></select>
            <textarea id="pDesc" class="auth-input" placeholder="Description"></textarea>
            <input type="text" id="pWA" class="auth-input" placeholder="WhatsApp">
            <button class="btn-gold" onclick="publish()">Publish</button>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('aureum_users')) || { 'aureum': '1234' };
        let adminInfo = JSON.parse(localStorage.getItem('aureum_admin_info')) || { name: 'Admin', wa: '+94 77 123 4567' };
        let categories = JSON.parse(localStorage.getItem('aureum_cats')) || ['All', 'Bikes', 'Cars', 'Electronics', 'Luxury'];
        let currentUser = localStorage.getItem('aureum_session');
        let currentFilter = 'All';
        let wishlist = JSON.parse(localStorage.getItem('aureum_wish')) || [];

        window.onload = () => { 
            if(currentUser) startApp(); 
            renderCats(); 
            document.getElementById('admDispName').innerText = adminInfo.name;
            document.getElementById('admDispWA').innerText = adminInfo.wa;
        };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainNav').style.display = 'flex';
            document.getElementById('profName').innerText = currentUser;
            if(currentUser === 'aureum') document.getElementById('adminLink').style.display = 'block';
            renderGrid();
        }

        function renderCats() {
            const bar = document.getElementById('catBar');
            bar.innerHTML = categories.map(c => `
                <div class="cat-pill ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</div>
            `).join('');
            document.getElementById('pCat').innerHTML = categories.filter(c => c !== 'All').map(c => `<option>${c}</option>`).join('');
        }

        function setFilter(c) {
            currentFilter = c;
            renderCats();
            renderGrid();
        }

        function renderGrid() {
            let items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            let filtered = currentFilter === 'All' ? items : items.filter(i => i.cat === currentFilter);
            
            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="pin-card" onclick="openPost(${i.id})">
                    <img src="${i.img}">
                    <div class="pin-title">${i.name}</div>
                </div>
            `).join('');
        }

        function openPost(id) {
            let items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            let item = items.find(i => i.id === id);
            document.getElementById('detImg').src = item.img;
            document.getElementById('detTitle').innerText = item.name;
            document.getElementById('detPrice').innerText = item.price;
            document.getElementById('detDesc').innerText = item.desc;
            document.getElementById('detWA').href = `https://wa.me/${item.wa.replace(/\D/g,'')}`;
            
            let wish = document.getElementById('detWish');
            wish.style.color = wishlist.includes(id) ? '#ff3b30' : 'white';
            wish.onclick = () => {
                if(wishlist.includes(id)) wishlist = wishlist.filter(x => x !== id);
                else wishlist.push(id);
                localStorage.setItem('aureum_wish', JSON.stringify(wishlist));
                openPost(id);
            };

            let delBtn = document.getElementById('admDelBtn');
            delBtn.style.display = (currentUser === 'aureum') ? 'block' : 'none';
            delBtn.onclick = () => { if(confirm("Delete?")) { deleteItem(id); toggleOverlay('postOverlay', false); } };

            toggleOverlay('postOverlay', true);
        }

        function deleteItem(id) {
            let items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            items = items.filter(i => i.id !== id);
            localStorage.setItem('aureum_items', JSON.stringify(items));
            renderGrid();
        }

        // --- Core Functions ---
        function login() {
            let u = document.getElementById('logUser').value, p = document.getElementById('logPass').value;
            if(users[u] === p) { localStorage.setItem('aureum_session', u); location.reload(); } else alert("Error");
        }
        function register() {
            let u = document.getElementById('regUser').value, p = document.getElementById('regPass').value;
            users[u] = p; localStorage.setItem('aureum_users', JSON.stringify(users)); toggleAuth('login');
        }
        function logout() { localStorage.removeItem('aureum_session'); location.reload(); }
        function toggleAuth(m) {
            document.getElementById('loginBox').style.display = m === 'login' ? 'block' : 'none';
            document.getElementById('createBox').style.display = m === 'create' ? 'block' : 'none';
        }
        function adminPrompt() { let p = prompt("Admin Pass:"); if(p === '1234') { localStorage.setItem('aureum_session', 'aureum'); location.reload(); } }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).classList.toggle('active', s); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        let currentImg = "";
        document.getElementById('fileIn').onchange = e => {
            const r = new FileReader(); r.onload = () => currentImg = r.result;
            r.readAsDataURL(e.target.files[0]);
        };
        function publish() {
            let items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            items.push({ id: Date.now(), name: document.getElementById('pName').value, price: document.getElementById('pPrice').value, cat: document.getElementById('pCat').value, desc: document.getElementById('pDesc').value, wa: document.getElementById('pWA').value, img: currentImg, seller: currentUser });
            localStorage.setItem('aureum_items', JSON.stringify(items)); closeModal('sellModal'); renderGrid();
        }
        function addCategory() {
            let val = document.getElementById('newCatIn').value;
            if(val) { categories.push(val); localStorage.setItem('aureum_cats', JSON.stringify(categories)); renderCats(); }
        }
    </script>
</body>
                                                    </html>
