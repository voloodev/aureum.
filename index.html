<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Exclusive Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #dfbc74; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Header */
        header { padding: 20px 5%; position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 4px; cursor: pointer; }
        
        .search-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin: 15px 0; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        /* Categories */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-item { padding: 10px 22px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 25px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.3s; color: #888; }
        .cat-item.active { background: var(--primary); color: black; font-weight: 800; border-color: var(--primary); }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-price { color: var(--primary); font-weight: 800; font-size: 16px; margin: 5px 0; }
        .card-date { font-size: 10px; color: #555; display: block; margin-top: 5px; }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 480px; background: rgba(20,20,20,0.8); border: 1px solid var(--glass-border); border-radius: 35px; padding: 30px; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .btn-gold { width: 100%; padding: 16px; background: var(--primary); color: black; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .input-glass { width: 100%; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 18px; margin-bottom: 12px; outline: none; }
        select.input-glass option { background: #111; color: white; }

        /* Side Menu */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: #080808; z-index: 4000; transition: 0.4s; padding: 40px 20px; border-left: 1px solid var(--glass-border); }
        #sideMenu.active { right: 0; }
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; border-radius: 12px; cursor: pointer; margin-bottom: 5px; }
        .menu-link:hover { background: var(--glass); color: var(--primary); }

        /* Auth */
        .auth-container { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }

        /* List Items */
        .list-item { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 20px; margin-bottom: 12px; }
        .list-item img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-container">
        <div style="width:100%; max-width:320px; text-align:center;">
            <h1 style="color:var(--primary); letter-spacing:8px; margin-bottom:40px;">AUREUM</h1>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-gold" onclick="handleAuth()">SIGN IN</button>
        </div>
    </div>

    <header>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="logo" onclick="location.reload()">AUREUM</div>
            <i class="fas fa-bars-staggered fa-lg" onclick="toggleMenu(true)" style="cursor:pointer; color:var(--primary);"></i>
        </div>
        <div class="search-bar">
            <i class="fas fa-search" style="opacity:0.4;"></i>
            <input type="text" id="searchInput" placeholder="Search products..." oninput="renderGrid()">
        </div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <main class="grid" id="marketGrid"></main>

    <div id="viewLayer" class="overlay">
        <div class="glass-panel" style="padding:0; overflow:hidden;">
            <i class="fas fa-times" style="position:absolute; right:20px; top:20px; z-index:10; background:rgba(0,0,0,0.5); width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="toggleOverlay('viewLayer', false)"></i>
            <img id="vImg" src="" style="width:100%; aspect-ratio:1/1; object-fit:cover;">
            <div style="padding:25px;">
                <h2 id="vTitle"></h2>
                <h3 id="vPrice" style="color:var(--primary); margin:10px 0;"></h3>
                <p id="vDesc" style="color:#aaa; font-size:14px; margin-bottom:25px;"></p>
                <div style="display:flex; gap:10px;">
                    <button class="btn-gold" id="addToCartBtn" style="flex:1; background:#333; color:white;">+ Cart</button>
                    <button id="vWA" class="btn-gold" style="flex:2.5; background:#25D366; color:white;"><i class="fab fa-whatsapp"></i> Chat Seller</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sellModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('sellModal', false)"></i>
            <h3 id="modalTitle">Publish Ad</h3><br>
            <div id="imgPre" style="display:flex; gap:10px; overflow-x:auto; margin-bottom:15px;"></div>
            <input type="file" id="fileIn" multiple hidden onchange="previewImages()">
            <button class="btn-gold" style="background:#222; color:white; border:1px dashed var(--primary);" onclick="document.getElementById('fileIn').click()">SELECT IMAGES</button>
            <input type="text" id="pName" class="input-glass" placeholder="Title">
            <input type="number" id="pPrice" class="input-glass" placeholder="Price (Rs.)">
            <select id="pCat" class="input-glass"></select>
            <textarea id="pDesc" class="input-glass" placeholder="Description..." style="height:100px;"></textarea>
            <input type="text" id="pWA" class="input-glass" placeholder="WhatsApp Number">
            <button class="btn-gold" id="pubBtn" onclick="publish()">PUBLISH NOW</button>
        </div>
    </div>

    <div id="myListingsModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('myListingsModal', false)"></i>
            <h3>My Active Ads</h3><br>
            <div id="myListContainer"></div>
        </div>
    </div>

    <div id="cartModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('cartModal', false)"></i>
            <h3>My Cart</h3><br>
            <div id="cartContainer"></div>
            <div id="cartTotal" style="margin-top:20px; border-top:1px solid var(--glass-border); padding-top:15px; text-align:right; font-weight:800; color:var(--primary);"></div>
        </div>
    </div>

    <div id="adminModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('adminModal', false)"></i>
            <h3 style="color:var(--primary);">Admin Controls</h3><br>
            <p style="font-size:12px; opacity:0.5;">CATEGORIES</p>
            <div id="adminCatList" style="margin:10px 0;"></div>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="newCatIn" class="input-glass" placeholder="New Cat" style="margin:0;">
                <button class="btn-gold" style="width:80px; margin:0;" onclick="addCategory()">ADD</button>
            </div>
            <p style="font-size:12px; opacity:0.5;">SUPPORT</p>
            <input type="text" id="adminSuppName" class="input-glass" placeholder="Support Name">
            <input type="text" id="adminSuppNum" class="input-glass" placeholder="Support Number">
            <button class="btn-gold" onclick="saveAdminSettings()">SAVE SETTINGS</button>
        </div>
    </div>

    <div id="sideMenu">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleMenu(false)"></i>
        <div style="margin-top:60px;">
            <div class="menu-link" onclick="openPublish()"><i class="fas fa-plus-circle"></i> Publish Ad</div>
            <div class="menu-link" onclick="loadMyListings()"><i class="fas fa-list"></i> My Listings</div>
            <div class="menu-link" onclick="openCart()"><i class="fas fa-shopping-bag"></i> My Cart <span id="cartCount" style="margin-left:auto; background:var(--primary); color:black; font-size:10px; padding:2px 8px; border-radius:10px; font-weight:900;">0</span></div>
            <div class="menu-link" id="suppBtn" onclick="contactSupport()"><i class="fas fa-headset"></i> Support</div>
            <div class="menu-link" id="adminLink" style="display:none;" onclick="openAdmin()"><i class="fas fa-shield-halved"></i> Admin Settings</div>
            <div class="menu-link" onclick="logout()" style="color:#ff4d4d; margin-top:40px;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let allItems = [], cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let currentCat = 'All', editId = null, systemSettings = { name: "Support", num: "94771234567" };

        window.onload = () => {
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                if(user === 'admin') document.getElementById('adminLink').style.display = 'flex';
                updateCartBadge();
            }
            loadCats(); loadItems(); loadSettings();
        };

        function handleAuth() {
            let u = document.getElementById('lUser').value.trim(), p = document.getElementById('lPass').value;
            if(u === 'aureum' && p === '1234') { localStorage.setItem('user', 'admin'); location.reload(); }
            else if(u && p) { localStorage.setItem('user', u); location.reload(); }
        }
        function logout() { localStorage.clear(); location.reload(); }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = []; s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid(); // Load grid immediately
            });
        }

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All']; let adminHtml = '';
                s.forEach(c => {
                    cats.push(c.val());
                    adminHtml += `<div class="list-item" style="padding:10px;"><span>${c.val()}</span><i class="fas fa-trash" style="margin-left:auto; color:red; cursor:pointer;" onclick="deleteCat('${c.key}')"></i></div>`;
                });
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-item ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('adminCatList').innerHTML = adminHtml;
            });
        }

        function loadSettings() {
            db.ref('settings').on('value', s => { if(s.exists()) systemSettings = s.val(); });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase().trim();
            // Critical Fix: Improved filter logic so items show without searching
            let filtered = allItems.filter(i => {
                let catMatch = (currentCat === 'All' || i.cat === currentCat);
                let searchMatch = (term === "" || i.name.toLowerCase().includes(term));
                return catMatch && searchMatch;
            });

            document.getElementById('marketGrid').innerHTML = filtered.reverse().map(i => `
                <div class="card" onclick="viewPost('${i.id}')">
                    <img src="${i.imgs[0]}">
                    <div class="card-info">
                        <small style="color:var(--primary); font-weight:700;">${i.cat}</small>
                        <p style="font-weight:600; font-size:14px; margin:3px 0;">${i.name}</p>
                        <p class="card-price">Rs. ${Number(i.price).toLocaleString()}</p>
                        <span class="card-date"><i class="far fa-clock"></i> ${new Date(i.time).toLocaleDateString()}</span>
                    </div>
                </div>`).join('') || '<p style="grid-column:1/-1; text-align:center; opacity:0.5; padding:50px;">No items found.</p>';
        }

        function viewPost(id) {
            let i = allItems.find(x => x.id === id);
            document.getElementById('vImg').src = i.imgs[0];
            document.getElementById('vTitle').innerText = i.name;
            document.getElementById('vPrice').innerText = "Rs. " + Number(i.price).toLocaleString();
            document.getElementById('vDesc').innerText = i.desc;
            document.getElementById('vWA').onclick = () => window.open(`https://wa.me/${i.wa}`);
            document.getElementById('addToCartBtn').onclick = () => addToCart(i);
            toggleOverlay('viewLayer', true);
        }

        async function publish() {
            let btn = document.getElementById('pubBtn');
            let files = document.getElementById('fileIn').files;
            if(!editId && files.length === 0) return alert("Select images!");

            btn.innerText = "Uploading..."; btn.disabled = true;
            let urls = editId ? allItems.find(x=>x.id===editId).imgs : [];
            
            if(files.length > 0) {
                urls = [];
                for(let f of files) {
                    let fd = new FormData(); fd.append("image", f);
                    let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
                    let d = await res.json(); if(d.success) urls.push(d.data.url);
                }
            }

            let data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDesc').value,
                wa: document.getElementById('pWA').value,
                imgs: urls,
                seller: user,
                time: editId ? allItems.find(x=>x.id===editId).time : Date.now()
            };

            let ref = editId ? db.ref('items/'+editId) : db.ref('items').push();
            ref.set(data).then(() => { alert("Done!"); currentCat = 'All'; location.reload(); });
        }

        function loadMyListings() {
            let my = allItems.filter(i => i.seller === user);
            document.getElementById('myListContainer').innerHTML = my.map(i => `
                <div class="list-item">
                    <img src="${i.imgs[0]}">
                    <div style="flex:1;"><b>${i.name}</b><br><small>Rs. ${i.price}</small></div>
                    <i class="fas fa-edit" style="color:var(--primary); cursor:pointer; margin-right:15px;" onclick="editPost('${i.id}')"></i>
                    <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="deletePost('${i.id}')"></i>
                </div>`).join('') || 'No ads found.';
            toggleOverlay('myListingsModal', true); toggleMenu(false);
        }

        function editPost(id) {
            editId = id; let i = allItems.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = "Edit Ad";
            document.getElementById('pName').value = i.name;
            document.getElementById('pPrice').value = i.price;
            document.getElementById('pCat').value = i.cat;
            document.getElementById('pDesc').value = i.desc;
            document.getElementById('pWA').value = i.wa;
            toggleOverlay('myListingsModal', false); toggleOverlay('sellModal', true);
        }

        function addToCart(i) {
            if(!cart.find(x => x.id === i.id)) { cart.push(i); localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); }
            alert("Added to bag!");
        }
        function openCart() {
            let tot = 0;
            document.getElementById('cartContainer').innerHTML = cart.map((i, idx) => {
                tot += Number(i.price);
                return `<div class="list-item"><img src="${i.imgs[0]}"><div><b>${i.name}</b><br><small>Rs. ${i.price}</small></div><i class="fas fa-times" style="margin-left:auto; cursor:pointer;" onclick="removeFromCart(${idx})"></i></div>`;
            }).join('') || 'Cart is empty.';
            document.getElementById('cartTotal').innerText = "Total: Rs. " + tot.toLocaleString();
            toggleOverlay('cartModal', true); toggleMenu(false);
        }
        function removeFromCart(idx) { cart.splice(idx, 1); localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); openCart(); }
        function updateCartBadge() { document.getElementById('cartCount').innerText = cart.length; }

        function openAdmin() {
            document.getElementById('adminSuppName').value = systemSettings.name;
            document.getElementById('adminSuppNum').value = systemSettings.num;
            toggleOverlay('adminModal', true); toggleMenu(false);
        }
        function saveAdminSettings() {
            db.ref('settings').set({ name: document.getElementById('adminSuppName').value, num: document.getElementById('adminSuppNum').value }).then(() => alert("Saved!"));
        }
        function contactSupport() { window.open(`https://wa.me/${systemSettings.num}`); }

        function setCat(c) { currentCat = c; renderGrid(); loadCats(); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
        function openPublish() { editId = null; document.getElementById('modalTitle').innerText = "Publish Ad"; toggleOverlay('sellModal', true); toggleMenu(false); }
        function addCategory() { let v = document.getElementById('newCatIn').value; if(v) db.ref('categories').push(v).then(()=>document.getElementById('newCatIn').value=''); }
        function deleteCat(k) { db.ref('categories/'+k).remove(); }
        function deletePost(id) { if(confirm("Delete Ad?")) db.ref('items/'+id).remove().then(()=>loadMyListings()); }
        function previewImages() {
            let pre = document.getElementById('imgPre'); pre.innerHTML = '';
            for(let f of document.getElementById('fileIn').files) {
                let r = new FileReader(); r.onload = (e) => pre.innerHTML += `<img src="${e.target.result}" style="width:60px; height:60px; border-radius:10px; object-fit:cover; border:2px solid var(--primary);">`;
                r.readAsDataURL(f);
            }
        }
    </script>
</body>
</html>
