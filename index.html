<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --primary-light: #f3d6a3; --bg-dark: #0a0a0c;
            --surface: #121215; --text-main: #ffffff; --text-muted: #a1a1aa;
            --glass: rgba(20, 20, 22, 0.7); --blur: blur(25px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- Header & Sizing --- */
        nav { display: none; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--glass); backdrop-filter: var(--blur); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 700; color: var(--primary); font-size: 24px; cursor: pointer; }
        
        .header-actions { display: flex; align-items: center; gap: 15px; flex: 1; max-width: 60%; margin: 0 20px; }
        .search-container { display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px 15px; flex: 1; border: 1px solid rgba(255,255,255,0.05); }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; padding-left: 10px; font-size: 14px; }
        .filter-btn-toggle { background: var(--primary); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .filter-btn-toggle:hover { background: var(--primary-light); }

        .hamburger { cursor: pointer; background: none; border: none; display: flex; align-items: center; color: white; font-size: 22px; padding: 10px; }

        /* --- Filtering Overlay --- */
        #filterOverlay { display: none; padding: 20px; background: var(--surface); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-top: 10px; }
        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
        .filter-group select, .filter-group input { width: 100%; padding: 10px; background: #000; color: white; border: 1px solid #333; border-radius: 8px; font-size: 13px; }

        /* --- Category Scroll --- */
        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 15px 5%; scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 18px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; }
        .cat-btn.active { border-color: var(--primary); color: var(--primary); }

        /* --- Masonry Grid Sizing --- */
        .wrapper { max-width: 1400px; margin: 0 auto; padding: 20px 15px; }
        .masonry-grid { column-count: 2; column-gap: 15px; }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; column-gap: 20px; } }

        .pin-card { break-inside: avoid; margin-bottom: 15px; background: var(--surface); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: transform 0.3s; }
        .pin-card:hover { transform: translateY(-5px); }
        .pin-card img { width: 100%; display: block; }
        .pin-info { padding: 15px; }
        .p-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        .p-price { font-weight: 700; color: var(--primary); font-size: 13px; }
        .pinned-badge { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; }

        /* --- Auth & Admin Layers --- */
        #authOverlay, #adminLoginLayer { position: fixed; inset: 0; z-index: 5000; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #adminLoginLayer { z-index: 6000; background: rgba(0,0,0,0.95); display: none; }
        .auth-box { position: relative; width: 100%; max-width: 380px; background: var(--surface); border-radius: 24px; padding: 40px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .admin-shield { position: absolute; top: 20px; right: 25px; color: rgba(255,255,255,0.1); cursor: pointer; font-size: 18px; }
        .auth-input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; outline: none; }
        .btn-gold { width: 100%; background: var(--primary); color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* --- Side Menu --- */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 280px; height: 100vh; background: var(--glass); backdrop-filter: var(--blur); z-index: 2000; transition: 0.4s; padding: 30px 20px; border-left: 1px solid rgba(255,255,255,0.05); }
        #sideMenu.active { right: 0; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 15px; cursor: pointer; font-weight: 600; color: white; }
        .menu-item i { font-size: 18px; color: var(--primary); }

        /* --- Overlays & Glass --- */
        .slide-overlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 92vh; background: var(--glass); backdrop-filter: var(--blur); border-radius: 30px 30px 0 0; z-index: 3000; transition: 0.5s; padding: 30px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .slide-overlay.active { bottom: 0; }
        .exit-btn { float: right; font-size: 24px; color: var(--text-muted); cursor: pointer; }
        
        .image-container { position: relative; width: 100%; border-radius: 20px; overflow: hidden; margin-top: 20px; }
        .image-container img { width: 100%; display: block; transition: 0.3s; }
        .slider-arrow { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); color: white; font-size: 30px; cursor: pointer; opacity: 0.8; }

        .header-actions-overlay { display: flex; gap: 15px; margin-top: 10px; }
        .action-icon { font-size: 20px; cursor: pointer; color: var(--text-muted); transition: 0.3s; }
        .action-icon.active { color: #ff453a; }
        .action-icon.pinned { color: var(--primary); }
    </style>
</head>
<body>

    <div id="adminLoginLayer">
        <div class="auth-box">
            <i class="fas fa-times exit-btn" onclick="toggleAdminLayer(false)"></i>
            <h2 style="margin-bottom:20px; color:var(--primary);">Admin Login</h2>
            <input type="text" id="admUser" class="auth-input" placeholder="Username">
            <input type="password" id="admPass" class="auth-input" placeholder="Password">
            <button class="btn-gold" onclick="verifyAdmin()">Login</button>
        </div>
    </div>

    <div id="authOverlay">
        <div class="auth-box">
            <i class="fas fa-shield-alt admin-shield" onclick="toggleAdminLayer(true)"></i>
            <h1 style="color:var(--primary); margin-bottom:30px; font-size:32px;">AUREUM</h1>
            <div id="logArea">
                <input type="text" id="lUser" class="auth-input" placeholder="Username">
                <input type="password" id="lPass" class="auth-input" placeholder="Password">
                <button class="btn-gold" onclick="login()">Login</button>
                <p onclick="toggleAuth('reg')" style="margin-top:20px; font-size:12px; color:var(--text-muted); cursor:pointer;">New User? Create Account</p>
            </div>
            <div id="regArea" style="display:none;">
                <input type="text" id="rUser" class="auth-input" placeholder="Username">
                <input type="password" id="rPass" class="auth-input" placeholder="Password">
                <button class="btn-gold" onclick="register()">Register</button>
                <p onclick="toggleAuth('log')" style="margin-top:20px; font-size:12px; color:var(--text-muted); cursor:pointer;">Back to Login</p>
            </div>
        </div>
    </div>

    <nav id="mainNav">
        <div class="logo">AUREUM</div>
        <div class="header-actions">
            <div class="search-container">
                <i class="fas fa-search" style="color: rgba(255,255,255,0.2);"></i>
                <input type="text" id="searchInput" placeholder="Search products, brands..." oninput="renderGrid()">
            </div>
            <button class="filter-btn-toggle" onclick="toggleFilterOverlay()"><i class="fas fa-filter"></i> Filters</button>
        </div>
        <button class="hamburger" onclick="toggleMenu(true)"><i class="fas fa-bars"></i></button>
    </nav>

    <div class="wrapper" style="margin-top:0;">
        <div id="filterOverlay">
            <div class="filter-group">
                <label>Min Price</label><input type="number" id="minPriceIn" placeholder="Rs.">
                <label>Max Price</label><input type="number" id="maxPriceIn" placeholder="Rs.">
            </div>
            <div id="dynamicFilters" class="filter-group"></div>
            <button class="btn-gold" onclick="renderGrid()">Apply Filters</button>
        </div>
    </div>

    <div id="sideMenu">
        <i class="fas fa-times exit-btn" onclick="toggleMenu(false)"></i>
        <div style="margin-top:40px;">
            <div class="menu-item"><i class="fas fa-user-circle"></i> <span id="uDisp"></span></div>
            <div class="menu-item" onclick="openModal('sellModal')"><i class="fas fa-plus-square"></i> Sell Item</div>
            <div class="menu-item" onclick="toggleOverlay('cartOverlay', true)"><i class="fas fa-shopping-cart"></i> Cart</div>
            <div class="menu-item" onclick="toggleOverlay('wishOverlay', true)"><i class="fas fa-heart"></i> Wishlist</div>
            <div class="menu-item" onclick="toggleOverlay('myPostsOverlay', true)"><i class="fas fa-images"></i> My Posts</div>
            <div class="menu-item" onclick="toggleOverlay('contactOverlay', true)"><i class="fas fa-envelope"></i> Contact Us</div>
            <div id="adminPanelBtn" class="menu-item" style="display:none; color:var(--primary);" onclick="toggleOverlay('adminPanel', true)"><i class="fas fa-tools"></i> Admin Settings</div>
        </div>
        <div style="margin-top:auto; padding:12px; border:1px solid rgba(255,255,255,0.3); border-radius:12px; text-align:center; color:white; font-weight:700; cursor:pointer;" onclick="logout()">Logout</div>
    </div>

    <div class="cat-scroll" id="catBar"></div>

    <div class="wrapper">
        <div class="masonry-grid" id="marketGrid"></div>
    </div>

    <div id="detailOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('detailOverlay', false)"></i>
        <div id="dContent" style="margin-top:30px;">
            <div class="image-container">
                <img id="dImg">
                <i class="fas fa-chevron-right slider-arrow" id="sliderNext" style="display:none;" onclick="nextSlide()"></i>
            </div>
            <div class="header-actions-overlay">
                <i id="dWish" class="fas fa-heart action-icon"></i>
                <i id="admPin" class="fas fa-thumbtack action-icon" style="display:none;"></i>
            </div>
            <h1 id="dTitle" style="margin-top:15px;"></h1>
            <h2 id="dPrice" style="color:var(--primary); margin:10px 0;"></h2>
            <p id="dDesc" style="color:var(--text-muted); font-size:14px; line-height:1.6;"></p><br>
            <div style="display:flex; gap:10px;">
                <button class="btn-gold" style="background:#25D366; color:white; flex:2;" id="dWA">WhatsApp</button>
                <button class="btn-gold" style="background:rgba(255,255,255,0.05); color:white; flex:1;" onclick="copyLink()"><i class="fas fa-share-alt"></i> Share</button>
            </div>
            <button id="admDel" class="btn-gold" style="display:none; background:#ff453a; color:white; margin-top:10px;">Delete Post (Admin)</button>
        </div>
    </div>

    <div id="adminPanel" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('adminPanel', false)"></i>
        <h2>Admin Settings</h2><br>
        <h4>Edit Contact Info</h4>
        <input type="text" id="admContactName" class="auth-input" placeholder="Admin Name">
        <input type="text" id="admContactWA" class="auth-input" placeholder="WhatsApp (e.g. 9477...)">
        <button class="btn-gold" onclick="saveAdminContact()">Save Contact Details</button><br><br>
        
        <h4>Categories</h4>
        <div style="display:flex; gap:10px; margin:15px 0;">
            <input type="text" id="newCat" class="auth-input" style="margin:0;" placeholder="Add New">
            <button class="btn-gold" style="width:80px; margin:0;" onclick="addCategory()">Add</button>
        </div>
        <div id="adminCatList"></div>
    </div>

    <div id="contactOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('contactOverlay', false)"></i>
        <div style="text-align:center; margin-top:100px;">
            <i class="fas fa-envelope-open-text" style="font-size:60px; color:var(--primary);"></i>
            <h1 style="margin-top:20px;">Contact Aureum</h1>
            <p id="contactAdmName" style="color:var(--text-muted); margin-top:10px;"></p>
            <p id="contactAdmWA" style="font-size:24px; color:var(--primary); margin-top:10px; font-weight:700;"></p>
        </div>
    </div>

    <div id="sellModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:4000; align-items:center; justify-content:center; padding:20px;">
        <div class="auth-box">
            <i class="fas fa-times exit-btn" onclick="closeModal('sellModal')"></i>
            <h3>Post Your Item</h3><br>
            <input type="file" id="fileIn" multiple accept="image/*" class="auth-input" style="margin-bottom:15px;">
            <input type="text" id="pName" class="auth-input" placeholder="Item Name">
            <input type="number" id="pPrice" class="auth-input" placeholder="Price (Numbers Only)">
            <select id="pCat" class="auth-input" onchange="updateDynamicPublishFields(this.value)"></select>
            <input type="text" id="pBrand" class="auth-input" placeholder="Brand Name">
            <select id="pCond" class="auth-input"><option>Brand New</option><option>Second Hand</option></select>
            <div id="dynamicPublishFields"></div>
            <textarea id="pDesc" class="auth-input" placeholder="Item Details"></textarea>
            <input type="text" id="pWA" class="auth-input" placeholder="WhatsApp (e.g. 9477...)">
            <button class="btn-gold" id="pubBtn" onclick="publish()">Publish Now</button>
        </div>
    </div>

    <div id="cartOverlay" class="slide-overlay"><i class="fas fa-times exit-btn" onclick="toggleOverlay('cartOverlay', false)"></i><h2>My Cart</h2></div>
    <div id="wishOverlay" class="slide-overlay"><i class="fas fa-times exit-btn" onclick="toggleOverlay('wishOverlay', false)"></i><h2>Wishlist</h2></div>
    <div id="myPostsOverlay" class="slide-overlay"><i class="fas fa-times exit-btn" onclick="toggleOverlay('myPostsOverlay', false)"></i><h2>My Posts</h2></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let allItems = [];
        let currentFilter = 'All';
        let shareUrl = "";
        let currentSlideIndex = 0;
        let dImages = [];

        window.onload = () => { if(user) startApp(); loadItems(); loadCats(); loadAdminContactInfo(); };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainNav').style.display = 'flex';
            document.getElementById('uDisp').innerText = user;
            if(user === 'aureum') document.getElementById('adminPanelBtn').style.display = 'flex';
        }

        // --- Categories & Filtering ---
        function loadCats() {
            db.ref('categories').on('value', snap => {
                let cats = ['All'];
                if(snap.exists()) Object.values(snap.val()).forEach(v => cats.push(v));
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-btn ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option>${c}</option>`).join('');
                document.getElementById('adminCatList').innerHTML = cats.filter(c=>c!=='All').map(c => `<div style="display:flex; justify-content:space-between; background:#222; padding:10px; border-radius:10px; margin-bottom:5px;"><span>${c}</span><i class="fas fa-trash" onclick="delCat('${c}')"></i></div>`).join('');
            });
        }
        function setFilter(c) { currentFilter = c; renderGrid(); updateDynamicFilters(c); }
        function addCategory() { let v = document.getElementById('newCat').value; if(v) db.ref('categories').push(v); document.getElementById('newCat').value=""; }
        function delCat(n) { db.ref('categories').once('value', s => { s.forEach(c => { if(c.val()===n) c.ref.remove(); }); }); }
        function toggleFilterOverlay() { const f = document.getElementById('filterOverlay'); f.style.display = f.style.display === 'block' ? 'none' : 'block'; }
        
        function updateDynamicFilters(c) {
            const dy = document.getElementById('dynamicFilters');
            dy.innerHTML = `
                <label>Condition</label>
                <select id="pCondIn"><option value="All">All</option><option>Brand New</option><option>Second Hand</option></select>
                <label>Brand</label>
                <input type="text" id="pBrandIn" placeholder="Enter Brand">
            `;
            // clothes only filters
            if(c === 'Fashion' || c === 'Clothes') { 
                dy.innerHTML += `<label>Gender</label><select id="pGenIn"><option value="All">All</option><option>Male</option><option>Female</option><option>Unisex</option></select>`;
            }
        }
        function updateDynamicPublishFields(c) {
            const dy = document.getElementById('dynamicPublishFields');
            dy.innerHTML = "";
            if(c === 'Fashion' || c === 'Clothes') {
                dy.innerHTML = `<select id="pGen" class="auth-input"><option>Male</option><option>Female</option><option>Unisex</option></select>`;
            }
        }

        // --- Items ---
        function loadItems() {
            db.ref('items').on('value', snap => {
                allItems = [];
                snap.forEach(child => allItems.push({id: child.key, ...child.val()}));
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let minP = parseInt(document.getElementById('minPriceIn').value) || 0;
            let maxP = parseInt(document.getElementById('maxPriceIn').value) || Infinity;
            let cond = document.getElementById('pCondIn')?.value || 'All';
            let brand = document.getElementById('pBrandIn')?.value.toLowerCase() || "";
            let gen = document.getElementById('pGenIn')?.value || 'All';

            let filtered = allItems.filter(i => 
                (currentFilter === 'All' || i.cat === currentFilter) && 
                i.name.toLowerCase().includes(term) &&
                parseInt(i.price.replace(/\D/g,'')) >= minP &&
                parseInt(i.price.replace(/\D/g,'')) <= maxP &&
                (cond === 'All' || i.cond === cond) &&
                (brand === "" || i.brand?.toLowerCase().includes(brand)) &&
                (gen === 'All' || i.gen === gen)
            );

            // sorting: pinned first
            filtered.sort((a,b) => (b.pinned || false) - (a.pinned || false));

            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="pin-card" onclick="openPost('${i.id}')">
                    <img src="${i.img}">
                    ${i.pinned ? '<span class="pinned-badge"><i class="fas fa-thumbtack"></i> PINNED</span>' : ''}
                    <div class="pin-info">
                        <div class="p-name">${i.name}</div>
                        <div class="p-price">Rs. ${parseInt(i.price.replace(/\D/g,'')).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function openPost(id) {
            let i = allItems.find(x => x.id === id);
            shareUrl = window.location.href.split('?')[0] + "?item=" + id;
            
            dImages = i.imgs || [i.img]; // handle older items
            currentSlideIndex = 0;
            updateSlide(0);

            document.getElementById('sliderNext').style.display = dImages.length > 1 ? 'block' : 'none';
            document.getElementById('dTitle').innerText = i.name;
            document.getElementById('dPrice').innerText = "Rs. " + parseInt(i.price.replace(/\D/g,'')).toLocaleString();
            document.getElementById('dDesc').innerText = i.desc;
            document.getElementById('dWA').onclick = () => window.open(`https://wa.me/${i.wa}`);

            // Admin features
            const pinBtn = document.getElementById('admPin');
            pinBtn.style.display = user === 'aureum' ? 'block' : 'none';
            pinBtn.className = i.pinned ? 'fas fa-thumbtack action-icon pinned' : 'fas fa-thumbtack action-icon';
            pinBtn.onclick = () => { db.ref('items/'+id).update({pinned: !i.pinned}); loadItems(); toggleOverlay('detailOverlay',false); };

            const delBtn = document.getElementById('admDel');
            delBtn.style.display = user === 'aureum' ? 'block' : 'none';
            delBtn.onclick = () => { if(confirm("Delete?")) db.ref('items/'+id).remove(); toggleOverlay('detailOverlay', false); };
            
            toggleOverlay('detailOverlay', true);
        }

        // Multi Image Slider
        function nextSlide() { currentSlideIndex = (currentSlideIndex + 1) % dImages.length; updateSlide(currentSlideIndex); }
        function updateSlide(idx) { document.getElementById('dImg').src = dImages[idx]; }
        function copyLink() { navigator.clipboard.writeText(shareUrl); alert("Link Copied!"); }

        // --- Auth & Admin ---
        function toggleAdminLayer(s) { document.getElementById('adminLoginLayer').style.display = s?'flex':'none'; }
        function verifyAdmin() { if(document.getElementById('admUser').value==='aureum' && document.getElementById('admPass').value==='1234') { localStorage.setItem('user','aureum'); location.reload(); } else alert("Denied"); }
        function login() { 
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            db.ref('users/'+u).once('value', s => { if(s.val()===p) { localStorage.setItem('user',u); location.reload(); } else alert("Error"); });
        }
        function register() { db.ref('users/'+document.getElementById('rUser').value).set(document.getElementById('rPass').value).then(()=>toggleAuth('log')); }
        function toggleAuth(m) { document.getElementById('logArea').style.display = m==='log'?'block':'none'; document.getElementById('regArea').style.display = m==='reg'?'block':'none'; }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).classList.toggle('active', s); if(s) toggleMenu(false); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; toggleMenu(false); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }

        // Contact Info Management
        function saveAdminContact() {
            let info = { name: document.getElementById('admContactName').value, wa: document.getElementById('admContactWA').value };
            db.ref('adminContact').set(info).then(() => alert("Admin Contact Updated!"));
        }
        function loadAdminContactInfo() {
            db.ref('adminContact').on('value', snap => {
                if(snap.exists()) {
                    const info = snap.val();
                    document.getElementById('contactAdmName').innerText = info.name;
                    document.getElementById('contactAdmWA').innerText = "+" + info.wa;
                    if(user === 'aureum') {
                        document.getElementById('admContactName').value = info.name;
                        document.getElementById('admContactWA').value = info.wa;
                    }
                }
            });
        }

        // --- Multi Publish ---
        async function publish() {
            let files = document.getElementById('fileIn').files; if(files.length === 0) return alert("Add Image");
            let btn = document.getElementById('pubBtn');
            btn.innerText = "Publishing..."; btn.disabled = true;

            let urls = [];
            for(let file of files) {
                let fd = new FormData(); fd.append("image", file);
                try {
                    let res = await fetch("https://api.imgbb.com/1/upload?key=" + IMGBB_KEY, { method: "POST", body: fd });
                    let data = await res.json();
                    if(data.success) urls.push(data.data.url);
                } catch(e) {}
            }

            if(urls.length > 0) {
                await db.ref('items').push({
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    cat: document.getElementById('pCat').value,
                    brand: document.getElementById('pBrand').value,
                    cond: document.getElementById('pCond').value,
                    gen: document.getElementById('pGen')?.value || "N/A",
                    desc: document.getElementById('pDesc').value,
                    wa: document.getElementById('pWA').value,
                    img: urls[0], // primary for grid
                    imgs: urls,   // all for slider
                    seller: user
                });
                location.reload();
            }
            btn.innerText = "Publish"; btn.disabled = false;
        }
    </script>
</body>
</html>
