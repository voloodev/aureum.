<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg-dark: #111112; --surface: #1c1c1e;
            --text-main: #ffffff; --text-muted: #a1a1aa; --glass: rgba(20, 20, 22, 0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; }

        /* --- UI Elements --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--glass); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-weight: 700; color: var(--primary); font-size: 22px; }
        
        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 15px 5%; scrollbar-width: none; }
        .cat-btn { padding: 8px 18px; border: 1px solid var(--primary); border-radius: 20px; color: white; white-space: nowrap; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: black; }

        /* --- Masonry Grid --- */
        .wrapper { max-width: 1400px; margin: 0 auto; padding: 0 15px; }
        .masonry-grid { column-count: 2; column-gap: 15px; }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        .pin-card { break-inside: avoid; margin-bottom: 15px; background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid #222; cursor: pointer; }
        .pin-card img { width: 100%; display: block; }
        .pin-info { padding: 12px; }

        /* --- Admin Login Layer --- */
        #adminLoginLayer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .admin-box { width: 90%; max-width: 380px; background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid var(--primary); text-align: center; }

        /* --- Overlays --- */
        .slide-overlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 90vh; background: #0f0f10; border-radius: 30px 30px 0 0; z-index: 3000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; overflow-y: auto; }
        .slide-overlay.active { bottom: 0; }
        .exit-btn { float: right; font-size: 24px; color: var(--text-muted); cursor: pointer; }

        /* --- New Admin Panel Styles --- */
        .admin-item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #222; margin-bottom: 8px; border-radius: 10px; }
        .del-cat { color: #ff453a; cursor: pointer; }
        
        .share-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-top: 10px; }

        .btn-gold { width: 100%; background: var(--primary); color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .auth-input { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; outline: none; }
    </style>
</head>
<body>

    <div id="adminLoginLayer">
        <div class="admin-box">
            <i class="fas fa-times exit-btn" onclick="toggleAdminLayer(false)"></i>
            <i class="fas fa-user-shield" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 20px;">Admin Authorization</h2>
            <input type="text" id="admUser" class="auth-input" placeholder="Admin Username">
            <input type="password" id="admPass" class="auth-input" placeholder="Admin Password">
            <button class="btn-gold" onclick="verifyAdmin()">Login as Admin</button>
        </div>
    </div>

    <div id="authOverlay" style="position:fixed; inset:0; z-index:5000; background:#000; display:flex; align-items:center; justify-content:center;">
        <div class="admin-box">
            <i class="fas fa-shield-alt" onclick="toggleAdminLayer(true)" style="position:absolute; top:20px; right:20px; color:#333; cursor:pointer;"></i>
            <h1 style="color:var(--primary); margin-bottom:30px;">AUREUM</h1>
            <div id="loginForm">
                <input type="text" id="lUser" class="auth-input" placeholder="Username">
                <input type="password" id="lPass" class="auth-input" placeholder="Password">
                <button class="btn-gold" onclick="userLogin()">Login</button>
                <p onclick="toggleForm('reg')" style="margin-top:20px; color:var(--text-muted); cursor:pointer;">Create Account</p>
            </div>
            <div id="regForm" style="display:none;">
                <input type="text" id="rUser" class="auth-input" placeholder="New Username">
                <input type="password" id="rPass" class="auth-input" placeholder="New Password">
                <button class="btn-gold" onclick="userRegister()">Register</button>
                <p onclick="toggleForm('log')" style="margin-top:20px; color:var(--text-muted); cursor:pointer;">Back to Login</p>
            </div>
        </div>
    </div>

    <nav id="mainNav" style="display:none;">
        <div class="logo">AUREUM</div>
        <div onclick="toggleMenu(true)" style="cursor:pointer;"><i class="fas fa-bars"></i></div>
    </nav>

    <div id="sideMenu" class="slide-overlay" style="width: 280px; right: -280px; left: auto; bottom: 0; border-radius: 0;">
        <i class="fas fa-times exit-btn" onclick="toggleMenu(false)"></i>
        <div style="margin-top:50px;">
            <div class="menu-item" style="padding:15px;"><i class="fas fa-user"></i> <span id="uNameDisp"></span></div>
            <div onclick="openSell()" style="padding:15px; cursor:pointer;"><i class="fas fa-plus-circle"></i> Sell Item</div>
            <div id="adminPanelBtn" onclick="toggleOverlay('adminPanel', true)" style="display:none; padding:15px; cursor:pointer; color:var(--primary);"><i class="fas fa-tools"></i> Admin Panel</div>
            <div onclick="logout()" style="padding:15px; cursor:pointer; border: 1px solid white; margin-top:20px; text-align:center; border-radius:10px;">Logout</div>
        </div>
    </div>

    <div class="cat-scroll" id="catBar"></div>

    <div class="wrapper">
        <div class="masonry-grid" id="itemGrid"></div>
    </div>

    <div id="detailOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('detailOverlay', false)"></i>
        <div id="detailBody" style="margin-top:30px;">
            <img id="dImg" style="width:100%; border-radius:20px;">
            <h2 id="dTitle" style="margin-top:15px;"></h2>
            <h3 id="dPrice" style="color:var(--primary);"></h3>
            <p id="dDesc" style="margin:15px 0; color:var(--text-muted);"></p>
            
            <div style="display:flex; gap:10px;">
                <button class="share-btn" onclick="copyLink()"><i class="fas fa-share-alt"></i> Share Link</button>
                <button class="share-btn" style="background:#25D366;" id="dWA">WhatsApp Seller</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('adminPanel', false)"></i>
        <h2>Manage Categories</h2><br>
        <div style="display:flex; gap:10px;">
            <input type="text" id="newCatInput" class="auth-input" placeholder="New Category Name">
            <button onclick="addNewCategory()" style="height:50px; background:var(--primary); border:none; padding:0 20px; border-radius:10px;">Add</button>
        </div>
        <div id="categoryListAdmin" style="margin-top:20px;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = localStorage.getItem('user');
        let categories = ['All'];
        let currentItemUrl = "";

        window.onload = () => {
            if(user) startApp();
            loadCategories();
            loadItems();
        };

        function toggleAdminLayer(s) { document.getElementById('adminLoginLayer').style.display = s ? 'flex' : 'none'; }
        function toggleForm(m) { 
            document.getElementById('loginForm').style.display = m==='log'?'block':'none';
            document.getElementById('regForm').style.display = m==='reg'?'block':'none';
        }

        function verifyAdmin() {
            let u = document.getElementById('admUser').value;
            let p = document.getElementById('admPass').value;
            if(u === 'admin' && p === 'aureum123') { // Admin password එක මෙතනින් වෙනස් කරන්න පුළුවන්
                localStorage.setItem('user', 'admin');
                location.reload();
            } else { alert("Access Denied"); }
        }

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainNav').style.display = 'flex';
            document.getElementById('uNameDisp').innerText = user;
            if(user === 'admin') document.getElementById('adminPanelBtn').style.display = 'block';
        }

        // --- Categories Logic ---
        function loadCategories() {
            db.ref('categories').on('value', snap => {
                categories = ['All'];
                if(snap.exists()) {
                    Object.values(snap.val()).forEach(v => categories.push(v));
                }
                renderCatBar();
                renderAdminCats();
            });
        }

        function renderCatBar() {
            document.getElementById('catBar').innerHTML = categories.map(c => `
                <div class="cat-btn" onclick="filterItems('${c}')">${c}</div>
            `).join('');
        }

        function renderAdminCats() {
            document.getElementById('categoryListAdmin').innerHTML = categories.filter(c => c !== 'All').map(c => `
                <div class="admin-item-row">
                    <span>${c}</span>
                    <i class="fas fa-trash del-cat" onclick="deleteCategory('${c}')"></i>
                </div>
            `).join('');
        }

        function addNewCategory() {
            let val = document.getElementById('newCatInput').value;
            if(val) db.ref('categories').push(val);
            document.getElementById('newCatInput').value = "";
        }

        function deleteCategory(name) {
            db.ref('categories').once('value', snap => {
                snap.forEach(child => {
                    if(child.val() === name) child.ref.remove();
                });
            });
        }

        // --- Share & Copy Logic ---
        function openPost(id, data) {
            currentItemUrl = window.location.href.split('?')[0] + "?item=" + id;
            document.getElementById('dImg').src = data.img;
            document.getElementById('dTitle').innerText = data.name;
            document.getElementById('dPrice').innerText = data.price;
            document.getElementById('dDesc').innerText = data.desc;
            document.getElementById('dWA').onclick = () => window.open(`https://wa.me/${data.wa}`);
            toggleOverlay('detailOverlay', true);
        }

        function copyLink() {
            navigator.clipboard.writeText(currentItemUrl);
            alert("Link copied to clipboard! Now you can share it.");
        }

        // --- Basic Auth & Load ---
        function userLogin() {
            let u = document.getElementById('lUser').value;
            let p = document.getElementById('lPass').value;
            db.ref('users/'+u).once('value', s => {
                if(s.val() === p) { localStorage.setItem('user', u); location.reload(); }
                else alert("Error");
            });
        }

        function userRegister() {
            let u = document.getElementById('rUser').value;
            let p = document.getElementById('rPass').value;
            db.ref('users/'+u).set(p).then(() => toggleForm('log'));
        }

        function loadItems() {
            db.ref('items').on('value', snap => {
                const grid = document.getElementById('itemGrid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    let d = child.val();
                    grid.innerHTML += `
                        <div class="pin-card" onclick='openPost("${child.key}", ${JSON.stringify(d)})'>
                            <img src="${d.img}">
                            <div class="pin-info"><b>${d.name}</b><br><small>${d.price}</small></div>
                        </div>
                    `;
                });
            });
        }

        function toggleMenu(s) { document.getElementById('sideMenu').style.right = s ? '0' : '-280px'; }
        function toggleOverlay(id, s) { document.getElementById(id).classList.toggle('active', s); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
