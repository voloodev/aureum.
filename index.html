<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #dfbc74; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }
        header { padding: 20px 5%; position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 3px; }
        .search-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin-top: 15px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-item { padding: 8px 18px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-item.active { background: var(--primary); color: black; font-weight: 700; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; cursor: pointer; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 450px; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
        .input-glass, select, textarea { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 15px; margin-bottom: 12px; outline: none; }
        .btn-gold { width: 100%; padding: 16px; background: var(--primary); color: black; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .post-actions { position: absolute; right: 15px; top: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .action-icon { width: 40px; height: 40px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--glass-border); color: white; }
        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); z-index: 4000; transition: 0.4s; padding: 40px 20px; }
        #sideMenu.active { right: 0; }
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; border-radius: 12px; cursor: pointer; margin-bottom: 8px; }
        .menu-link:hover { background: var(--primary); color: black; }
    </style>
</head>
<body>

    <div id="shieldLayer" class="overlay">
        <div class="glass-panel" style="text-align: center;">
            <h3 style="color:var(--primary); margin-bottom:20px;">Admin Verification</h3>
            <input type="text" id="sUser" class="input-glass" placeholder="Admin Username">
            <input type="password" id="sPass" class="input-glass" placeholder="Admin Password">
            <button class="btn-gold" onclick="verifyAdmin()">VERIFY ACCESS</button>
            <p onclick="toggleOverlay('shieldLayer', false)" style="margin-top:15px; cursor:pointer; font-size:12px; opacity:0.5;">Cancel</p>
        </div>
    </div>

    <div id="authOverlay" class="overlay" style="display: flex;">
        <div class="glass-panel" style="text-align: center;">
            <i class="fas fa-shield-alt" style="position:absolute; top:20px; right:20px; opacity:0.3; cursor:pointer;" onclick="toggleOverlay('shieldLayer', true)"></i>
            <h1 style="color:var(--primary); margin-bottom:30px; letter-spacing: 4px;">AUREUM</h1>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-gold" onclick="login()">SIGN IN</button>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo">AUREUM</div>
            <i class="fas fa-bars-staggered fa-lg" onclick="toggleMenu(true)" style="cursor:pointer;"></i>
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search..." oninput="renderGrid()">
        </div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <div class="grid" id="marketGrid"></div>

    <div id="viewLayer" class="overlay">
        <div class="glass-panel" style="padding:0; overflow:hidden;">
            <div class="post-actions">
                <div class="action-icon" onclick="addToCart()"><i class="fas fa-shopping-cart"></i></div>
                <div class="action-icon admin-only" onclick="pinPost()"><i class="fas fa-thumbtack"></i></div>
                <div class="action-icon admin-only" onclick="deletePost()" style="color:#ff4d4d;"><i class="fas fa-trash"></i></div>
                <div class="action-icon" onclick="toggleOverlay('viewLayer', false)"><i class="fas fa-times"></i></div>
            </div>
            <img id="vImg" src="" style="width:100%; aspect-ratio:1/1; object-fit:cover;">
            <div style="padding:25px;">
                <h2 id="vTitle"></h2>
                <h3 id="vPrice" style="color:var(--primary); margin:10px 0;"></h3>
                <p id="vDesc" style="color:#aaa; font-size:14px; margin-bottom:20px;"></p>
                <button class="btn-gold" id="vWA" style="background:#25D366; color:white; margin-bottom:15px;"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                <p id="vTime" style="font-size:10px; color:#555; text-align:center;"></p>
            </div>
        </div>
    </div>

    <div id="adminModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('adminModal', false)"></i>
            <h3>Admin Settings</h3><br>
            <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:15px;">
                <p style="font-size:12px; margin-bottom:10px; color:var(--primary);">SUPPORT DETAILS</p>
                <input type="text" id="supName" class="input-glass" placeholder="Support Name">
                <input type="text" id="supNum" class="input-glass" placeholder="Support Number">
                <button class="btn-gold" onclick="updateSupport()" style="padding:10px;">Update Support</button>
            </div>
            <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px;">
                <p style="font-size:12px; margin-bottom:10px; color:var(--primary);">CATEGORIES</p>
                <div id="catManageList"></div>
                <input type="text" id="newCatIn" class="input-glass" placeholder="New Category Name">
                <button class="btn-gold" onclick="addCat()" style="padding:10px;">Add Category</button>
            </div>
        </div>
    </div>

    <div id="sideMenu">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleMenu(false)"></i>
        <div style="margin-top:40px;">
            <div class="menu-link"><i class="fas fa-user"></i> <span id="uDisp">User</span></div>
            <div class="menu-link" onclick="openModal('sellModal')"><i class="fas fa-plus-circle"></i> Publish Ad</div>
            <div class="menu-link" onclick="openCart()"><i class="fas fa-shopping-basket"></i> My Cart</div>
            <div class="menu-link" onclick="openMyPosts()"><i class="fas fa-box"></i> My Posts</div>
            <div class="menu-link admin-only" onclick="toggleOverlay('adminModal', true)"><i class="fas fa-cog"></i> Admin Settings</div>
            <div class="menu-link" onclick="showSupport()"><i class="fas fa-headset"></i> Customer Support</div>
            <div class="menu-link" onclick="logout()" style="color:#ff4d4d; margin-top:20px;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let user = localStorage.getItem('user');
        let isAdmin = localStorage.getItem('isAdmin') === 'true';
        let allItems = [], curId = '';

        window.onload = () => {
            if(user) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('uDisp').innerText = user;
                if(isAdmin) document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'flex');
            }
            loadCats(); loadItems(); loadSupport();
        };

        function verifyAdmin() {
            let u = document.getElementById('sUser').value, p = document.getElementById('sPass').value;
            if(u === 'aureum' && p === '1234') {
                localStorage.setItem('user', 'admin');
                localStorage.setItem('isAdmin', 'true');
                location.reload();
            } else alert("Invalid Admin Credentials");
        }

        function login() {
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val() === p) { localStorage.setItem('user', u); location.reload(); }
            });
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => i.name.toLowerCase().includes(term));
            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="card" onclick="viewPost('${i.id}')">
                    <img src="${i.imgs?i.imgs[0]:i.img}">
                    <div style="padding:10px;">
                        <p style="font-size:12px;">${i.name}</p>
                        <p style="color:var(--primary); font-weight:700;">Rs. ${i.price}</p>
                    </div>
                </div>
            `).join('');
        }

        function viewPost(id) {
            let i = allItems.find(x => x.id === id); curId = id;
            document.getElementById('vTitle').innerText = i.name;
            document.getElementById('vPrice').innerText = "Rs. " + i.price;
            document.getElementById('vDesc').innerText = i.desc;
            document.getElementById('vImg').src = i.imgs?i.imgs[0]:i.img;
            document.getElementById('vTime').innerText = "Published: " + new Date(i.time).toLocaleString();
            document.getElementById('vWA').onclick = () => window.open('https://wa.me/'+i.wa);
            toggleOverlay('viewLayer', true);
        }

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if(!cart.includes(curId)) { cart.push(curId); localStorage.setItem('cart', JSON.stringify(cart)); alert("Added to My Cart!"); }
        }

        function deletePost() { if(confirm("Delete this post?")) { db.ref('items/'+curId).remove(); toggleOverlay('viewLayer', false); } }

        function loadSupport() {
            db.ref('settings/support').on('value', s => {
                if(s.exists()) {
                    document.getElementById('supName').value = s.val().name;
                    document.getElementById('supNum').value = s.val().num;
                }
            });
        }

        function updateSupport() {
            db.ref('settings/support').set({ name: document.getElementById('supName').value, num: document.getElementById('supNum').value });
            alert("Support Updated!");
        }

        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
        function showSupport() {
            db.ref('settings/support').once('value', s => {
                alert("Support: " + s.val().name + "\nWhatsApp: " + s.val().num);
            });
        }
    </script>
</body>
</html>
