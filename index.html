<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg-dark: #0a0a0c;
            --surface: #121215; --text-main: #ffffff; --text-muted: #a1a1aa;
            --glass: rgba(20, 20, 22, 0.7); --blur: blur(25px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- Header --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--glass); backdrop-filter: var(--blur); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 700; color: var(--primary); font-size: 26px; cursor: pointer; text-transform: uppercase; }
        .search-container { display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px 15px; width: 50%; border: 1px solid rgba(255,255,255,0.05); }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; padding-left: 10px; }

        /* --- Category Bar --- */
        .cat-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 15px 5%; scrollbar-width: none; }
        .cat-btn { padding: 8px 20px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* --- Pinterest Masonry Grid --- */
        .masonry-grid { column-count: 2; column-gap: 15px; padding: 0 5%; width: 100%; }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }
        
        .pin-card { break-inside: avoid; margin-bottom: 15px; background: var(--surface); border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); position: relative; cursor: pointer; transition: 0.3s; }
        .pin-card img { width: 100%; display: block; }
        .pin-tag { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 9px; }

        /* --- Overlays & UI --- */
        .slide-overlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 92vh; background: var(--bg-dark); z-index: 3000; transition: 0.5s; padding: 25px; overflow-y: auto; }
        .slide-overlay.active { bottom: 0; }
        .exit-btn { float: right; font-size: 24px; color: var(--text-muted); cursor: pointer; }

        .auth-input, select, textarea { width: 100%; background: #0c0c0e; border: 1px solid #222; color: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; outline: none; }
        .btn-gold { width: 100%; background: var(--primary); color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        #sideMenu { position: fixed; top: 0; right: -320px; width: 280px; height: 100vh; background: var(--glass); backdrop-filter: var(--blur); z-index: 4000; transition: 0.4s; padding: 40px 20px; border-left: 1px solid rgba(255,255,255,0.05); }
        #sideMenu.active { right: 0; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 15px; cursor: pointer; font-weight: 600; color: white; border-radius: 12px; }
        .menu-item i { color: var(--primary); width: 20px; }

        #authOverlay { position: fixed; inset: 0; z-index: 5000; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .admin-shield-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #111; cursor: pointer; transition: 0.3s; }
        .admin-shield-btn:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div style="width: 100%; max-width: 380px; text-align: center; position: relative;">
            <i class="fas fa-shield-alt admin-shield-btn" title="Admin Login" onclick="adminQuickLogin()"></i>
            <h1 style="color:var(--primary); margin-bottom:30px; letter-spacing: 2px;">AUREUM</h1>
            <div id="logArea">
                <input type="text" id="lUser" class="auth-input" placeholder="Username">
                <input type="password" id="lPass" class="auth-input" placeholder="Password">
                <button class="btn-gold" onclick="login()">Login</button>
                <p onclick="toggleAuth('reg')" style="margin-top:20px; color:var(--text-muted); cursor:pointer; font-size: 13px;">Create Account</p>
            </div>
            <div id="regArea" style="display:none;">
                <input type="text" id="rUser" class="auth-input" placeholder="Choose Username">
                <input type="password" id="rPass" class="auth-input" placeholder="Password">
                <button class="btn-gold" onclick="register()">Register</button>
                <p onclick="toggleAuth('log')" style="margin-top:20px; color:var(--text-muted); cursor:pointer; font-size: 13px;">Back to Login</p>
            </div>
        </div>
    </div>

    <nav>
        <div class="logo">AUREUM</div>
        <div class="search-container">
            <i class="fas fa-search" style="color:#444;"></i>
            <input type="text" id="searchInput" placeholder="Search products..." oninput="renderGrid()">
        </div>
        <div onclick="toggleMenu(true)" style="cursor:pointer;"><i class="fas fa-bars fa-lg"></i></div>
    </nav>

    <div class="cat-scroll" id="catBar"></div>
    <div class="masonry-grid" id="marketGrid"></div>

    <div id="sideMenu">
        <i class="fas fa-times exit-btn" onclick="toggleMenu(false)"></i>
        <div style="margin-top:50px;">
            <div class="menu-item"><i class="fas fa-user-circle"></i> <span id="uDisp"></span></div>
            <div class="menu-item" onclick="openModal('sellModal')"><i class="fas fa-plus-square"></i> Sell Item</div>
            <div class="menu-item" onclick="toggleOverlay('myPostsOverlay', true)"><i class="fas fa-list-alt"></i> My Posts</div>
            <div class="menu-item" onclick="toggleOverlay('wishOverlay', true)"><i class="fas fa-heart"></i> Wishlist</div>
            <div class="menu-item" onclick="toggleOverlay('contactOverlay', true)"><i class="fas fa-headset"></i> Contact Us</div>
            <div id="admBtn" class="menu-item" style="display:none; color:var(--primary);" onclick="toggleOverlay('adminPanel', true)"><i class="fas fa-user-shield"></i> Admin Settings</div>
            <div class="menu-item" onclick="logout()" style="margin-top:20px; color:#ff453a;"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div id="myPostsOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('myPostsOverlay', false)"></i>
        <h2 style="margin-bottom:20px;">Manage My Posts</h2>
        <div id="myPostsList" class="masonry-grid"></div>
    </div>

    <div id="wishOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('wishOverlay', false)"></i>
        <h2 style="margin-bottom:20px;">My Wishlist</h2>
        <div id="wishList" class="masonry-grid"></div>
    </div>

    <div id="sellModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:5000; align-items:center; justify-content:center; padding:20px;">
        <div style="width:100%; max-width:400px; max-height:90vh; overflow-y:auto; background:var(--surface); padding:25px; border-radius:20px;">
            <i class="fas fa-times exit-btn" onclick="closeModal('sellModal')"></i>
            <h3 id="modalTitle" style="margin-bottom:20px; color: var(--primary);">Publish Product</h3>
            <input type="hidden" id="editId">
            <div id="fileArea"><input type="file" id="fileIn" multiple class="auth-input"></div>
            <input type="text" id="pName" class="auth-input" placeholder="Item Name">
            <input type="number" id="pPrice" class="auth-input" placeholder="Price (Rs.)">
            <select id="pCat" class="auth-input"></select>
            <textarea id="pDesc" class="auth-input" placeholder="Tell us more about it..."></textarea>
            <input type="text" id="pWA" class="auth-input" placeholder="WhatsApp (07...)">
            <button class="btn-gold" id="pubBtn" onclick="publish()">Publish</button>
        </div>
    </div>

    <div id="detailOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('detailOverlay', false)"></i>
        <div id="dContent" style="margin-top:20px;">
            <img id="dImg" style="width:100%; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div style="display:flex; justify-content:space-between; align-items: center; margin-top:20px;">
                <h2 id="dTitle"></h2>
                <div style="display:flex; gap:20px; font-size: 24px;">
                    <i id="dWishBtn" class="fas fa-heart" style="cursor:pointer; color:#333;" onclick="toggleWishlist()"></i>
                    <i id="admPin" class="fas fa-thumbtack" style="display:none; cursor:pointer;" onclick="togglePin()"></i>
                </div>
            </div>
            <h3 id="dPrice" style="color:var(--primary); margin:10px 0;"></h3>
            <p id="dDesc" style="color:var(--text-muted); line-height: 1.6;"></p><br>
            <button id="dWA" class="btn-gold" style="background:#25D366; color:white;"><i class="fab fa-whatsapp"></i> Chat with Seller</button>
            <button id="admDel" class="btn-gold" style="display:none; background:#ff453a; color:white; margin-top:10px;" onclick="adminDelete()">Delete Post</button>
        </div>
    </div>

    <div id="adminPanel" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('adminPanel', false)"></i>
        <h2 style="margin-bottom:25px;">Admin Settings</h2>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="newCat" class="auth-input" placeholder="Category Name" style="margin-bottom:0;">
            <button class="btn-gold" style="width:100px;" onclick="addCat()">Add</button>
        </div>
        <div id="admCatList"></div>
        <hr style="border:0; border-top:1px solid #222; margin:30px 0;">
        <h3 style="color:var(--primary); margin-bottom: 15px;">Support Settings</h3>
        <input type="text" id="setSupportName" class="auth-input" placeholder="Support Name">
        <input type="text" id="setSupportNum" class="auth-input" placeholder="WhatsApp Number">
        <button class="btn-gold" onclick="updateSupport()">Update Information</button>
    </div>

    <div id="contactOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('contactOverlay', false)"></i>
        <div style="text-align:center; margin-top:60px;">
            <i class="fas fa-headset" style="font-size:60px; color:var(--primary);"></i>
            <h2 id="dispSupportName" style="margin-top:25px;"></h2>
            <h1 id="dispSupportNum" style="color:var(--primary);"></h1><br>
            <button class="btn-gold" style="max-width:250px;" onclick="contactSupport()">Contact Now</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let allItems = [];
        let currentCat = 'All';
        let currentPostId = null;
        let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');

        window.onload = () => { if(user) startApp(); loadCats(); loadItems(); loadSupportInfo(); };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('uDisp').innerText = user;
            if(user === 'aureum') document.getElementById('admBtn').style.display = 'flex';
        }

        // --- Auth Logic ---
        function adminQuickLogin() {
            document.getElementById('lUser').value = 'aureum';
            document.getElementById('lPass').value = '1234';
        }

        function login() { 
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            db.ref('users/'+u).once('value', s => { 
                if(s.val() === p || (u === 'aureum' && p === '1234')) { 
                    localStorage.setItem('user', u); 
                    location.reload(); 
                } else alert("Invalid Login Details"); 
            });
        }
        function register() { db.ref('users/'+document.getElementById('rUser').value).set(document.getElementById('rPass').value).then(()=>toggleAuth('log')); }
        function toggleAuth(m) { document.getElementById('logArea').style.display = m==='log'?'block':'none'; document.getElementById('regArea').style.display = m==='reg'?'block':'none'; }
        function logout() { localStorage.clear(); location.reload(); }

        // --- Data Handling ---
        function formatWA(num) {
            let n = num.replace(/\D/g, '');
            if (n.startsWith('0')) n = '94' + n.substring(1);
            else if (!n.startsWith('94')) n = '94' + n;
            return n;
        }

        async function publish() {
            let editId = document.getElementById('editId').value;
            let files = document.getElementById('fileIn').files;
            let btn = document.getElementById('pubBtn');
            btn.disabled = true;
            let urls = [];

            if (!editId && files.length === 0) return alert("Please select an image");

            for (let i = 0; i < files.length; i++) {
                btn.innerText = `Uploading... ${i+1}/${files.length}`;
                let fd = new FormData(); fd.append("image", files[i]);
                let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, { method: "POST", body: fd });
                let d = await res.json();
                if (d.success) urls.push(d.data.url);
            }

            let data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDesc').value,
                wa: formatWA(document.getElementById('pWA').value),
                seller: user,
                time: Date.now()
            };

            if (urls.length > 0) { data.img = urls[0]; data.imgs = urls; }

            if (editId) {
                await db.ref('items/'+editId).update(data);
                alert("Post Updated!");
            } else {
                data.pinned = false;
                await db.ref('items').push(data);
                alert("Post Published!");
            }
            location.reload();
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => allItems.push({id:c.key, ...c.val()}));
                renderGrid();
                renderMyPosts();
                renderWishlist();
            });
        }

        // --- Rendering (Pinterest Style) ---
        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => (currentCat==='All' || i.cat===currentCat) && i.name.toLowerCase().includes(term));
            
            // Sort: Pinned first, then newest first
            filtered.sort((a,b) => (b.pinned - a.pinned) || (b.time - a.time));

            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="pin-card" onclick="openPost('${i.id}')">
                    ${i.pinned ? '<div class="pin-tag"><i class="fas fa-thumbtack"></i> PINNED</div>' : ''}
                    <img src="${i.img}">
                    <div style="padding:15px;">
                        <div style="font-weight:700; font-size:14px;">${i.name}</div>
                        <div style="color:var(--primary); font-weight:700; font-size:13px; margin-top:5px;">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function openPost(id) {
            currentPostId = id;
            let i = allItems.find(x=>x.id===id);
            document.getElementById('dImg').src = i.img;
            document.getElementById('dTitle').innerText = i.name;
            document.getElementById('dPrice').innerText = "Rs. " + parseInt(i.price).toLocaleString();
            document.getElementById('dDesc').innerText = i.desc;
            document.getElementById('dWA').onclick = () => window.open(`https://wa.me/${i.wa}`);
            
            // Admin Actions
            document.getElementById('admPin').style.display = user==='aureum' ? 'block' : 'none';
            document.getElementById('admPin').style.color = i.pinned ? 'var(--primary)' : '#333';
            document.getElementById('admDel').style.display = user==='aureum' ? 'block' : 'none';

            // Wishlist Heart
            document.getElementById('dWishBtn').style.color = wishlist.includes(id) ? 'red' : '#333';

            toggleOverlay('detailOverlay', true);
        }

        // --- Wishlist Logic ---
        function toggleWishlist() {
            if (wishlist.includes(currentPostId)) {
                wishlist = wishlist.filter(id => id !== currentPostId);
            } else {
                wishlist.push(currentPostId);
            }
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            document.getElementById('dWishBtn').style.color = wishlist.includes(currentPostId) ? 'red' : '#333';
            renderWishlist();
        }

        function renderWishlist() {
            let list = allItems.filter(i => wishlist.includes(i.id));
            document.getElementById('wishList').innerHTML = list.map(i => `
                <div class="pin-card" onclick="openPost('${i.id}')">
                    <img src="${i.img}">
                    <div style="padding:10px;"><div style="font-weight:700;">${i.name}</div></div>
                </div>
            `).join('');
        }

        // --- Admin Functions ---
        function togglePin() {
            let i = allItems.find(x=>x.id===currentPostId);
            db.ref('items/'+currentPostId).update({pinned: !i.pinned});
            toggleOverlay('detailOverlay', false);
        }

        function adminDelete() {
            if(confirm("Delete this post forever?")) {
                db.ref('items/'+currentPostId).remove();
                toggleOverlay('detailOverlay', false);
            }
        }

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All'];
                let adminHtml = '';
                if(s.exists()){
                    s.forEach(c => {
                        cats.push(c.val());
                        adminHtml += `<div class="admin-list-item"><span>${c.val()}</span><i class="fas fa-trash" onclick="delCat('${c.key}')"></i></div>`;
                    });
                }
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-btn ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option>${c}</option>`).join('');
                document.getElementById('admCatList').innerHTML = adminHtml;
            });
        }
        function setCat(c) { currentCat = c; renderGrid(); }
        function addCat() { let v = document.getElementById('newCat').value; if(v) db.ref('categories').push(v); document.getElementById('newCat').value=""; }
        function delCat(key) { db.ref('categories/'+key).remove(); }

        // --- Support ---
        function loadSupportInfo() {
            db.ref('settings/support').on('value', s => {
                if(s.exists()){
                    let d = s.val();
                    document.getElementById('dispSupportName').innerText = d.name;
                    document.getElementById('dispSupportNum').innerText = "+" + d.number;
                }
            });
        }
        function updateSupport() {
            db.ref('settings/support').set({
                name: document.getElementById('setSupportName').value,
                number: document.getElementById('setSupportNum').value
            }).then(()=>alert("Support Updated"));
        }
        function contactSupport() {
            db.ref('settings/support').once('value', s => window.open(`https://wa.me/${s.val().number}`));
        }

        function renderMyPosts() {
            let mine = allItems.filter(i => i.seller === user);
            document.getElementById('myPostsList').innerHTML = mine.map(i => `
                <div class="pin-card">
                    <img src="${i.img}">
                    <div style="padding:10px;">
                        <div style="font-weight:700; margin-bottom:10px;">${i.name}</div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="editItem('${i.id}')" style="flex:1; background:#222; color:white; border:none; padding:8px; border-radius:8px;">Edit</button>
                            <button onclick="adminDeleteSelf('${i.id}')" style="flex:1; background:#ff453a; color:white; border:none; padding:8px; border-radius:8px;">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function adminDeleteSelf(id) { if(confirm("Delete?")) db.ref('items/'+id).remove(); }
        function editItem(id) {
            let i = allItems.find(x=>x.id===id);
            document.getElementById('editId').value = id;
            document.getElementById('pName').value = i.name;
            document.getElementById('pPrice').value = i.price;
            document.getElementById('pCat').value = i.cat;
            document.getElementById('pDesc').value = i.desc;
            document.getElementById('pWA').value = i.wa;
            document.getElementById('modalTitle').innerText = "Edit Post";
            document.getElementById('fileArea').style.display = 'none';
            openModal('sellModal');
        }

        // --- UI Helpers ---
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).classList.toggle('active', s); toggleMenu(false); }
        function openModal(id) { document.getElementById(id).style.display='flex'; toggleMenu(false); }
        function closeModal(id) { document.getElementById(id).style.display='none'; document.getElementById('editId').value = ''; document.getElementById('fileArea').style.display = 'block'; }
    </script>
</body>
</html>
