<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Next-Gen Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: #050505;
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.08), transparent);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Floating Navbar */
        nav {
            position: sticky; top: 15px; z-index: 1000;
            margin: 0 auto; width: 95%; max-width: 1200px;
            background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 12px 25px; display: flex; justify-content: space-between; align-items: center;
        }

        .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }

        .nav-btns { display: flex; gap: 10px; align-items: center; }

        .btn {
            padding: 8px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 13px;
        }

        .btn-gold { background: var(--gold); color: black; border: none; }
        .btn-outline { background: transparent; color: white; border: 1px solid var(--glass-border); }

        /* Auth UI */
        #userProfile { display: none; align-items: center; gap: 10px; }
        #userProfile img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); }

        /* Grid */
        .wrapper { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* Product Card */
        .product-card {
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 25px;
            padding: 20px; transition: 0.4s; position: relative;
        }
        .product-card:hover { transform: translateY(-8px); border-color: var(--gold); }
        .product-img { width: 100%; height: 200px; border-radius: 18px; object-fit: cover; margin-bottom: 15px; }
        .admin-badge { position: absolute; top: 10px; right: 10px; background: red; font-size: 10px; padding: 4px 8px; border-radius: 10px; cursor: pointer; display: none; }

        /* Modals */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: #111; width: 100%; max-width: 400px; padding: 30px; border-radius: 30px; border: 1px solid var(--gold);
        }
        input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 15px; border-radius: 12px; }

        .wa-btn {
            display: block; text-align: center; background: #25D366; color: white; text-decoration: none;
            padding: 12px; border-radius: 15px; font-weight: 700; margin-top: 15px;
        }

        @media (max-width: 600px) {
            .nav-btns .btn { padding: 6px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AUREUM</div>
        <div class="nav-btns">
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="standard"></div>

            <div id="userProfile">
                <img id="userPic" src="">
                <button class="btn btn-gold" onclick="openModal('sellModal')">Sell</button>
            </div>

            <button class="btn btn-outline" id="adminBtn" onclick="openModal('adminModal')"><i class="fas fa-user-shield"></i></button>
            <button class="btn btn-outline" id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="wrapper">
        <div class="product-grid" id="marketGrid"></div>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--gold)">Admin Login</h2>
            <input type="text" id="admUser" placeholder="Username">
            <input type="password" id="admPass" placeholder="Password">
            <button class="btn btn-gold" style="width:100%" onclick="adminLogin()">Login</button>
            <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="closeModal('adminModal')">Cancel</button>
        </div>
    </div>

    <div class="modal" id="sellModal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--gold)">Post Item</h2>
            <input type="file" id="fileIn" accept="image/*">
            <input type="text" id="pName" placeholder="Item Name">
            <input type="text" id="pPrice" placeholder="Price">
            <input type="text" id="pWA" placeholder="WhatsApp Number">
            <button class="btn btn-gold" style="width:100%" onclick="publish()">Publish Now</button>
            <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="closeModal('sellModal')">Cancel</button>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let currentImg = "";

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 1. Admin Login Logic
        function adminLogin() {
            const u = document.getElementById('admUser').value;
            const p = document.getElementById('admPass').value;
            if(u === 'aureum' && p === '1234') {
                isAdmin = true;
                localStorage.setItem('aureum_admin', 'true');
                alert("Welcome Back, Admin!");
                closeModal('adminModal');
                checkAdminState();
            } else {
                alert("Access Denied!");
            }
        }

        function checkAdminState() {
            if(localStorage.getItem('aureum_admin') === 'true') {
                isAdmin = true;
                document.getElementById('adminBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
                render();
            }
        }

        // 2. Google Login Callback (Simple Simulation)
        function handleCredentialResponse(response) {
            // මේකෙදි Google එකෙන් දෙන token එක decode කරලා user info ගන්න පුළුවන්
            // දැනට අපි user log වුණා කියලා හිතමු
            document.querySelector('.g_id_signin').style.display = 'none';
            document.getElementById('userProfile').style.display = 'flex';
            document.getElementById('logoutBtn').style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('aureum_admin');
            location.reload();
        }

        // 3. Image Handling
        document.getElementById('fileIn').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = () => currentImg = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        });

        // 4. Publish & Render
        function publish() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const wa = document.getElementById('pWA').value;
            if(!name || !wa) return alert("Fill all!");

            const items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            items.push({ id: Date.now(), name, price, wa, img: currentImg });
            localStorage.setItem('aureum_items', JSON.stringify(items));
            closeModal('sellModal');
            render();
        }

        function deleteItem(id) {
            if(!confirm("Remove this post?")) return;
            let items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            items = items.filter(i => i.id !== id);
            localStorage.setItem('aureum_items', JSON.stringify(items));
            render();
        }

        function render() {
            const grid = document.getElementById('marketGrid');
            const items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            grid.innerHTML = items.map(i => `
                <div class="product-card">
                    ${isAdmin ? `<div class="admin-badge" style="display:block" onclick="deleteItem(${i.id})">REMOVE</div>` : ''}
                    <img src="${i.img || 'https://via.placeholder.com/300'}" class="product-img">
                    <h3>${i.name}</h3>
                    <p style="color:var(--gold); font-weight:800">${i.price}</p>
                    <a href="https://wa.me/${i.wa}?text=I'm%20interested%20on%20this" class="wa-btn">WhatsApp</a>
                </div>
            `).join('');
        }

        window.onload = () => {
            checkAdminState();
            render();
        };
    </script>
</body>
</html>
