<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #dfbc74; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Header & Nav */
        header { padding: 20px 5%; position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.85); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 3px; cursor: pointer; }
        .search-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin: 15px 0; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        /* Category System */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cat-item { padding: 8px 22px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-item.active { background: var(--primary); color: black; font-weight: 700; border-color: var(--primary); }

        /* Grid UI */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-price { color: var(--primary); font-weight: 800; font-size: 16px; margin: 5px 0; }
        .card-date { font-size: 10px; color: #666; display: flex; align-items: center; gap: 5px; }

        /* Side Menu */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(10,10,10,0.98); backdrop-filter: blur(25px); z-index: 4000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 20px; border-left: 1px solid var(--glass-border); }
        #sideMenu.active { right: 0; }
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; border-radius: 12px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; }
        .menu-link:hover { background: var(--glass); color: var(--primary); }

        /* Modals & Glass UI */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 480px; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 35px; padding: 30px; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .btn-gold { width: 100%; padding: 16px; background: var(--primary); color: black; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-gold:active { transform: scale(0.98); }
        .input-glass { width: 100%; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 18px; margin-bottom: 12px; outline: none; }
        .input-glass:focus { border-color: var(--primary); }

        /* Auth Screen */
        .auth-container { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        
        /* My Listings & Cart */
        .list-item { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--glass-border); }
        .list-item img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        .list-actions { display: flex; gap: 10px; margin-left: auto; }
        .icon-btn { width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Categories in Publish */
        select.input-glass option { background: #111; color: white; }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-container">
        <div style="width:100%; max-width:350px; text-align:center;">
            <h1 style="color:var(--primary); letter-spacing:8px; margin-bottom:40px;">AUREUM</h1>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-gold" onclick="handleAuth()">SIGN IN</button>
        </div>
    </div>

    <header>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="logo" onclick="location.reload()">AUREUM</div>
            <i class="fas fa-bars-staggered fa-lg" onclick="toggleMenu(true)" style="cursor:pointer;"></i>
        </div>
        <div class="search-bar">
            <i class="fas fa-search" style="opacity:0.4;"></i>
            <input type="text" id="searchInput" placeholder="Search for items..." oninput="renderGrid()">
        </div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <main class="grid" id="marketGrid"></main>

    <div id="viewLayer" class="overlay">
        <div class="glass-panel" style="padding:0; overflow:hidden;">
            <i class="fas fa-times" style="position:absolute; right:25px; top:25px; z-index:10; background:rgba(0,0,0,0.5); width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer;" onclick="toggleOverlay('viewLayer', false)"></i>
            <img id="vImg" src="" style="width:100%; aspect-ratio:1/1; object-fit:cover;">
            <div style="padding:30px;">
                <h2 id="vTitle"></h2>
                <h3 id="vPrice" style="color:var(--primary); margin:15px 0;"></h3>
                <p id="vDesc" style="color:#bbb; font-size:14px; line-height:1.6; margin-bottom:25px;"></p>
                <div style="display:flex; gap:10px;">
                    <button class="btn-gold" id="addToCartBtn" style="flex:1; background:#333; color:white;"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                    <button id="vWA" class="btn-gold" style="flex:2; background:#25D366; color:white;"><i class="fab fa-whatsapp"></i> Chat Now</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sellModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('sellModal', false)"></i>
            <h3 id="modalTitle">Publish Your Ad</h3><br>
            <input type="file" id="fileIn" multiple hidden onchange="previewImages()">
            <div id="imgPre" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto; padding:5px;"></div>
            <button class="btn-gold" style="background:#222; color:white; margin-bottom:15px;" onclick="document.getElementById('fileIn').click()"><i class="fas fa-camera"></i> SELECT IMAGES</button>
            <input type="text" id="pName" class="input-glass" placeholder="Title (e.g. iPhone 15 Pro)">
            <input type="number" id="pPrice" class="input-glass" placeholder="Price (Rs.)">
            <select id="pCat" class="input-glass"></select>
            <textarea id="pDesc" class="input-glass" placeholder="Tell us more about the product..." style="height:100px;"></textarea>
            <input type="text" id="pWA" class="input-glass" placeholder="WhatsApp Number">
            <button class="btn-gold" id="pubBtn" onclick="publish()">CONFIRM & PUBLISH</button>
        </div>
    </div>

    <div id="myListingsModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('myListingsModal', false)"></i>
            <h3>My Active Ads</h3><br>
            <div id="myListContainer"></div>
        </div>
    </div>

    <div id="cartModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('cartModal', false)"></i>
            <h3>Shopping Cart</h3><br>
            <div id="cartContainer"></div>
            <div id="cartTotal" style="margin-top:20px; border-top:1px solid var(--glass-border); padding-top:15px; text-align:right; font-weight:800;"></div>
        </div>
    </div>

    <div id="adminModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('adminModal', false)"></i>
            <h3>Admin: Settings</h3><br>
            
            <p style="font-size:12px; color:var(--primary);">CATEGORIES</p><br>
            <div id="adminCatList"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="newCatIn" class="input-glass" placeholder="New Cat Name" style="margin:0;">
                <button class="btn-gold" style="width:80px; margin:0;" onclick="addCategory()">ADD</button>
            </div>

            <br><p style="font-size:12px; color:var(--primary);">SUPPORT CONTACT</p><br>
            <input type="text" id="adminSuppName" class="input-glass" placeholder="Support Name">
            <input type="text" id="adminSuppNum" class="input-glass" placeholder="Support Number">
            <button class="btn-gold" onclick="saveAdminSettings()">SAVE SETTINGS</button>
        </div>
    </div>

    <div id="sideMenu">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleMenu(false)"></i>
        <div style="margin-top:60px;">
            <div class="menu-link" onclick="openPublish()"><i class="fas fa-plus-circle"></i> Publish Ad</div>
            <div class="menu-link" onclick="loadMyListings()"><i class="fas fa-list-ul"></i> My Listings</div>
            <div class="menu-link" onclick="openCart()"><i class="fas fa-shopping-cart"></i> My Cart <span id="cartCount" style="background:var(--primary); color:black; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:800; margin-left:5px;">0</span></div>
            <div class="menu-link" id="suppLink" onclick="contactSupport()"><i class="fas fa-headset"></i> Support</div>
            <div class="menu-link" id="adminLink" style="display:none;" onclick="openAdmin()"><i class="fas fa-shield-halved"></i> Admin Settings</div>
            <div class="menu-link" onclick="logout()" style="color:#ff4d4d; margin-top:40px;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let isAdmin = user === 'admin';
        let allItems = [], cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let currentCat = 'All', editId = null, supportData = { name: "Aureum Support", num: "94771234567" };

        window.onload = () => {
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                if(isAdmin) document.getElementById('adminLink').style.display = 'flex';
                updateCartBadge();
            }
            loadCats(); loadItems(); loadAdminSettings();
        };

        // --- AUTH ---
        function handleAuth() {
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            if(u === 'aureum' && p === '1234') { localStorage.setItem('user', 'admin'); location.reload(); }
            else if(u && p) { localStorage.setItem('user', u); location.reload(); }
        }
        function logout() { localStorage.clear(); location.reload(); }

        // --- CORE DATA ---
        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = []; s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid();
            });
        }

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All']; let aHtml = '';
                s.forEach(c => {
                    cats.push(c.val());
                    aHtml += `<div class="list-item" style="padding:8px 15px;"><span>${c.val()}</span><i class="fas fa-trash" style="margin-left:auto; color:red; cursor:pointer;" onclick="deleteCat('${c.key}')"></i></div>`;
                });
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-item ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('adminCatList').innerHTML = aHtml;
            });
        }

        function loadAdminSettings() {
            db.ref('settings').on('value', s => { if(s.exists()) { supportData = s.val(); } });
        }

        // --- UI RENDERING ---
        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => (currentCat === 'All' || i.cat === currentCat) && i.name.toLowerCase().includes(term));
            document.getElementById('marketGrid').innerHTML = filtered.reverse().map(i => `
                <div class="card" onclick="viewPost('${i.id}')">
                    <img src="${i.imgs[0]}">
                    <div class="card-info">
                        <p style="font-size:12px; font-weight:600; opacity:0.8;">${i.cat}</p>
                        <p style="font-weight:700; margin:3px 0;">${i.name}</p>
                        <p class="card-price">Rs. ${Number(i.price).toLocaleString()}</p>
                        <span class="card-date"><i class="far fa-calendar-alt"></i> ${new Date(i.time).toLocaleDateString()}</span>
                    </div>
                </div>`).join('');
        }

        function viewPost(id) {
            let i = allItems.find(x => x.id === id);
            document.getElementById('vImg').src = i.imgs[0];
            document.getElementById('vTitle').innerText = i.name;
            document.getElementById('vPrice').innerText = "Rs. " + Number(i.price).toLocaleString();
            document.getElementById('vDesc').innerText = i.desc;
            document.getElementById('vWA').onclick = () => window.open('https://wa.me/'+i.wa);
            document.getElementById('addToCartBtn').onclick = () => addToCart(i);
            toggleOverlay('viewLayer', true);
        }

        // --- ACTIONS ---
        async function publish() {
            let btn = document.getElementById('pubBtn');
            let files = document.getElementById('fileIn').files;
            
            btn.innerText = "Processing Assets..."; btn.disabled = true;

            let urls = editId ? allItems.find(x=>x.id===editId).imgs : [];
            if(files.length > 0) {
                urls = [];
                for(let f of files) {
                    let fd = new FormData(); fd.append("image", f);
                    let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
                    let d = await res.json(); if(d.success) urls.push(d.data.url);
                }
            }

            let data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDesc').value,
                wa: document.getElementById('pWA').value,
                imgs: urls,
                seller: user,
                time: editId ? allItems.find(x=>x.id===editId).time : Date.now()
            };

            let ref = editId ? db.ref('items/'+editId) : db.ref('items').push();
            ref.set(data).then(() => { alert("Post Successful!"); location.reload(); });
        }

        function loadMyListings() {
            let my = allItems.filter(i => i.seller === user);
            document.getElementById('myListContainer').innerHTML = my.map(i => `
                <div class="list-item">
                    <img src="${i.imgs[0]}">
                    <div><b>${i.name}</b><br><small>Rs. ${i.price}</small></div>
                    <div class="list-actions">
                        <div class="icon-btn" style="background:#dfbc7422; color:var(--primary);" onclick="editPost('${i.id}')"><i class="fas fa-edit"></i></div>
                        <div class="icon-btn" style="background:#ff4d4d22; color:#ff4d4d;" onclick="deletePost('${i.id}')"><i class="fas fa-trash"></i></div>
                    </div>
                </div>`).join('') || '<p style="text-align:center; opacity:0.5;">No items published.</p>';
            toggleOverlay('myListingsModal', true); toggleMenu(false);
        }

        function editPost(id) {
            editId = id; let i = allItems.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = "Edit My Ad";
            document.getElementById('pName').value = i.name;
            document.getElementById('pPrice').value = i.price;
            document.getElementById('pCat').value = i.cat;
            document.getElementById('pDesc').value = i.desc;
            document.getElementById('pWA').value = i.wa;
            toggleOverlay('myListingsModal', false); toggleOverlay('sellModal', true);
        }

        // --- CART SYSTEM ---
        function addToCart(item) {
            if(!cart.find(x => x.id === item.id)) { cart.push(item); localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); }
            alert("Added to Cart!");
        }
        function openCart() {
            let total = 0;
            document.getElementById('cartContainer').innerHTML = cart.map((i, idx) => {
                total += Number(i.price);
                return `<div class="list-item"><img src="${i.imgs[0]}"><div><b>${i.name}</b><br><small>Rs. ${i.price}</small></div><i class="fas fa-times" style="margin-left:auto; cursor:pointer;" onclick="removeFromCart(${idx})"></i></div>`;
            }).join('') || 'Cart is empty.';
            document.getElementById('cartTotal').innerText = "Total: Rs. " + total.toLocaleString();
            toggleOverlay('cartModal', true); toggleMenu(false);
        }
        function removeFromCart(idx) { cart.splice(idx, 1); localStorage.setItem('cart', JSON.stringify(cart)); updateCartBadge(); openCart(); }
        function updateCartBadge() { document.getElementById('cartCount').innerText = cart.length; }

        // --- ADMIN HELPERS ---
        function openAdmin() {
            document.getElementById('adminSuppName').value = supportData.name;
            document.getElementById('adminSuppNum').value = supportData.num;
            toggleOverlay('adminModal', true); toggleMenu(false);
        }
        function saveAdminSettings() {
            let data = { name: document.getElementById('adminSuppName').value, num: document.getElementById('adminSuppNum').value };
            db.ref('settings').set(data).then(() => alert("Settings Updated!"));
        }
        function contactSupport() { window.open(`https://wa.me/${supportData.num}?text=Hi ${supportData.name}, I need help.`); }

        // --- UTILS ---
        function setCat(c) { currentCat = c; renderGrid(); loadCats(); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
        function openPublish() { editId = null; document.getElementById('modalTitle').innerText = "Publish Your Ad"; toggleOverlay('sellModal', true); toggleMenu(false); }
        function addCategory() { let v = document.getElementById('newCatIn').value; if(v) db.ref('categories').push(v).then(()=>document.getElementById('newCatIn').value=''); }
        function deleteCat(k) { if(confirm("Delete Category?")) db.ref('categories/'+k).remove(); }
        function deletePost(id) { if(confirm("Delete this Ad?")) db.ref('items/'+id).remove().then(()=>loadMyListings()); }
        function previewImages() {
            let pre = document.getElementById('imgPre'); pre.innerHTML = '';
            for(let f of document.getElementById('fileIn').files) {
                let r = new FileReader(); r.onload = (e) => pre.innerHTML += `<img src="${e.target.result}" style="width:70px; height:70px; border-radius:15px; border:2px solid var(--primary); object-fit:cover;">`;
                r.readAsDataURL(f);
            }
        }
    </script>
</body>
</html>
