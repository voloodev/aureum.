<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg-dark: #0a0a0c;
            --surface: #121215; --text-main: #ffffff; --text-muted: #a1a1aa;
            --glass: rgba(20, 20, 22, 0.85); --blur: blur(25px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- Header & Navigation --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--glass); backdrop-filter: var(--blur); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 700; color: var(--primary); font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .search-container { display: flex; align-items: center; background: rgba(255,255,255,0.07); border-radius: 12px; padding: 8px 15px; width: 45%; border: 1px solid rgba(255,255,255,0.1); }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; padding-left: 10px; font-size: 14px; }

        /* --- Category Bar --- */
        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 15px 5%; scrollbar-width: none; }
        .cat-btn { padding: 8px 20px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* --- Optimized Masonry Grid --- */
        .market-container { padding: 10px 5% 50px 5%; }
        .masonry-grid { 
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            align-items: start;
        }
        @media (min-width: 768px) { .masonry-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .masonry-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .pin-card { 
            background: var(--surface); 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; 
            transition: 0.3s;
            position: relative;
        }
        .pin-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .pin-card img { width: 100%; height: auto; display: block; object-fit: cover; }
        
        .pin-tag { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 9px; z-index: 2; }

        /* --- UI Elements --- */
        .slide-overlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 92vh; background: var(--bg-dark); z-index: 3000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; overflow-y: auto; border-radius: 25px 25px 0 0; border-top: 1px solid #333; }
        .slide-overlay.active { bottom: 0; }
        .exit-btn { float: right; font-size: 24px; color: var(--text-muted); cursor: pointer; }
        .auth-input, select, textarea { width: 100%; background: #161618; border: 1px solid #222; color: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; outline: none; }
        .btn-gold { width: 100%; background: var(--primary); color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        #sideMenu { position: fixed; top: 0; right: -320px; width: 280px; height: 100vh; background: var(--glass); backdrop-filter: var(--blur); z-index: 4000; transition: 0.4s; padding: 40px 20px; border-left: 1px solid rgba(255,255,255,0.05); }
        #sideMenu.active { right: 0; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 15px; cursor: pointer; font-weight: 600; color: white; border-radius: 12px; transition: 0.2s; }
        .menu-item:hover { background: rgba(255,255,255,0.05); }
        .menu-item i { color: var(--primary); width: 20px; }

        #authOverlay { position: fixed; inset: 0; z-index: 5000; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div style="width: 100%; max-width: 380px; text-align: center;">
            <h1 style="color:var(--primary); margin-bottom:30px; letter-spacing: 2px;">AUREUM</h1>
            <input type="text" id="lUser" class="auth-input" placeholder="Username">
            <input type="password" id="lPass" class="auth-input" placeholder="Password">
            <button class="btn-gold" onclick="login()">Access Marketplace</button>
        </div>
    </div>

    <nav>
        <div class="logo" onclick="location.reload()">AUREUM</div>
        <div class="search-container">
            <i class="fas fa-search" style="color:#555;"></i>
            <input type="text" id="searchInput" placeholder="Search anything..." oninput="renderGrid()">
        </div>
        <div onclick="toggleMenu(true)" style="cursor:pointer;"><i class="fas fa-bars-staggered fa-lg"></i></div>
    </nav>

    <div class="cat-scroll" id="catBar"></div>
    
    <div class="market-container">
        <div class="masonry-grid" id="marketGrid"></div>
    </div>

    <div id="sideMenu">
        <i class="fas fa-times exit-btn" onclick="toggleMenu(false)"></i>
        <div style="margin-top:50px;">
            <div class="menu-item"><i class="fas fa-user-circle"></i> <span id="uDisp"></span></div>
            <div class="menu-item" onclick="openModal('sellModal')"><i class="fas fa-plus-square"></i> Post an Ad</div>
            <div class="menu-item" onclick="toggleOverlay('myPostsOverlay', true)"><i class="fas fa-layer-group"></i> My Listings</div>
            <div id="admTools" class="menu-item" style="display:none; color:var(--primary);" onclick="toggleOverlay('adminPanel', true)"><i class="fas fa-user-shield"></i> Admin Panel</div>
            <div class="menu-item" onclick="logout()" style="margin-top:20px; color:#ff453a;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <div id="myPostsOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('myPostsOverlay', false)"></i>
        <h2 style="margin-bottom:25px;">My Listings</h2>
        <div id="myListingsGrid" class="masonry-grid"></div>
    </div>

    <div id="sellModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:5000; align-items:center; justify-content:center; padding:20px;">
        <div style="width:100%; max-width:400px; max-height:90vh; overflow-y:auto; background:var(--surface); padding:25px; border-radius:20px;">
            <i class="fas fa-times exit-btn" onclick="closeModal('sellModal')"></i>
            <h3 id="modalTitle" style="margin-bottom:20px; color: var(--primary);">Publish Product</h3>
            <input type="hidden" id="editId">
            <div id="fileArea"><input type="file" id="fileIn" class="auth-input"></div>
            <input type="text" id="pName" class="auth-input" placeholder="Item Name">
            <input type="number" id="pPrice" class="auth-input" placeholder="Price (Rs.)">
            <select id="pCat" class="auth-input"></select>
            <textarea id="pDesc" class="auth-input" placeholder="Detailed description..."></textarea>
            <input type="text" id="pWA" class="auth-input" placeholder="WhatsApp Number">
            <button class="btn-gold" id="pubBtn" onclick="publish()">Submit Post</button>
        </div>
    </div>

    <div id="detailOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('detailOverlay', false)"></i>
        <div id="dContent" style="margin-top:20px;">
            <img id="dImg" style="width:100%; border-radius:15px; border: 1px solid #333;">
            <h2 id="dTitle" style="margin-top:20px;"></h2>
            <h3 id="dPrice" style="color:var(--primary); margin:10px 0; font-size: 22px;"></h3>
            <p id="dDesc" style="color:var(--text-muted); line-height: 1.6; font-size: 15px;"></p><br>
            
            <button id="dWA" class="btn-gold" style="background:#25D366; color:white;"><i class="fab fa-whatsapp"></i> Contact Seller</button>
            
            <div id="adminActions" style="display:none; margin-top:15px; border-top:1px solid #333; padding-top:15px;">
                <p style="color:var(--primary); font-size: 12px; margin-bottom: 10px;">ADMINISTRATOR CONTROLS</p>
                <button class="btn-gold" style="background:white; color:black;" onclick="togglePin()">Toggle Pin Status</button>
                <button class="btn-gold" style="background:#ff453a; color:white;" onclick="adminDelete()">Remove This Post</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('adminPanel', false)"></i>
        <h2 style="margin-bottom:25px;">Marketplace Management</h2>
        <div style="background:#1a1a1d; padding:20px; border-radius:15px;">
            <h4 style="margin-bottom:15px;">Add New Category</h4>
            <div style="display:flex; gap:10px;">
                <input type="text" id="newCat" class="auth-input" placeholder="Category Name" style="margin-bottom:0;">
                <button class="btn-gold" style="width:100px; margin:0;" onclick="addCat()">Add</button>
            </div>
            <div id="admCatList" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let allItems = [];
        let currentCat = 'All';
        let activePostId = null;

        window.onload = () => { if(user) startApp(); loadCats(); loadItems(); };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('uDisp').innerText = user;
            if(user === 'aureum') document.getElementById('admTools').style.display = 'flex';
        }

        function login() {
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            if(u === 'aureum' && p === '1234') { localStorage.setItem('user', u); location.reload(); }
            else { 
                db.ref('users/'+u).once('value', s => { 
                    if(s.val() === p) { localStorage.setItem('user', u); location.reload(); }
                    else alert("Access Denied");
                });
            }
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => allItems.push({id:c.key, ...c.val()}));
                renderGrid();
                renderMyPosts();
            });
        }

        // --- Core Rendering (Newest First) ---
        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => (currentCat==='All' || i.cat===currentCat) && i.name.toLowerCase().includes(term));
            
            // Sort Logic: Pinned first, then Newest (Time)
            filtered.sort((a,b) => (b.pinned - a.pinned) || (b.time - a.time));

            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="pin-card" onclick="openPost('${i.id}')">
                    ${i.pinned ? '<div class="pin-tag">PINNED</div>' : ''}
                    <img src="${i.img}">
                    <div style="padding:12px;">
                        <div style="font-weight:600; font-size:13px; color:#eee;">${i.name}</div>
                        <div style="color:var(--primary); font-weight:700; font-size:14px; margin-top:4px;">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderMyPosts() {
            let mine = allItems.filter(i => i.seller === user);
            document.getElementById('myListingsGrid').innerHTML = mine.map(i => `
                <div class="pin-card">
                    <img src="${i.img}">
                    <div style="padding:10px;">
                        <div style="font-weight:600; font-size:12px; margin-bottom:8px;">${i.name}</div>
                        <div style="display:flex; gap:5px;">
                            <button onclick="editItem('${i.id}')" style="flex:1; padding:7px; background:#333; border:none; color:white; border-radius:6px; font-size:11px;">Edit</button>
                            <button onclick="deleteSelf('${i.id}')" style="flex:1; padding:7px; background:#ff453a; border:none; color:white; border-radius:6px; font-size:11px;">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- Actions ---
        async function publish() {
            let editId = document.getElementById('editId').value;
            let file = document.getElementById('fileIn').files[0];
            let btn = document.getElementById('pubBtn');
            btn.disabled = true; btn.innerText = "Processing...";

            let data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDesc').value,
                wa: document.getElementById('pWA').value,
                seller: user,
                time: Date.now()
            };

            if (file) {
                let fd = new FormData(); fd.append("image", file);
                let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, { method: "POST", body: fd });
                let d = await res.json();
                if (d.success) data.img = d.data.url;
            }

            if (editId) { await db.ref('items/'+editId).update(data); }
            else { data.pinned = false; await db.ref('items').push(data); }
            location.reload();
        }

        function openPost(id) {
            activePostId = id;
            let i = allItems.find(x=>x.id===id);
            document.getElementById('dImg').src = i.img;
            document.getElementById('dTitle').innerText = i.name;
            document.getElementById('dPrice').innerText = "Rs. " + parseInt(i.price).toLocaleString();
            document.getElementById('dDesc').innerText = i.desc;
            document.getElementById('dWA').onclick = () => window.open(`https://wa.me/${i.wa}`);
            
            // Show Admin Tools only if user is 'aureum'
            document.getElementById('adminActions').style.display = (user === 'aureum') ? 'block' : 'none';
            
            toggleOverlay('detailOverlay', true);
        }

        // --- Management Logic ---
        function deleteSelf(id) { if(confirm("Delete your post permanently?")) db.ref('items/'+id).remove(); }
        function adminDelete() { if(confirm("ADMIN: Remove this listing?")) { db.ref('items/'+activePostId).remove(); toggleOverlay('detailOverlay', false); } }
        function togglePin() { 
            let i = allItems.find(x=>x.id===activePostId);
            db.ref('items/'+activePostId).update({pinned: !i.pinned});
            toggleOverlay('detailOverlay', false);
        }

        function editItem(id) {
            let i = allItems.find(x=>x.id===id);
            document.getElementById('editId').value = id;
            document.getElementById('pName').value = i.name;
            document.getElementById('pPrice').value = i.price;
            document.getElementById('pCat').value = i.cat;
            document.getElementById('pDesc').value = i.desc;
            document.getElementById('pWA').value = i.wa;
            document.getElementById('modalTitle').innerText = "Update Post";
            openModal('sellModal');
            toggleOverlay('myPostsOverlay', false);
        }

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All']; let admH = '';
                if(s.exists()) s.forEach(c => { 
                    cats.push(c.val()); 
                    admH += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">${c.val()} <i class="fas fa-trash" onclick="db.ref('categories/${c.key}').remove()" style="color:red; cursor:pointer;"></i></div>`;
                });
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-btn ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option>${c}</option>`).join('');
                document.getElementById('admCatList').innerHTML = admH;
            });
        }

        function setCat(c) { currentCat = c; renderGrid(); }
        function addCat() { let v = document.getElementById('newCat').value; if(v) db.ref('categories').push(v); document.getElementById('newCat').value=""; }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).classList.toggle('active', s); toggleMenu(false); }
        function openModal(id) { document.getElementById(id).style.display='flex'; toggleMenu(false); }
        function closeModal(id) { document.getElementById(id).style.display='none'; document.getElementById('editId').value = ''; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
