<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg-dark: #0a0a0c;
            --surface: #121215; --text-main: #ffffff; --text-muted: #a1a1aa;
            --glass: rgba(20, 20, 22, 0.7); --blur: blur(25px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- Header --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--glass); backdrop-filter: var(--blur); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 700; color: var(--primary); font-size: 24px; letter-spacing: 1px; }
        
        .header-actions { display: flex; align-items: center; gap: 10px; flex: 1; max-width: 400px; margin: 0 15px; }
        .search-container { display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px 12px; flex: 1; border: 1px solid rgba(255,255,255,0.1); }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 13px; margin-left: 8px; }
        .filter-toggle-btn { background: var(--primary); border: none; padding: 10px; border-radius: 10px; cursor: pointer; color: #000; font-weight: bold; }

        /* --- Categories --- */
        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 15px 5%; scrollbar-width: none; }
        .cat-btn { padding: 8px 20px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px rgba(223, 188, 116, 0.2); }

        /* --- Filter Overlay --- */
        #filterOverlay { display: none; padding: 20px; background: var(--surface); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin: 0 5% 10px; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .filter-item label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 5px; }
        .filter-item select, .filter-item input { width: 100%; padding: 10px; background: #000; color: white; border: 1px solid #333; border-radius: 8px; font-size: 12px; }

        /* --- Grid --- */
        .masonry-grid { column-count: 2; column-gap: 12px; padding: 0 5%; }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }
        .pin-card { break-inside: avoid; margin-bottom: 15px; background: var(--surface); border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); position: relative; cursor: pointer; transition: 0.3s; }
        .pin-card img { width: 100%; display: block; }
        .pin-tag { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 9px; }

        /* --- Side Menu --- */
        #sideMenu { position: fixed; top: 0; right: -300px; width: 260px; height: 100vh; background: var(--glass); backdrop-filter: var(--blur); z-index: 2000; transition: 0.4s; padding: 40px 20px; border-left: 1px solid rgba(255,255,255,0.05); }
        #sideMenu.active { right: 0; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 15px; cursor: pointer; font-weight: 600; color: white; border-radius: 12px; transition: 0.2s; }
        .menu-item:hover { background: rgba(255,255,255,0.05); }
        .menu-item i { width: 20px; color: var(--primary); }

        /* --- Auth Overlay --- */
        #authOverlay { position: fixed; inset: 0; z-index: 5000; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { width: 100%; max-width: 350px; background: var(--surface); border-radius: 24px; padding: 35px; text-align: center; border: 1px solid #333; }
        .auth-input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 14px; margin-bottom: 10px; border-radius: 10px; outline: none; }
        .btn-gold { width: 100%; background: var(--primary); color: #000; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 15px; }

        /* --- Details & Modals --- */
        .slide-overlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 90vh; background: var(--glass); backdrop-filter: var(--blur); border-radius: 25px 25px 0 0; z-index: 3000; transition: 0.5s; padding: 25px; overflow-y: auto; }
        .slide-overlay.active { bottom: 0; }
        .exit-btn { float: right; font-size: 20px; color: var(--text-muted); cursor: pointer; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h1 style="color:var(--primary); margin-bottom:25px;">AUREUM</h1>
            <div id="logArea">
                <input type="text" id="lUser" class="auth-input" placeholder="Username">
                <input type="password" id="lPass" class="auth-input" placeholder="Password">
                <button class="btn-gold" onclick="login()">Login</button>
                <p onclick="toggleAuth('reg')" style="margin-top:15px; color:#555; cursor:pointer; font-size:12px;">Create New Account</p>
            </div>
            <div id="regArea" style="display:none;">
                <input type="text" id="rUser" class="auth-input" placeholder="Desired Username">
                <input type="password" id="rPass" class="auth-input" placeholder="Password">
                <button class="btn-gold" onclick="register()">Sign Up</button>
                <p onclick="toggleAuth('log')" style="margin-top:15px; color:#555; cursor:pointer; font-size:12px;">Back to Login</p>
            </div>
        </div>
    </div>

    <nav>
        <div class="logo">AUREUM</div>
        <div class="header-actions">
            <div class="search-container">
                <i class="fas fa-search" style="color:#444;"></i>
                <input type="text" id="searchInput" placeholder="Search..." oninput="renderGrid()">
            </div>
            <button class="filter-toggle-btn" onclick="toggleFilters()"><i class="fas fa-sliders-h"></i></button>
        </div>
        <div onclick="toggleMenu(true)" style="cursor:pointer;"><i class="fas fa-bars fa-lg"></i></div>
    </nav>

    <div id="filterOverlay">
        <div class="filter-grid">
            <div class="filter-item"><label>Price Min</label><input type="number" id="minP" oninput="renderGrid()"></div>
            <div class="filter-item"><label>Price Max</label><input type="number" id="maxP" oninput="renderGrid()"></div>
            <div id="dynamicFilterArea" class="filter-grid" style="grid-column: span 2; gap: 10px;"></div>
        </div>
    </div>

    <div class="cat-scroll" id="catBar"></div>
    <div class="masonry-grid" id="marketGrid"></div>

    <div id="sideMenu">
        <i class="fas fa-times exit-btn" onclick="toggleMenu(false)"></i>
        <div style="margin-top:40px;">
            <div class="menu-item"><i class="fas fa-user"></i> <span id="uDisp">User</span></div>
            <div class="menu-item" onclick="openModal('sellModal')"><i class="fas fa-plus-circle"></i> Post an Item</div>
            <div class="menu-item" onclick="toggleOverlay('wishOverlay', true)"><i class="fas fa-heart"></i> Wishlist</div>
            <div class="menu-item" onclick="toggleOverlay('contactOverlay', true)"><i class="fas fa-headset"></i> Contact Us</div>
            <div id="admBtn" class="menu-item" style="display:none; color:var(--primary);" onclick="toggleOverlay('adminOverlay', true)"><i class="fas fa-shield-alt"></i> Admin Panel</div>
            <div class="menu-item" onclick="logout()" style="margin-top:20px; color:#ff453a;"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div id="sellModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:4000; align-items:center; justify-content:center; padding:20px;">
        <div class="auth-box" style="max-height:90vh; overflow-y:auto;">
            <i class="fas fa-times exit-btn" onclick="closeModal('sellModal')"></i>
            <h3>Publish Product</h3><br>
            <input type="file" id="fileIn" multiple class="auth-input">
            <input type="text" id="pName" class="auth-input" placeholder="Product Name">
            <input type="number" id="pPrice" class="auth-input" placeholder="Price (Rs)">
            <select id="pCat" class="auth-input" onchange="updatePublishFields(this.value)"></select>
            <div id="publishDynArea"></div>
            <textarea id="pDesc" class="auth-input" placeholder="Description..." style="height:80px;"></textarea>
            <input type="text" id="pWA" class="auth-input" placeholder="WhatsApp (e.g. 94771234567)">
            <button class="btn-gold" id="pubBtn" onclick="publish()">Publish Now</button>
        </div>
    </div>

    <div id="detailOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('detailOverlay', false)"></i>
        <div id="dContent" style="margin-top:20px;">
            <div style="position:relative;">
                <img id="dImg" style="width:100%; border-radius:15px;">
                <i class="fas fa-chevron-right" id="nextArr" onclick="nextSlide()" style="position:absolute; right:10px; top:50%; font-size:30px; color:white; cursor:pointer;"></i>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                <h2 id="dTitle"></h2>
                <div style="display:flex; gap:15px; font-size:22px;">
                    <i id="dWish" class="fas fa-heart" style="cursor:pointer; color:#333;"></i>
                    <i id="admPin" class="fas fa-thumbtack" style="display:none; cursor:pointer;"></i>
                </div>
            </div>
            <h3 id="dPrice" style="color:var(--primary); margin:10px 0;"></h3>
            <p id="dDesc" style="color:var(--text-muted); line-height:1.5; font-size:14px;"></p><br>
            <button id="dWA" class="btn-gold" style="background:#25D366; color:white;"><i class="fab fa-whatsapp"></i> Chat with Seller</button>
            <button id="admDel" class="btn-gold" style="display:none; background:#ff453a; color:white; margin-top:10px;">Delete This Post</button>
        </div>
    </div>

    <div id="contactOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('contactOverlay', false)"></i>
        <div style="text-align:center; margin-top:40px;">
            <i class="fas fa-envelope-open-text" style="font-size:50px; color:var(--primary);"></i>
            <h2 style="margin:15px 0;">Customer Support</h2>
            <p id="cName" style="color:var(--text-muted);"></p>
            <h1 id="cWA" style="color:var(--primary); margin-top:10px;"></h1>
        </div>
    </div>

    <div id="adminOverlay" class="slide-overlay">
        <i class="fas fa-times exit-btn" onclick="toggleOverlay('adminOverlay', false)"></i>
        <h3>Admin Settings</h3><br>
        <div style="display:flex; gap:5px; margin-bottom:20px;">
            <input type="text" id="newCat" class="auth-input" placeholder="New Category">
            <button class="btn-gold" style="width:80px;" onclick="addCat()">Add</button>
        </div>
        <div id="admCatList"></div>
    </div>

    <div id="wishOverlay" class="slide-overlay"><i class="fas fa-times exit-btn" onclick="toggleOverlay('wishOverlay', false)"></i><h2>My Wishlist</h2><div id="wishGrid" class="masonry-grid" style="margin-top:20px;"></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let allItems = [];
        let currentCat = 'All';
        let dImgs = [];
        let curSlide = 0;

        window.onload = () => { if(user) startApp(); loadCats(); loadItems(); };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('uDisp').innerText = user;
            if(user === 'aureum') document.getElementById('admBtn').style.display = 'flex';
        }

        // --- Categories ---
        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All'];
                if(s.exists()) Object.values(s.val()).forEach(v => cats.push(v));
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-btn ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option>${c}</option>`).join('');
                document.getElementById('admCatList').innerHTML = cats.filter(c=>c!=='All').map(c => `<div style="padding:10px; background:#222; margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between;">${c} <i class="fas fa-trash" onclick="delCat('${c}')"></i></div>`).join('');
            });
        }
        function setCat(c) { currentCat = c; loadCats(); updateFilterUI(c); renderGrid(); }
        function addCat() { let v = document.getElementById('newCat').value; if(v) db.ref('categories').push(v); document.getElementById('newCat').value=""; }
        function delCat(n) { db.ref('categories').once('value', s => { s.forEach(c => { if(c.val()===n) c.ref.remove(); }); }); }

        // --- Filter UI ---
        function updateFilterUI(c) {
            const area = document.getElementById('dynamicFilterArea');
            area.innerHTML = (c==='Fashion' || c==='Clothes') 
                ? `<div class="filter-item"><label>Gender</label><select id="fGen" onchange="renderGrid()"><option value="All">All</option><option>Male</option><option>Female</option></select></div>`
                : `<div class="filter-item"><label>Condition</label><select id="fCond" onchange="renderGrid()"><option value="All">All</option><option>Brand New</option><option>Used</option></select></div>`;
        }
        function updatePublishFields(c) {
            const area = document.getElementById('publishDynArea');
            area.innerHTML = (c==='Fashion' || c==='Clothes') 
                ? `<select id="pGen" class="auth-input"><option>Male</option><option>Female</option></select>` 
                : `<select id="pCond" class="auth-input"><option>Brand New</option><option>Used</option></select>`;
        }

        // --- Publish Logic (FIXED) ---
        async function publish() {
            let files = document.getElementById('fileIn').files;
            if(files.length === 0) return alert("Please select photos");
            
            let btn = document.getElementById('pubBtn');
            btn.disabled = true;

            let urls = [];
            for(let i=0; i<files.length; i++) {
                btn.innerText = `Uploading ${i+1}/${files.length}...`;
                let fd = new FormData(); fd.append("image", files[i]);
                let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
                let d = await res.json();
                if(d.success) urls.push(d.data.url);
            }

            if(urls.length > 0) {
                btn.innerText = "Saving...";
                await db.ref('items').push({
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    cat: document.getElementById('pCat').value,
                    gen: document.getElementById('pGen')?.value || 'N/A',
                    cond: document.getElementById('pCond')?.value || 'N/A',
                    desc: document.getElementById('pDesc').value,
                    wa: document.getElementById('pWA').value,
                    img: urls[0], imgs: urls, seller: user, pinned: false
                });
                location.reload();
            } else {
                alert("Upload failed");
                btn.disabled = false;
                btn.innerText = "Publish Now";
            }
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => allItems.push({id:c.key, ...c.val()}));
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let min = parseInt(document.getElementById('minP').value) || 0;
            let max = parseInt(document.getElementById('maxP').value) || 9999999;
            let gen = document.getElementById('fGen')?.value || 'All';
            let cond = document.getElementById('fCond')?.value || 'All';

            let filtered = allItems.filter(i => 
                (currentCat === 'All' || i.cat === currentCat) &&
                (i.name.toLowerCase().includes(term)) &&
                (parseInt(i.price) >= min && parseInt(i.price) <= max) &&
                (gen === 'All' || i.gen === gen) && 
                (cond === 'All' || i.cond === cond)
            );
            filtered.sort((a,b) => (b.pinned) - (a.pinned));

            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="pin-card" onclick="openPost('${i.id}')">
                    ${i.pinned ? '<div class="pin-tag"><i class="fas fa-thumbtack"></i> PINNED</div>' : ''}
                    <img src="${i.img}">
                    <div style="padding:12px;">
                        <div style="font-weight:700; font-size:13px;">${i.name}</div>
                        <div style="color:var(--primary); font-weight:700; font-size:12px;">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function openPost(id) {
            let i = allItems.find(x=>x.id===id);
            dImgs = i.imgs || [i.img]; curSlide = 0;
            document.getElementById('dImg').src = dImgs[0];
            document.getElementById('nextArr').style.display = dImgs.length > 1 ? 'block' : 'none';
            document.getElementById('dTitle').innerText = i.name;
            document.getElementById('dPrice').innerText = "Rs. " + parseInt(i.price).toLocaleString();
            document.getElementById('dDesc').innerText = i.desc;
            document.getElementById('dWA').onclick = () => window.open(`https://wa.me/${i.wa}`);

            const pin = document.getElementById('admPin');
            pin.style.display = user==='aureum' ? 'block' : 'none';
            pin.style.color = i.pinned ? 'var(--primary)' : '#333';
            pin.onclick = () => { db.ref('items/'+id).update({pinned: !i.pinned}); toggleOverlay('detailOverlay',false); };

            document.getElementById('admDel').style.display = user==='aureum' ? 'block' : 'none';
            document.getElementById('admDel').onclick = () => { if(confirm("Delete?")) db.ref('items/'+id).remove(); toggleOverlay('detailOverlay',false); };

            toggleOverlay('detailOverlay', true);
        }

        function nextSlide() { curSlide = (curSlide+1)%dImgs.length; document.getElementById('dImg').src = dImgs[curSlide]; }

        // --- Core Functions ---
        function login() { 
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            if(u==='aureum' && p==='1234') { localStorage.setItem('user','aureum'); location.reload(); return; }
            db.ref('users/'+u).once('value', s => { if(s.val()===p) { localStorage.setItem('user',u); location.reload(); } else alert("Invalid"); });
        }
        function register() { db.ref('users/'+document.getElementById('rUser').value).set(document.getElementById('rPass').value).then(()=>toggleAuth('log')); }
        function toggleAuth(m) { document.getElementById('logArea').style.display = m==='log'?'block':'none'; document.getElementById('regArea').style.display = m==='reg'?'block':'none'; }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).classList.toggle('active', s); toggleMenu(false); }
        function openModal(id) { document.getElementById(id).style.display='flex'; toggleMenu(false); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function toggleFilters() { let f = document.getElementById('filterOverlay'); f.style.display = f.style.display==='block'?'none':'block'; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
