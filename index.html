<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #dfbc74; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); --blur: blur(25px); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Auth Screen Styling */
        .auth-container { position: fixed; inset: 0; background: url('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=2070&auto=format&fit=crop') center/cover; z-index: 6000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        
        .frosted-box { position: relative; width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 35px; padding: 40px 30px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .input-glass { width: 100%; padding: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: white; border-radius: 18px; margin-bottom: 15px; outline: none; transition: 0.3s; }
        .input-glass:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }
        
        .btn-gold { width: 100%; padding: 16px; background: var(--primary); color: black; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 15px; letter-spacing: 1px; }
        .btn-link { background: none; border: none; color: white; opacity: 0.6; cursor: pointer; margin-top: 20px; font-size: 13px; text-decoration: underline; }

        /* Main UI */
        header { padding: 20px 5%; position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.85); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 3px; cursor: pointer; }
        
        .search-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin-top: 15px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-item { padding: 8px 18px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .cat-item.active { background: var(--primary); color: black; font-weight: 700; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .pin-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); color: black; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; }

        /* Modals/Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 450px; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; scrollbar-width: none; }

        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(10,10,10,0.98); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); z-index: 4000; transition: 0.4s; padding: 40px 20px; }
        #sideMenu.active { right: 0; }
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; border-radius: 12px; cursor: pointer; margin-bottom: 8px; }
        .admin-only { display: none; }
        
        .pre-img-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
        .pre-img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-container">
        <div id="loginBox" class="frosted-box">
            <h1 style="color:var(--primary); margin-bottom:10px; letter-spacing: 5px;">AUREUM</h1>
            <p style="font-size:12px; opacity:0.5; margin-bottom:30px;">Premium Marketplace</p>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-gold" onclick="handleAuth()">SIGN IN</button>
            <button class="btn-link" onclick="toggleAuth(false)">Create New Account</button>
        </div>

        <div id="signupBox" class="frosted-box" style="display: none;">
            <h2 style="color:var(--primary); margin-bottom:30px;">Create Account</h2>
            <input type="text" id="rUser" class="input-glass" placeholder="Choose Username">
            <input type="password" id="rPass" class="input-glass" placeholder="Choose Password">
            <button class="btn-gold" onclick="register()">REGISTER</button>
            <button class="btn-link" onclick="toggleAuth(true)">Back to Login</button>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo" onclick="location.reload()">AUREUM</div>
            <i class="fas fa-bars-staggered fa-lg" onclick="toggleMenu(true)" style="cursor:pointer;"></i>
        </div>
        <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search..." oninput="renderGrid()"></div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <div class="grid" id="marketGrid"></div>

    <div id="viewLayer" class="overlay">
        <div class="glass-panel" style="padding:0; overflow:hidden;">
            <div style="position: absolute; right:15px; top:15px; z-index:100; display:flex; flex-direction:column; gap:10px;">
                <div onclick="addToCart()" style="width:40px; height:40px; background:rgba(0,0,0,0.7); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-shopping-cart"></i></div>
                <div class="admin-only" onclick="deletePost()" style="width:40px; height:40px; background:rgba(0,0,0,0.7); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#ff4d4d;"><i class="fas fa-trash"></i></div>
                <div onclick="toggleOverlay('viewLayer', false)" style="width:40px; height:40px; background:rgba(0,0,0,0.7); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-times"></i></div>
            </div>
            <div style="max-height: 85vh; overflow-y: auto; padding:0 25px 25px;">
                <div style="margin: 0 -25px 20px; position:relative; aspect-ratio:1/1; background:#000;">
                    <img id="vImg" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <h2 id="vTitle"></h2>
                <h3 id="vPrice" style="color:var(--primary); margin:10px 0;"></h3>
                <p id="vDesc" style="color:#aaa; font-size:14px; margin-bottom:20px;"></p>
                <button class="btn-gold" id="vWA" style="background:#25D366; color:white;"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            </div>
        </div>
    </div>

    <div id="sellModal" class="overlay"><div class="glass-panel">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('sellModal', false)"></i>
        <h3>Publish Ad</h3><br>
        <button class="btn-gold" style="background:#333; color:white;" onclick="document.getElementById('fileIn').click()">SELECT IMAGES</button>
        <input type="file" id="fileIn" multiple hidden onchange="previewImages()"><div class="pre-img-grid" id="imgPre"></div>
        <input type="text" id="pName" class="input-glass" placeholder="Title">
        <input type="number" id="pPrice" class="input-glass" placeholder="Price">
        <select id="pCat" class="input-glass"></select>
        <textarea id="pDescIn" class="input-glass" placeholder="Description..."></textarea>
        <input type="text" id="pWAIn" class="input-glass" placeholder="WhatsApp Number">
        <button class="btn-gold" id="pubBtn" onclick="publish()">PUBLISH</button>
    </div></div>

    <div id="adminModal" class="overlay"><div class="glass-panel">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('adminModal', false)"></i>
        <h3>Admin Settings</h3><br>
        <div id="catManageList"></div>
        <input type="text" id="newCatIn" class="input-glass" placeholder="New Cat Name">
        <button class="btn-gold" onclick="addCat()">Add Category</button>
    </div></div>

    <div id="sideMenu">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleMenu(false)"></i>
        <div style="margin-top:40px;">
            <div class="menu-link"><i class="fas fa-user-circle"></i> <span id="uDisp">User</span></div>
            <div class="menu-link" onclick="openModal('sellModal')"><i class="fas fa-plus-circle"></i> Publish Ad</div>
            <div class="menu-link" onclick="openMyPosts()"><i class="fas fa-box"></i> My Listings</div>
            <div class="menu-link admin-only" id="adminLink" onclick="toggleOverlay('adminModal', true)"><i class="fas fa-cog"></i> Admin Settings</div>
            <div class="menu-link" onclick="logout()" style="color:#ff4d4d; margin-top:20px;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let isAdmin = localStorage.getItem('isAdmin') === 'true';
        let allItems = [], curId = '', currentCat = 'All';

        window.onload = () => {
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('uDisp').innerText = user;
                if(isAdmin) document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'flex');
            }
            loadCats(); loadItems();
        };

        function toggleAuth(isLogin) {
            document.getElementById('loginBox').style.display = isLogin ? 'block' : 'none';
            document.getElementById('signupBox').style.display = isLogin ? 'none' : 'block';
        }

        // --- AUTH LOGIC ---
        function handleAuth() {
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            if(u === 'aureum' && p === '1234') {
                localStorage.setItem('user', 'admin'); localStorage.setItem('isAdmin', 'true');
                location.reload();
            } else {
                db.ref('users/'+u).once('value', s => {
                    if(s.exists() && s.val() === p) {
                        localStorage.setItem('user', u); localStorage.setItem('isAdmin', 'false');
                        location.reload();
                    } else alert("Invalid Credentials");
                });
            }
        }

        function register() {
            let u = document.getElementById('rUser').value, p = document.getElementById('rPass').value;
            if(!u || !p) return alert("Fill all fields");
            db.ref('users/'+u).set(p).then(() => { alert("Account Created!"); toggleAuth(true); });
        }

        function logout() { localStorage.clear(); location.reload(); }

        // --- DATA LOGIC ---
        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = []; s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => {
                let match = (currentCat === 'All') || (currentCat === 'My' && i.seller === user) || (i.cat === currentCat);
                return match && i.name.toLowerCase().includes(term);
            });
            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="card" onclick="viewPost('${i.id}')">
                    <img src="${i.imgs[0]}">
                    <div style="padding:15px;"><p style="font-size:12px;">${i.name}</p><p style="color:var(--primary); font-weight:800;">Rs. ${i.price}</p></div>
                </div>`).join('');
        }

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All']; let mHtml = '';
                s.forEach(c => {
                    cats.push(c.val());
                    mHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${c.val()}</span><i class="fas fa-trash" onclick="delCat('${c.key}')" style="color:red;"></i></div>`;
                });
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-item ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('catManageList').innerHTML = mHtml;
            });
        }

        function viewPost(id) {
            let i = allItems.find(x => x.id === id); curId = id;
            document.getElementById('vTitle').innerText = i.name;
            document.getElementById('vPrice').innerText = "Rs. " + i.price;
            document.getElementById('vDesc').innerText = i.desc;
            document.getElementById('vImg').src = i.imgs[0];
            document.getElementById('vWA').onclick = () => window.open('https://wa.me/'+i.wa);
            toggleOverlay('viewLayer', true);
        }

        async function publish() {
            let files = document.getElementById('fileIn').files;
            if(!files.length) return alert("Select images");
            document.getElementById('pubBtn').innerText = "Uploading...";
            let urls = [];
            for(let f of files) {
                let fd = new FormData(); fd.append("image", f);
                let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
                let d = await res.json(); if(d.success) urls.push(d.data.url);
            }
            db.ref('items').push({
                name: document.getElementById('pName').value, price: document.getElementById('pPrice').value,
                cat: document.getElementById('pCat').value, desc: document.getElementById('pDescIn').value,
                wa: document.getElementById('pWAIn').value, imgs: urls, seller: user, time: Date.now()
            }).then(() => location.reload());
        }

        // --- HELPERS ---
        function previewImages() {
            let files = document.getElementById('fileIn').files;
            let pre = document.getElementById('imgPre'); pre.innerHTML = '';
            for(let f of files) {
                let r = new FileReader(); r.onload = (e) => pre.innerHTML += `<img src="${e.target.result}" class="pre-img">`;
                r.readAsDataURL(f);
            }
        }
        function setCat(c) { currentCat = c; renderGrid(); loadCats(); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
        function openModal(id) { toggleOverlay(id, true); toggleMenu(false); }
        function addCat() { let v = document.getElementById('newCatIn').value; if(v) db.ref('categories').push(v); }
        function delCat(k) { db.ref('categories/'+k).remove(); }
        function deletePost() { if(confirm("Delete Ad?")) { db.ref('items/'+curId).remove(); location.reload(); } }
        function openMyPosts() { currentCat = 'My'; renderGrid(); toggleMenu(false); }
    </script>
</body>
</html>
