<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- Global Glass Style --- */
        .glass-card { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: 20px; }

        /* --- Header Section --- */
        header { padding: 30px 5% 10px 5%; position: sticky; top: 0; z-index: 1000; background: var(--bg); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 32px; font-weight: 800; color: var(--primary); letter-spacing: 3px; cursor: pointer; }
        
        .search-row { display: flex; gap: 10px; align-items: center; }
        .search-bar { flex: 1; display: flex; align-items: center; padding: 15px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; font-size: 16px; }
        
        .filter-trigger { padding: 15px; background: var(--primary); color: #000; border-radius: 15px; cursor: pointer; font-weight: 700; }

        /* --- Category Bar --- */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cat-item { padding: 10px 25px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 30px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .cat-item.active { background: var(--primary); color: black; border-color: var(--primary); }

        /* --- Masonry Grid --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; cursor: pointer; transition: 0.4s; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 12px; }

        /* --- Overlays & SideMenu --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 450px; background: rgba(20,20,20,0.8); border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }
        
        #sideMenu { position: fixed; top: 0; right: -350px; width: 320px; height: 100vh; background: rgba(10,10,10,0.9); backdrop-filter: blur(30px); border-left: 1px solid var(--glass-border); z-index: 4000; transition: 0.5s; padding: 40px 25px; }
        #sideMenu.active { right: 0; }
        
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 18px; color: white; text-decoration: none; font-weight: 600; border-radius: 15px; margin-bottom: 5px; transition: 0.3s; cursor: pointer; }
        .menu-link:hover { background: var(--glass); color: var(--primary); }
        .menu-link i { font-size: 20px; width: 25px; }

        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: black; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .input-glass { width: 100%; padding: 15px; background: var(--glass); border: 1px solid var(--glass-border); color: white; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .exit { position: absolute; top: 20px; right: 25px; font-size: 24px; color: #555; cursor: pointer; }

        .shield-btn { font-size: 24px; color: rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .shield-btn:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div id="authOverlay" class="overlay" style="display: flex;">
        <div class="glass-panel" style="text-align: center;">
            <div class="nav-top" style="justify-content: flex-end;"><i class="fas fa-shield-alt shield-btn" onclick="openAdminLogin()"></i></div>
            <h1 style="color:var(--primary); margin-bottom:40px;">AUREUM</h1>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-main" onclick="login()">ENTER MARKET</button>
        </div>
    </div>

    <div id="adminLoginModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times exit" onclick="closeOverlay('adminLoginModal')"></i>
            <h3 style="margin-bottom:20px;">Staff Verification</h3>
            <input type="password" id="adminPassKey" class="input-glass" placeholder="Enter Shield Key">
            <button class="btn-main" onclick="adminVerify()">VERIFY ACCESS</button>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo">AUREUM</div>
            <div style="display:flex; gap:20px; align-items:center;">
                <i class="fas fa-bars-staggered fa-xl" onclick="toggleMenu(true)" style="cursor:pointer;"></i>
            </div>
        </div>
        <div class="search-row">
            <div class="search-bar">
                <i class="fas fa-search" style="color:#555;"></i>
                <input type="text" id="searchInput" placeholder="Search for premium products..." oninput="renderGrid()">
            </div>
        </div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <div class="grid" id="marketGrid"></div>

    <div id="sideMenu">
        <i class="fas fa-times exit" onclick="toggleMenu(false)"></i>
        <div style="margin-top:60px;">
            <div class="menu-link" style="color:var(--primary); background:var(--glass);"><i class="fas fa-user-circle"></i> <span id="uDisp"></span></div>
            <div class="menu-link" onclick="openModal('sellModal')"><i class="fas fa-plus-circle"></i> Post an Ad</div>
            <div class="menu-link"><i class="fas fa-heart"></i> Wishlist</div>
            <div class="menu-link"><i class="fas fa-shopping-cart"></i> My Cart</div>
            <div class="menu-link" onclick="toggleOverlay('myPostsOverlay', true)"><i class="fas fa-box"></i> My Posts</div>
            <div class="menu-link" onclick="showSupport()"><i class="fas fa-headset"></i> Customer Support</div>
            
            <div id="adminOnlyMenu" style="display:none; border-top: 1px solid #222; margin-top:15px; padding-top:15px;">
                <div class="menu-link" onclick="toggleOverlay('adminSettings', true)" style="color:var(--primary);">
                    <i class="fas fa-user-shield"></i> Admin Settings
                </div>
            </div>

            <div class="menu-link" onclick="logout()" style="margin-top:30px; color:#ff4d4d;"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div id="adminSettings" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times exit" onclick="closeOverlay('adminSettings')"></i>
            <h2 style="margin-bottom:20px; color:var(--primary);">Admin Controls</h2>
            
            <label>Manage Categories</label>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="newCat" class="input-glass" placeholder="Category Name" style="margin-bottom:0;">
                <button class="btn-main" style="width:80px; margin:0;" onclick="addCat()">Add</button>
            </div>
            <div id="admCatList" style="margin:15px 0; max-height:150px; overflow-y:auto;"></div>

            <label>Customer Support Info</label>
            <input type="text" id="suppName" class="input-glass" placeholder="Support Name" style="margin-top:10px;">
            <input type="text" id="suppNum" class="input-glass" placeholder="WhatsApp Number">
            <button class="btn-main" onclick="updateSupport()">Update Support Info</button>
        </div>
    </div>

    <div id="supportModal" class="overlay">
        <div class="glass-panel" style="text-align:center;">
            <i class="fas fa-times exit" onclick="closeOverlay('supportModal')"></i>
            <i class="fas fa-headset" style="font-size:50px; color:var(--primary); margin-bottom:20px;"></i>
            <h2>Customer Support</h2>
            <div id="supportDetails" style="margin:20px 0; font-size:18px;"></div>
            <button class="btn-main" id="supportCallBtn">Chat on WhatsApp</button>
        </div>
    </div>

    <div id="sellModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times exit" onclick="closeOverlay('sellModal')"></i>
            <h3>New Listing</h3><br>
            <input type="file" id="fileIn" class="input-glass">
            <input type="text" id="pName" class="input-glass" placeholder="Product Title">
            <input type="number" id="pPrice" class="input-glass" placeholder="Price">
            <select id="pCat" class="input-glass"></select>
            <textarea id="pDesc" class="input-glass" placeholder="Description"></textarea>
            <input type="text" id="pWA" class="input-glass" placeholder="WhatsApp Number">
            <button class="btn-main" id="pubBtn" onclick="publish()">PUBLISH NOW</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = localStorage.getItem('user');
        let allItems = [];
        let currentCat = 'All';

        window.onload = () => { if(user) startApp(); loadCats(); loadItems(); };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('uDisp').innerText = user;
            if(user === 'aureum') document.getElementById('adminOnlyMenu').style.display = 'block';
        }

        function login() {
            let u = document.getElementById('lUser').value;
            let p = document.getElementById('lPass').value;
            db.ref('users/'+u).once('value', s => {
                if(s.val() === p) { localStorage.setItem('user', u); location.reload(); }
                else alert("Invalid Credentials");
            });
        }

        function openAdminLogin() { document.getElementById('adminLoginModal').style.display='flex'; }
        function adminVerify() {
            if(document.getElementById('adminPassKey').value === '1234') {
                localStorage.setItem('user', 'aureum');
                location.reload();
            } else alert("Wrong Shield Key");
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => (currentCat==='All' || i.cat===currentCat) && i.name.toLowerCase().includes(term));
            filtered.sort((a,b) => b.time - a.time);
            
            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="card" onclick="alert('Item Details Coming Soon')">
                    <img src="${i.img}">
                    <div class="card-info">
                        <div style="font-weight:600; font-size:14px; margin-bottom:5px;">${i.name}</div>
                        <div style="color:var(--primary); font-weight:800;">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All']; let admH = '';
                if(s.exists()) s.forEach(c => { 
                    cats.push(c.val()); 
                    admH += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">${c.val()} <i class="fas fa-trash" onclick="db.ref('categories/${c.key}').remove()" style="color:red; cursor:pointer;"></i></div>`;
                });
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-item ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option>${c}</option>`).join('');
                document.getElementById('admCatList').innerHTML = admH;
            });
        }

        function showSupport() {
            db.ref('support').once('value', s => {
                let d = s.val() || {name: "Staff", num: "000"};
                document.getElementById('supportDetails').innerHTML = `<b>${d.name}</b><br>${d.num}`;
                document.getElementById('supportCallBtn').onclick = () => window.open('https://wa.me/'+d.num);
                document.getElementById('supportModal').style.display = 'flex';
            });
        }

        function updateSupport() {
            let name = document.getElementById('suppName').value;
            let num = document.getElementById('suppNum').value;
            db.ref('support').set({name, num}).then(() => alert("Support Info Updated"));
        }

        function setCat(c) { currentCat = c; renderGrid(); }
        function addCat() { let v = document.getElementById('newCat').value; if(v) db.ref('categories').push(v); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
