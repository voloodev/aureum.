<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Next-Gen Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #FFD700;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #050505;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.02) 0%, transparent 40%);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Responsive Container */
        .wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Glass Navbar */
        nav {
            position: sticky;
            top: 20px;
            z-index: 1000;
            margin: 20px auto;
            width: 95%;
            max-width: 1200px;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sell-btn {
            background: linear-gradient(135deg, var(--gold), #8A6E2F);
            color: black;
            border: none;
            padding: 10px 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            font-size: 13px;
        }

        .sell-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        /* Search Area */
        .search-container {
            margin: 40px auto;
            text-align: center;
        }

        .search-bar {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 18px 25px;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .search-bar:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        /* Modern Grid System */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding-bottom: 60px;
        }

        /* Product Card Glass Style */
        .product-card {
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 20px;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .product-card:hover::before { left: 100%; }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .product-img {
            width: 100%;
            height: 250px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .cat-tag {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .product-card h3 {
            font-size: 20px;
            margin: 10px 0;
            font-weight: 600;
        }

        .price-tag {
            font-size: 22px;
            font-weight: 800;
            color: var(--white);
            margin-bottom: 20px;
            display: block;
        }

        .wa-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(37, 211, 102, 0.1);
            color: #25D366;
            text-decoration: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            border: 1px solid rgba(37, 211, 102, 0.2);
            transition: 0.3s;
        }

        .wa-btn:hover {
            background: #25D366;
            color: white;
        }

        /* Modal Overlays */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #111;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            position: relative;
            animation: modalSlide 0.4s ease-out;
        }

        @keyframes modalSlide {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        input, textarea, select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 15px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            nav { padding: 12px 20px; top: 10px; }
            .logo { font-size: 20px; }
            .product-grid { grid-template-columns: 1fr; }
            .modal-content { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AUREUM</div>
        <button class="sell-btn" onclick="openModal()">+ Sell Item</button>
    </nav>

    <div class="wrapper">
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search the collection..." id="mainSearch">
        </div>

        <div class="product-grid" id="marketGrid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?q=80&w=1000&auto=format&fit=crop" class="product-img">
                <span class="cat-tag">Luxury</span>
                <h3>Signature Edition Watch</h3>
                <span class="price-tag">Rs. 45,000</span>
                <a href="#" class="wa-btn"><i class="fab fa-whatsapp"></i> Buy Now</a>
            </div>
        </div>
    </div>

    <div class="modal" id="sellModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 25px; text-align: center;">List New Item</h2>
            
            <div id="dropZone" style="width:100%; height:120px; border:2px dashed #444; border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; cursor:pointer;" onclick="document.getElementById('fileIn').click()">
                <span id="dropText">Tap to upload photo</span>
            </div>
            <input type="file" id="fileIn" hidden accept="image/*">

            <input type="text" id="itemName" placeholder="Item Name">
            <input type="text" id="itemPrice" placeholder="Price (e.g. Rs. 5,000)">
            <input type="text" id="itemWA" placeholder="WhatsApp Number">
            <textarea id="itemDesc" placeholder="Describe your item..."></textarea>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <button class="sell-btn" onclick="publishItem()">Publish</button>
                <button class="sell-btn" style="background:transparent; border:1px solid #444; color:white;" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        let currentImg = "";

        function openModal() { document.getElementById('sellModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('sellModal').style.display = 'none'; }

        // Image Preview Logic
        document.getElementById('fileIn').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                currentImg = reader.result;
                document.getElementById('dropZone').style.background = `url(${currentImg}) center/cover`;
                document.getElementById('dropText').style.display = 'none';
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        function publishItem() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const wa = document.getElementById('itemWA').value;
            const desc = document.getElementById('itemDesc').value;

            if(!name || !wa) return alert("Please fill details");

            const item = { id: Date.now(), name, price, wa, desc, img: currentImg };
            let items = JSON.parse(localStorage.getItem('aureum_v2')) || [];
            items.push(item);
            localStorage.setItem('aureum_v2', JSON.stringify(items));
            
            render();
            closeModal();
            // Clear inputs
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
        }

        function render() {
            const grid = document.getElementById('marketGrid');
            const items = JSON.parse(localStorage.getItem('aureum_v2')) || [];
            
            grid.innerHTML = items.map(i => `
                <div class="product-card">
                    <img src="${i.img || 'https://via.placeholder.com/300'}" class="product-img">
                    <span class="cat-tag">Available</span>
                    <h3>${i.name}</h3>
                    <span class="price-tag">${i.price}</span>
                    <a href="https://wa.me/${i.wa}?text=I'm%20interested%20on%20this%20is%20it%20available" class="wa-btn">
                        <i class="fab fa-whatsapp"></i> Buy Now
                    </a>
                </div>
            `).join('');
        }

        // Search logic
        document.getElementById('mainSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none';
            });
        });

        window.onload = render;
    </script>
</body>
</html>
