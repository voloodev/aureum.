<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Luxury Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --blur: blur(25px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: #050505;
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 50%);
            color: var(--white);
            min-height: 100vh;
        }

        /* --- Classic Frosted Login UI --- */
        #authOverlay {
            position: fixed; inset: 0; z-index: 5000;
            background: #000; display: flex; align-items: center; justify-content: center;
        }

        .login-container {
            width: 90%; max-width: 450px;
            background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px; padding: 50px 30px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-container h1 {
            font-size: 36px; color: var(--gold); letter-spacing: 5px; 
            margin-bottom: 30px; text-align: center;
        }

        .auth-btns button {
            width: 100%; padding: 14px; margin-bottom: 12px;
            border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s;
        }

        .btn-white { background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: transparent; border: 1px solid var(--gold) !important; color: white; }

        /* --- Main UI --- */
        nav {
            display: none; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--glass); backdrop-filter: var(--blur);
            border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000;
        }

        .wrapper { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* Admin Panels */
        #adminTools {
            display: none; background: rgba(212, 175, 55, 0.1); padding: 20px;
            border-radius: 20px; margin-bottom: 30px; border: 1px dashed var(--gold);
        }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .product-card { 
            background: var(--glass); border-radius: 25px; padding: 15px; 
            border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        .product-card.pinned { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .pin-icon { position: absolute; top: 10px; left: 10px; color: var(--gold); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 25px; border: 1px solid var(--gold); width: 90%; max-width: 400px; }
        
        input, select, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="login-container">
            <h1>AUREUM</h1>
            <div class="auth-btns">
                <button class="btn-white" onclick="alert('Google Auth requires Client ID setup in code')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Color_Icon.svg" width="20">
                    Sign in with Google
                </button>
                <button class="btn-gold" onclick="enterApp('user')">Login Account</button>
                <button class="btn-outline" onclick="enterApp('user')">Create Account</button>
                <p style="margin: 15px 0; font-size: 12px; opacity: 0.5;">OR</p>
                <button onclick="adminPrompt()" style="background:transparent; color:var(--gold); border:none; cursor:pointer; font-weight:bold;">Admin Access</button>
            </div>
        </div>
    </div>

    <nav id="mainNav">
        <div style="font-weight:800; color:var(--gold); letter-spacing:2px;">AUREUM</div>
        <div style="display:flex; gap:15px;">
            <button class="btn-gold" style="padding:8px 15px; border-radius:10px; border:none; cursor:pointer;" onclick="openModal('sellModal')">SELL ITEM</button>
            <button class="btn-outline" style="padding:8px 15px; border-radius:10px; cursor:pointer;" onclick="location.reload()">LOGOUT</button>
        </div>
    </nav>

    <div class="wrapper">
        <div id="adminTools">
            <h4 style="color:var(--gold); margin-bottom:10px;">Admin Panel</h4>
            <input type="text" id="newCatName" placeholder="New Category Name" style="width:200px;">
            <button class="btn-gold" style="padding:10px; border-radius:10px;" onclick="addCategory()">Add Category</button>
            <div id="catList" style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;"></div>
        </div>

        <div class="product-grid" id="marketGrid"></div>
    </div>

    <div class="modal" id="sellModal">
        <div class="modal-content">
            <h2 style="color:var(--gold); margin-bottom:20px;">Sell Item</h2>
            <input type="file" id="fileIn">
            <input type="text" id="pName" placeholder="Item Name">
            <input type="text" id="pPrice" placeholder="Price">
            <select id="pCat"></select>
            <input type="text" id="pWA" placeholder="WhatsApp Number">
            <button class="btn-gold" style="width:100%; padding:12px; border:none; border-radius:10px; font-weight:bold;" onclick="publish()">Publish</button>
            <button onclick="closeModal('sellModal')" style="width:100%; margin-top:10px; background:none; border:none; color:white; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let categories = JSON.parse(localStorage.getItem('aureum_cats')) || ['Luxury', 'Electronics', 'Fashion'];

        function enterApp(type) {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainNav').style.display = 'flex';
            render();
        }

        function adminPrompt() {
            const u = prompt("Username:");
            const p = prompt("Password:");
            if(u === 'aureum' && p === '1234') {
                isAdmin = true;
                document.getElementById('adminTools').style.display = 'block';
                enterApp('admin');
            } else { alert("Invalid!"); }
        }

        function openModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
            updateCatDropdown();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Category Logic
        function addCategory() {
            const val = document.getElementById('newCatName').value;
            if(!val) return;
            categories.push(val);
            localStorage.setItem('aureum_cats', JSON.stringify(categories));
            renderAdminCats();
        }

        function removeCat(index) {
            categories.splice(index, 1);
            localStorage.setItem('aureum_cats', JSON.stringify(categories));
            renderAdminCats();
        }

        function renderAdminCats() {
            const list = document.getElementById('catList');
            list.innerHTML = categories.map((c, i) => `
                <span style="background:#333; padding:5px 10px; border-radius:5px; font-size:12px;">
                    ${c} <i class="fas fa-times" style="color:red; cursor:pointer;" onclick="removeCat(${i})"></i>
                </span>
            `).join('');
        }

        function updateCatDropdown() {
            document.getElementById('pCat').innerHTML = categories.map(c => `<option>${c}</option>`).join('');
        }

        // Post Logic
        let currentImg = "";
        document.getElementById('fileIn').addEventListener('change', e => {
            const r = new FileReader();
            r.onload = () => currentImg = r.result;
            r.readAsDataURL(e.target.files[0]);
        });

        function publish() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const wa = document.getElementById('pWA').value;
            const cat = document.getElementById('pCat').value;

            const items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            items.push({ id: Date.now(), name, price, wa, cat, img: currentImg, pinned: false });
            localStorage.setItem('aureum_items', JSON.stringify(items));
            closeModal('sellModal');
            render();
        }

        function deleteItem(id) {
            let items = JSON.parse(localStorage.getItem('aureum_items'));
            items = items.filter(i => i.id !== id);
            localStorage.setItem('aureum_items', JSON.stringify(items));
            render();
        }

        function togglePin(id) {
            let items = JSON.parse(localStorage.getItem('aureum_items'));
            const idx = items.findIndex(i => i.id === id);
            items[idx].pinned = !items[idx].pinned;
            localStorage.setItem('aureum_items', JSON.stringify(items));
            render();
        }

        function render() {
            const grid = document.getElementById('marketGrid');
            let items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            
            // Sort to show pinned items first
            items.sort((a, b) => b.pinned - a.pinned);

            grid.innerHTML = items.map(i => `
                <div class="product-card ${i.pinned ? 'pinned' : ''}">
                    ${i.pinned ? '<i class="fas fa-thumbtack pin-icon"></i>' : ''}
                    <img src="${i.img || 'https://via.placeholder.com/300'}" style="width:100%; height:180px; object-fit:cover; border-radius:15px;">
                    <h3 style="margin-top:10px;">${i.name}</h3>
                    <p style="font-size:12px; opacity:0.5;">Category: ${i.cat}</p>
                    <p style="color:var(--gold); font-weight:800; font-size:20px; margin:10px 0;">${i.price}</p>
                    <a href="https://wa.me/${i.wa}?text=I'm%20interested" style="display:block; text-align:center; background:#25D366; color:white; text-decoration:none; padding:10px; border-radius:10px; font-weight:bold;">Buy on WhatsApp</a>
                    
                    ${isAdmin ? `
                        <div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                            <button onclick="togglePin(${i.id})" style="background:#555; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">${i.pinned ? 'Unpin' : 'Pin'}</button>
                            <button onclick="deleteItem(${i.id})" style="background:red; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">Delete</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
            if(isAdmin) renderAdminCats();
        }

        window.onload = render;
    </script>
</body>
</html>
