<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aureum | Premium Market</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- 🔥 Masonry Library -->
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

<style>
:root {
    --primary: #dfbc74;
    --bg-dark: #0a0a0c;
    --surface: #121215;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background: var(--bg-dark);
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 5%;
    background: rgba(20,20,22,0.7);
    backdrop-filter: blur(20px);
}

.logo {
    color: var(--primary);
    font-weight: 700;
}

.search-container {
    width: 50%;
    display: flex;
    background: #111;
    padding: 10px;
    border-radius: 10px;
}

.search-container input {
    background: transparent;
    border: none;
    color: white;
    width: 100%;
    outline: none;
}

/* GRID */
.masonry-grid {
    padding: 15px 5%;
}

/* CARD */
.pin-card {
    width: 100%;
    margin-bottom: 15px;
    background: var(--surface);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.pin-card img {
    width: 100%;
}

.pin-card:hover {
    transform: translateY(-5px);
}

/* TAG */
.pin-tag {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--primary);
    color: black;
    padding: 4px 8px;
    font-size: 10px;
    border-radius: 6px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">AUREUM</div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search..." oninput="renderGrid()">
    </div>
</nav>

<div id="marketGrid" class="masonry-grid"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
    authDomain: "aureum-5f6f4.firebaseapp.com",
    databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "aureum-5f6f4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allItems = [];

/* LOAD ITEMS */
function loadItems() {
    db.ref('items').on('value', s => {
        allItems = [];
        s.forEach(c => allItems.push({id:c.key, ...c.val()}));
        renderGrid();
    });
}

/* RENDER GRID */
function renderGrid() {
    let term = document.getElementById('searchInput').value.toLowerCase();

    let filtered = allItems.filter(i =>
        i.name.toLowerCase().includes(term)
    );

    filtered.sort((a,b)=> (b.pinned - a.pinned) || (b.time - a.time));

    let grid = document.getElementById('marketGrid');

    grid.innerHTML = filtered.map(i => `
        <div class="pin-card">
            ${i.pinned ? '<div class="pin-tag">PINNED</div>' : ''}
            <img src="${i.img}">
            <div style="padding:12px;">
                <div style="font-weight:700;">${i.name}</div>
                <div style="color:var(--primary);">Rs. ${parseInt(i.price).toLocaleString()}</div>
            </div>
        </div>
    `).join('');

    // 🔥 APPLY MASONRY
    setTimeout(() => {
        new Masonry(grid, {
            itemSelector: '.pin-card',
            columnWidth: '.pin-card',
            percentPosition: true,
            gutter: 15
        });
    }, 200);
}

loadItems();
</script>

</body>
</html>
