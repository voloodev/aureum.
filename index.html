<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #dfbc74; 
            --bg-dark: #18181a;
            --surface: #242426;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --glass: rgba(36, 36, 38, 0.75);
            --blur: blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* Navigation */
        nav { display: none; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--glass); backdrop-filter: var(--blur); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 700; color: var(--primary); letter-spacing: 1px; font-size: 20px; cursor: pointer; }
        .search-container { display: flex; align-items: center; background: #1c1c1e; border-radius: 10px; padding: 8px 15px; flex: 1; max-width: 400px; margin: 0 15px; border: 1px solid #333; }
        .search-container select { background: transparent; color: var(--primary); border: none; outline: none; font-weight: 600; margin-right: 10px; cursor: pointer; font-size: 13px; }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 13px; }
        .hamburger { font-size: 22px; color: var(--text-main); cursor: pointer; background: none; border: none; }

        /* Auth */
        #authOverlay { position: fixed; inset: 0; z-index: 5000; background: #0a0a0c; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { position: relative; width: 100%; max-width: 380px; background: var(--surface); border-radius: 20px; padding: 40px 30px; text-align: center; }
        .admin-shield { position: absolute; top: 20px; right: 25px; color: var(--text-muted); font-size: 20px; cursor: pointer; transition: 0.3s; }
        .auth-input { width: 100%; background: #1c1c1e; border: 1px solid #333; color: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; outline: none; }
        .btn-primary { width: 100%; background: var(--primary); color: #111; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 15px; }

        /* Side Menu */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 280px; height: 100vh; background: var(--glass); backdrop-filter: var(--blur); z-index: 2000; transition: right 0.4s ease; padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        #sideMenu.active { right: 0; }
        .menu-item { display: flex; align-items: center; gap: 15px; color: var(--text-main); font-size: 15px; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: var(--primary); }

        /* Pinterest Layout */
        .wrapper { max-width: 1400px; margin: 30px auto; padding: 0 15px; }
        .masonry-grid { column-count: 2; column-gap: 15px; }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        .pin-card { break-inside: avoid; margin-bottom: 15px; background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid #333; cursor: pointer; }
        .pin-card img { width: 100%; display: block; }
        .pin-title { padding: 12px; font-size: 13px; font-weight: 600; }

        /* Slide Up Overlay */
        #postOverlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh; background: #1c1c1e; border-radius: 30px 30px 0 0; z-index: 3000; transition: bottom 0.4s ease; padding: 30px 20px; overflow-y: auto; }
        #postOverlay.active { bottom: 0; }
        .buy-btn { display: block; text-align: center; background: #25D366; color: #fff; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: 700; margin-bottom: 10px; }
        .cart-btn { width: 100%; background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 4000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--surface); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box" id="loginBox">
            <i class="fas fa-shield-alt admin-shield" onclick="adminPrompt()"></i>
            <h1>AUREUM</h1>
            <input type="text" id="logUser" class="auth-input" placeholder="Username">
            <input type="password" id="logPass" class="auth-input" placeholder="Password">
            <button class="btn-primary" onclick="login()">Login</button>
            <button class="btn-primary" style="background:none; color:var(--text-muted); border:1px solid #333;" onclick="toggleAuth('create')">Create Account</button>
        </div>
        <div class="auth-box" id="createBox" style="display:none;">
            <h1>JOIN AUREUM</h1>
            <input type="text" id="regUser" class="auth-input" placeholder="Username">
            <input type="password" id="regPass" class="auth-input" placeholder="Password">
            <button class="btn-primary" onclick="register()">Register</button>
        </div>
    </div>

    <nav id="mainNav">
        <div class="logo" onclick="location.reload()">AUREUM</div>
        <div class="search-container">
            <select id="searchCat"></select>
            <input type="text" id="searchInput" placeholder="Search...">
        </div>
        <button class="hamburger" onclick="toggleMenu(true)"><i class="fas fa-bars"></i></button>
    </nav>

    <div id="sideMenu">
        <i class="fas fa-times" style="align-self:flex-end; cursor:pointer;" onclick="toggleMenu(false)"></i>
        <div class="menu-item"><i class="fas fa-user"></i> <span id="profName"></span></div>
        <div class="menu-item" onclick="openModal('sellModal'); toggleMenu(false)"><i class="fas fa-plus"></i> Sell Item</div>
        <div class="menu-item" onclick="openModal('aboutModal'); toggleMenu(false)"><i class="fas fa-info-circle"></i> About Admin</div>
        <div id="adminMenuBtn" class="menu-item" style="display:none; color:var(--primary);" onclick="showAdminTools(); toggleMenu(false)"><i class="fas fa-cog"></i> Dashboard</div>
        <div class="menu-item" style="margin-top:auto; color:#ff3b30;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
    </div>

    <div class="wrapper">
        <div id="adminTools" style="display:none; background:#1c1c1e; padding:20px; border-radius:15px; border:1px solid #333; margin-bottom:20px;">
            <h3 style="color:var(--primary); margin-bottom:15px;">Admin Settings</h3>
            <p style="font-size:12px; color:var(--text-muted); margin-bottom:10px;">Update About Info:</p>
            <input type="text" id="admName" class="auth-input" placeholder="Admin Name">
            <input type="text" id="admWA" class="auth-input" placeholder="Admin WhatsApp">
            <button class="btn-primary" style="width:auto; padding:10px 20px;" onclick="saveAdminDetails()">Save Details</button>
        </div>
        <div class="masonry-grid" id="marketGrid"></div>
    </div>

    <div id="postOverlay">
        <i class="fas fa-chevron-down" style="cursor:pointer;" onclick="closePost()"></i>
        <div class="post-content">
            <img id="detImg" style="width:100%; border-radius:15px; margin:20px 0;">
            <h1 id="detTitle"></h1>
            <p id="detDesc" style="color:var(--text-muted); margin:10px 0;"></p>
            <div id="detPrice" style="font-size:24px; color:var(--primary); font-weight:700; margin-bottom:20px;"></div>
            <a id="detWA" href="#" target="_blank" class="buy-btn"><i class="fab fa-whatsapp"></i> Buy via WhatsApp</a>
            <button class="cart-btn" onclick="alert('Added to Cart!')"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
        </div>
    </div>

    <div class="modal" id="aboutModal">
        <div class="modal-content">
            <h2 id="dispAdmName">Admin</h2>
            <p id="dispAdmWA" style="color:var(--primary); font-size:20px; margin:15px 0;"></p>
            <button class="btn-primary" onclick="closeModal('aboutModal')">Close</button>
        </div>
    </div>

    <div class="modal" id="sellModal">
        <div class="modal-content">
            <input type="file" id="fileIn">
            <input type="text" id="pName" class="auth-input" placeholder="Product Name">
            <input type="text" id="pPrice" class="auth-input" placeholder="Price">
            <select id="pCat" class="auth-input"></select>
            <textarea id="pDesc" class="auth-input" placeholder="Description"></textarea>
            <input type="text" id="pWA" class="auth-input" placeholder="Your WhatsApp">
            <button class="btn-primary" onclick="publish()">Publish</button>
            <button class="btn-primary" style="background:none; color:var(--text-muted);" onclick="closeModal('sellModal')">Cancel</button>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('aureum_users')) || { 'aureum': '1234' };
        let adminDetails = JSON.parse(localStorage.getItem('aureum_admin_info')) || { name: 'Aureum Admin', wa: '+94 77 123 4567' };
        let currentUser = localStorage.getItem('aureum_session');
        let categories = ['All', 'Luxury', 'Electronics', 'Fashion'];

        window.onload = () => {
            if(currentUser) startApp();
            updateCatDropdowns();
            loadAdminDisplay();
        };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainNav').style.display = 'flex';
            document.getElementById('profName').innerText = currentUser;
            if(currentUser === 'aureum') document.getElementById('adminMenuBtn').style.display = 'flex';
            renderGrid();
        }

        function saveAdminDetails() {
            adminDetails.name = document.getElementById('admName').value;
            adminDetails.wa = document.getElementById('admWA').value;
            localStorage.setItem('aureum_admin_info', JSON.stringify(adminDetails));
            loadAdminDisplay();
            alert("Admin details updated!");
        }

        function loadAdminDisplay() {
            document.getElementById('dispAdmName').innerText = adminDetails.name;
            document.getElementById('dispAdmWA').innerText = adminDetails.wa;
            document.getElementById('admName').value = adminDetails.name;
            document.getElementById('admWA').value = adminDetails.wa;
        }

        function login() {
            let u = document.getElementById('logUser').value, p = document.getElementById('logPass').value;
            if(users[u] === p) { localStorage.setItem('aureum_session', u); currentUser = u; startApp(); }
            else alert("Error!");
        }

        function toggleAuth(m) {
            document.getElementById('loginBox').style.display = m === 'login' ? 'block' : 'none';
            document.getElementById('createBox').style.display = m === 'create' ? 'block' : 'none';
        }

        function register() {
            let u = document.getElementById('regUser').value, p = document.getElementById('regPass').value;
            users[u] = p; localStorage.setItem('aureum_users', JSON.stringify(users));
            toggleAuth('login');
        }

        function adminPrompt() {
            let u = prompt("Admin:"), p = prompt("Pass:");
            if(u === 'aureum' && p === '1234') { localStorage.setItem('aureum_session', u); location.reload(); }
        }

        function logout() { localStorage.removeItem('aureum_session'); location.reload(); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showAdminTools() { document.getElementById('adminTools').style.display = 'block'; }

        function renderGrid() {
            let items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            document.getElementById('marketGrid').innerHTML = items.map(i => `
                <div class="pin-card" onclick="openPost(${i.id})">
                    <img src="${i.img}">
                    <div class="pin-title">${i.name}</div>
                </div>
            `).join('');
        }

        function openPost(id) {
            let items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            let item = items.find(i => i.id === id);
            document.getElementById('detImg').src = item.img;
            document.getElementById('detTitle').innerText = item.name;
            document.getElementById('detDesc').innerText = item.desc;
            document.getElementById('detPrice').innerText = item.price;
            document.getElementById('detWA').href = `https://wa.me/${item.wa.replace(/\D/g,'')}?text=Available?`;
            document.getElementById('postOverlay').classList.add('active');
        }

        function closePost() { document.getElementById('postOverlay').classList.remove('active'); }

        let currentImg = "";
        document.getElementById('fileIn').onchange = e => {
            const r = new FileReader(); r.onload = () => currentImg = r.result;
            r.readAsDataURL(e.target.files[0]);
        };

        function publish() {
            let items = JSON.parse(localStorage.getItem('aureum_items')) || [];
            items.push({
                id: Date.now(), name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value, cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDesc').value, wa: document.getElementById('pWA').value,
                img: currentImg
            });
            localStorage.setItem('aureum_items', JSON.stringify(items));
            closeModal('sellModal'); renderGrid();
        }

        function updateCatDropdowns() {
            document.getElementById('searchCat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('pCat').innerHTML = categories.filter(c => c !== 'All').map(c => `<option value="${c}">${c}</option>`).join('');
        }
    </script>
</body>
                </html>
