<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg-dark: #0a0a0c;
            --surface: #121215; --text-main: #ffffff;
            --glass: rgba(20, 20, 22, 0.7); --blur: blur(25px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); }

        /* --- Header & Sizing Fix --- */
        nav { display: none; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--glass); backdrop-filter: var(--blur); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 700; color: var(--primary); font-size: 28px; letter-spacing: 1px; }
        
        .header-actions { display: flex; align-items: center; gap: 15px; flex: 1; max-width: 500px; margin: 0 20px; }
        .search-container { display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 12px 18px; flex: 1; border: 1px solid rgba(255,255,255,0.1); }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        
        .filter-toggle { background: var(--primary); border: none; padding: 12px 15px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* --- Category Styling --- */
        .cat-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 20px 5%; scrollbar-width: none; }
        .cat-btn { padding: 10px 22px; border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; color: white; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px rgba(223, 188, 116, 0.3); }

        /* --- Filtering Overlay --- */
        #filterOverlay { display: none; padding: 25px; background: var(--surface); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin: 0 5% 20px; }
        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .filter-item label { font-size: 12px; color: #777; display: block; margin-bottom: 5px; }
        .filter-item select, .filter-item input { width: 100%; padding: 12px; background: #000; color: white; border: 1px solid #333; border-radius: 10px; }

        /* --- Grid --- */
        .masonry-grid { column-count: 2; column-gap: 15px; padding: 0 5%; }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }
        .pin-card { break-inside: avoid; margin-bottom: 15px; background: var(--surface); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .pin-card img { width: 100%; display: block; }
        .pin-tag { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 10px; }

        .slide-overlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 90vh; background: var(--glass); backdrop-filter: var(--blur); border-radius: 30px 30px 0 0; z-index: 3000; transition: 0.5s; padding: 30px; overflow-y: auto; }
        .slide-overlay.active { bottom: 0; }
        .btn-gold { width: 100%; background: var(--primary); color: #000; padding: 15px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <nav id="mainNav">
        <div class="logo">AUREUM</div>
        <div class="header-actions">
            <div class="search-container"><input type="text" id="searchInput" placeholder="Search..." oninput="renderGrid()"></div>
            <button class="filter-toggle" onclick="toggleFilters()"><i class="fas fa-sliders-h"></i></button>
        </div>
        <div onclick="toggleMenu(true)" style="cursor:pointer; font-size:24px;"><i class="fas fa-bars"></i></div>
    </nav>

    <div id="filterOverlay">
        <div class="filter-row">
            <div class="filter-item"><label>Price Min</label><input type="number" id="minP" oninput="renderGrid()"></div>
            <div class="filter-item"><label>Price Max</label><input type="number" id="maxP" oninput="renderGrid()"></div>
            <div id="dynamicFilterArea" class="filter-row" style="grid-column: span 2; margin:0;"></div>
        </div>
    </div>

    <div class="cat-scroll" id="catBar"></div>
    <div class="masonry-grid" id="marketGrid"></div>

    <div id="sellModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:4000; align-items:center; justify-content:center;">
        <div style="background:var(--surface); padding:30px; border-radius:25px; width:90%; max-width:400px; border:1px solid #333;">
            <h3 style="margin-bottom:20px;">Publish Item</h3>
            <input type="file" id="fileIn" multiple class="btn-gold" style="background:#222; color:white; margin-bottom:10px;">
            <input type="text" id="pName" placeholder="Product Name" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; border-radius:10px; color:white;">
            <input type="number" id="pPrice" placeholder="Price" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; border-radius:10px; color:white;">
            <select id="pCat" onchange="updatePublishFields(this.value)" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; border-radius:10px; color:white;"></select>
            <div id="publishDynamic"></div>
            <button class="btn-gold" id="pubBtn" onclick="publish()">Publish Now</button>
            <p onclick="closeModal('sellModal')" style="text-align:center; margin-top:15px; cursor:pointer; color:#777;">Cancel</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let allItems = [];
        let currentFilter = 'All';

        window.onload = () => { loadCats(); loadItems(); document.getElementById('mainNav').style.display='flex'; };

        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All'];
                if(s.exists()) Object.values(s.val()).forEach(v => cats.push(v));
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-btn ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option>${c}</option>`).join('');
            });
        }

        function setFilter(c) {
            currentFilter = c;
            loadCats();
            updateDynamicFilters(c);
            renderGrid();
        }

        function updateDynamicFilters(c) {
            const area = document.getElementById('dynamicFilterArea');
            area.innerHTML = "";
            if(c === 'Fashion' || c === 'Clothes') {
                area.innerHTML = `<div class="filter-item"><label>Gender</label><select id="fGen" onchange="renderGrid()"><option value="All">All</option><option>Male</option><option>Female</option></select></div>`;
            } else {
                area.innerHTML = `<div class="filter-item"><label>Condition</label><select id="fCond" onchange="renderGrid()"><option value="All">All</option><option>Brand New</option><option>Used</option></select></div>`;
            }
        }

        function updatePublishFields(c) {
            const div = document.getElementById('publishDynamic');
            div.innerHTML = "";
            if(c === 'Fashion' || c === 'Clothes') {
                div.innerHTML = `<select id="pGen" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; border-radius:10px; color:white;"><option>Male</option><option>Female</option></select>`;
            } else {
                div.innerHTML = `<select id="pCond" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; border-radius:10px; color:white;"><option>Brand New</option><option>Used</option></select>`;
            }
        }

        async function publish() {
            let files = document.getElementById('fileIn').files;
            if(files.length === 0) return alert("Select Photos");
            let btn = document.getElementById('pubBtn');
            btn.innerText = "Publishing... Please Wait";
            btn.disabled = true;

            let urls = [];
            for(let f of files) {
                let fd = new FormData(); fd.append("image", f);
                let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
                let d = await res.json();
                if(d.success) urls.push(d.data.url);
            }

            await db.ref('items').push({
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                cat: document.getElementById('pCat').value,
                gen: document.getElementById('pGen')?.value || 'N/A',
                cond: document.getElementById('pCond')?.value || 'N/A',
                img: urls[0],
                imgs: urls,
                pinned: false
            });
            location.reload();
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => allItems.push({id:c.key, ...c.val()}));
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let min = parseInt(document.getElementById('minP').value) || 0;
            let max = parseInt(document.getElementById('maxP').value) || 9999999;
            let genF = document.getElementById('fGen')?.value || 'All';
            let condF = document.getElementById('fCond')?.value || 'All';

            let filtered = allItems.filter(i => 
                (currentFilter === 'All' || i.cat === currentFilter) &&
                (i.name.toLowerCase().includes(term)) &&
                (i.price >= min && i.price <= max) &&
                (genF === 'All' || i.gen === genF) &&
                (condF === 'All' || i.cond === condF)
            );

            filtered.sort((a,b) => (b.pinned) - (a.pinned));

            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="pin-card" style="position:relative;">
                    ${i.pinned ? '<div class="pin-tag">PINNED</div>' : ''}
                    <img src="${i.img}">
                    <div style="padding:15px;">
                        <h4 style="font-size:14px;">${i.name}</h4>
                        <p style="color:var(--primary); font-weight:700;">Rs. ${parseInt(i.price).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function toggleFilters() {
            let f = document.getElementById('filterOverlay');
            f.style.display = f.style.display === 'block' ? 'none' : 'block';
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleMenu(s) { alert("Menu under construction for icons sync."); }
    </script>
</body>
</html>
