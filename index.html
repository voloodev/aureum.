<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum | Premium Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #dfbc74; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur: blur(25px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        header { padding: 25px 5% 10px 5%; position: sticky; top: 0; z-index: 1000; background: var(--bg); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
        
        .search-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin: 15px 0; backdrop-filter: var(--blur); }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cat-item { padding: 8px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .cat-item.active { background: var(--primary); color: black; border-color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 12px; }

        /* View Layer (Floated Glass) */
        .view-layer { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .view-content { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 30px; padding: 0; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .view-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .view-details { padding: 20px; }
        
        .floating-actions { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .float-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; }
        .float-btn:hover { background: var(--primary); color: black; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { width: 100%; max-width: 400px; background: rgba(20,20,20,0.8); border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px; position: relative; }
        
        .input-glass, select, textarea { width: 100%; padding: 14px; background: var(--glass); border: 1px solid var(--glass-border); color: white; border-radius: 12px; margin-bottom: 12px; outline: none; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: black; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }

        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(10,10,10,0.95); border-left: 1px solid var(--glass-border); z-index: 4000; transition: 0.4s; padding: 40px 20px; }
        #sideMenu.active { right: 0; }
        .menu-link { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; font-weight: 600; border-radius: 12px; cursor: pointer; }
        .shield-btn { color: rgba(255,255,255,0.1); cursor: pointer; float: right; font-size: 20px; }
    </style>
</head>
<body>

    <div id="authOverlay" class="overlay" style="display: flex;">
        <div class="glass-panel" style="text-align: center;">
            <i class="fas fa-shield-alt shield-btn" onclick="toggleOverlay('adminLoginModal', true)"></i>
            <h1 style="color:var(--primary); margin-bottom:30px;">AUREUM</h1>
            <input type="text" id="lUser" class="input-glass" placeholder="Username">
            <input type="password" id="lPass" class="input-glass" placeholder="Password">
            <button class="btn-main" onclick="login()">SIGN IN</button>
        </div>
    </div>

    <div id="adminLoginModal" class="overlay">
        <div class="glass-panel">
            <h3 style="margin-bottom:15px;">Admin Login</h3>
            <input type="password" id="adminKey" class="input-glass" placeholder="Shield Key">
            <button class="btn-main" onclick="adminVerify()">LOGIN</button>
            <button class="btn-main" style="background:transparent; color:white; margin-top:10px;" onclick="toggleOverlay('adminLoginModal', false)">Back</button>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo">AUREUM</div>
            <i class="fas fa-bars-staggered fa-lg" onclick="toggleMenu(true)" style="cursor:pointer;"></i>
        </div>
        <div class="search-bar">
            <i class="fas fa-search" style="color:#555;"></i>
            <input type="text" id="searchInput" placeholder="Search..." oninput="renderGrid()">
        </div>
        <div class="cat-bar" id="catBar"></div>
    </header>

    <div class="grid" id="marketGrid"></div>

    <div id="viewLayer" class="view-layer">
        <div class="view-content">
            <div class="floating-actions">
                <div class="float-btn"><i class="far fa-heart"></i></div>
                <div class="float-btn"><i class="fas fa-shopping-cart"></i></div>
                <div id="pinBtn" class="float-btn" style="display:none;"><i class="fas fa-thumbtack"></i></div>
                <div id="delBtn" class="float-btn" style="color:#ff4d4d; display:none;" onclick="deletePost()"><i class="fas fa-trash"></i></div>
                <div class="float-btn" onclick="toggleOverlay('viewLayer', false)"><i class="fas fa-times"></i></div>
            </div>
            <img id="vImg" class="view-img" src="">
            <div class="view-details">
                <h2 id="vTitle" style="color:var(--primary);"></h2>
                <h3 id="vPrice" style="margin:10px 0;"></h3>
                <p id="vDesc" style="color:#aaa; font-size:14px;"></p>
                <button class="btn-main" style="margin-top:20px;" id="vWA">Contact Seller</button>
            </div>
        </div>
    </div>

    <div id="sideMenu">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleMenu(false)"></i>
        <div style="margin-top:40px;">
            <div class="menu-link"><i class="fas fa-user"></i> <span id="uDisp">User</span></div>
            <div class="menu-link" onclick="toggleOverlay('sellModal', true)"><i class="fas fa-plus"></i> Publish Ad</div>
            <div class="menu-link" onclick="loadMyPosts()"><i class="fas fa-box"></i> My Posts</div>
            <div class="menu-link" onclick="showSupport()"><i class="fas fa-headset"></i> Support</div>
            <div id="admBtn" style="display:none;" class="menu-link" onclick="toggleOverlay('adminSettings', true)"><i class="fas fa-tools"></i> Admin Settings</div>
            <div class="menu-link" onclick="logout()" style="color:#ff4d4d; margin-top:20px;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <div id="sellModal" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('sellModal', false)"></i>
            <h3>New Listing</h3><br>
            <input type="file" id="fileIn" class="input-glass">
            <input type="text" id="pName" class="input-glass" placeholder="Title">
            <input type="number" id="pPrice" class="input-glass" placeholder="Price">
            <select id="pCat" class="input-glass"></select>
            <textarea id="pDescIn" class="input-glass" placeholder="Description"></textarea>
            <input type="text" id="pWAIn" class="input-glass" placeholder="WhatsApp Number">
            <button class="btn-main" id="pubBtn" onclick="publish()">PUBLISH</button>
        </div>
    </div>

    <div id="adminSettings" class="overlay">
        <div class="glass-panel">
            <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleOverlay('adminSettings', false)"></i>
            <h3>Admin Settings</h3><br>
            <input type="text" id="newCat" class="input-glass" placeholder="New Category">
            <button class="btn-main" onclick="addCat()">Add Category</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNfce5v0BakfXV0F1aJ_teEj0TvFtPlbg",
            authDomain: "aureum-5f6f4.firebaseapp.com",
            databaseURL: "https://aureum-5f6f4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aureum-5f6f4",
            storageBucket: "aureum-5f6f4.firebasestorage.app",
            messagingSenderId: "20685576526",
            appId: "1:20685576526:web:735bae011402ac99c0261f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "7d57cd3d32b4eb8c60d0a0c72f6f1d65";

        let user = localStorage.getItem('user');
        let allItems = [], currentId = '';
        let currentCat = 'All';

        window.onload = () => { if(user) startApp(); loadCats(); loadItems(); };

        function startApp() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('uDisp').innerText = user;
            if(user === 'aureum') document.getElementById('admBtn').style.display = 'flex';
        }

        function login() {
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val() === p) { localStorage.setItem('user', u); location.reload(); }
            });
        }

        function adminVerify() {
            if(document.getElementById('adminPassKey')?.value === '1234' || document.getElementById('adminKey').value === '1234') { 
                localStorage.setItem('user', 'aureum'); location.reload(); 
            }
        }

        function loadItems() {
            db.ref('items').on('value', s => {
                allItems = [];
                s.forEach(c => { let i = c.val(); i.id = c.key; allItems.push(i); });
                renderGrid();
            });
        }

        function renderGrid() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allItems.filter(i => (currentCat==='All' || i.cat===currentCat) && i.name.toLowerCase().includes(term));
            document.getElementById('marketGrid').innerHTML = filtered.map(i => `
                <div class="card" onclick="viewPost('${i.id}')">
                    <img src="${i.img}">
                    <div class="card-info">
                        <div style="font-weight:600; font-size:13px;">${i.name}</div>
                        <div style="color:var(--primary); font-weight:800;">Rs. ${parseInt(i.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function viewPost(id) {
            let i = allItems.find(x => x.id === id);
            currentId = id;
            document.getElementById('vImg').src = i.img;
            document.getElementById('vTitle').innerText = i.name;
            document.getElementById('vPrice').innerText = "Rs. " + parseInt(i.price).toLocaleString();
            document.getElementById('vDesc').innerText = i.desc || "No description provided.";
            document.getElementById('vWA').onclick = () => window.open('https://wa.me/'+i.wa);
            
            document.getElementById('pinBtn').style.display = (user === 'aureum') ? 'flex' : 'none';
            document.getElementById('delBtn').style.display = (user === 'aureum' || i.seller === user) ? 'flex' : 'none';
            
            toggleOverlay('viewLayer', true);
        }

        async function publish() {
            let file = document.getElementById('fileIn').files[0];
            if(!file) return alert("Select Image");
            document.getElementById('pubBtn').innerText = "Uploading...";
            let fd = new FormData(); fd.append("image", file);
            let res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, { method: "POST", body: fd });
            let d = await res.json();
            if(d.success) {
                await db.ref('items').push({
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    cat: document.getElementById('pCat').value,
                    desc: document.getElementById('pDescIn').value,
                    wa: document.getElementById('pWAIn').value,
                    img: d.data.url,
                    seller: user,
                    time: Date.now()
                });
                location.reload();
            }
        }

        function deletePost() { if(confirm("Delete?")) { db.ref('items/'+currentId).remove(); toggleOverlay('viewLayer', false); } }
        function loadCats() {
            db.ref('categories').on('value', s => {
                let cats = ['All']; s.forEach(c => cats.push(c.val()));
                document.getElementById('catBar').innerHTML = cats.map(c => `<div class="cat-item ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
                document.getElementById('pCat').innerHTML = cats.filter(c=>c!=='All').map(c => `<option value="${c}">${c}</option>`).join('');
            });
        }
        function setCat(c) { currentCat = c; renderGrid(); loadCats(); }
        function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('active', s); }
        function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; toggleMenu(false); }
        function logout() { localStorage.clear(); location.reload(); }
        function showSupport() { alert("Support: 07xxxxxxx"); }
    </script>
</body>
</html>
